//  Map
// ============================================================
function initMap() {
  _map = L.map('map', { zoomControl: true }).setView([-14.235, -51.9253], 4);
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: '&copy; Esri', maxZoom: 19, crossOrigin: true }
  ).addTo(_map);
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
    { subdomains: 'abcd', maxZoom: 19, opacity: 0.85, crossOrigin: true }
  ).addTo(_map);
}

function updateMap() {
  if (_view === 'horario') { renderHorario(); return; }
  if (!_map) return;
  _markers.forEach(function(m) { m.remove(); });
  _markers = [];
  if (_poly) { _poly.remove(); _poly = null; }
  _clearAnttMapLayers();

  var pts = _seq.filter(function(p) { return p.lat && p.lng; });
  if (!pts.length) {
    document.getElementById('map').style.display = 'none';
    document.getElementById('mapPh').style.display = '';
    document.getElementById('mapLegend').classList.remove('show');
    return;
  }

  document.getElementById('map').style.display = 'block';
  document.getElementById('mapPh').style.display = 'none';
  document.getElementById('mapLegend').classList.add('show');

  var seqCoordIdxs = [];
  _seq.forEach(function(p, i) { if (p.lat && p.lng) seqCoordIdxs.push(i); });
  var firstCoordIdx = seqCoordIdxs[0];
  var lastCoordIdx  = seqCoordIdxs[seqCoordIdxs.length - 1];
  var lls = pts.map(function(p) { return [+p.lat, +p.lng]; });

  var mapSeqKey = _seqCoordsKey();
  setTimeout(function() {
    _map.invalidateSize();

    // 1. Desenha trechos ANTT coloridos PRIMEIRO (ficam abaixo da rota laranja)
    _drawAnttOnMap();

    // 2. Rota principal por cima
    _poly = L.polyline(lls, { color: '#f47920', weight: 5, opacity: 0.9 }).addTo(_map);

    if (_osrmGeometry && _osrmSeqKey === mapSeqKey) {
      _poly.setLatLngs(_osrmGeometry);
    } else if (!_osrmGeometry || _osrmSeqKey !== mapSeqKey) {
      _fetchOsrmDistances(function(legs, geom) {
        if (_seqCoordsKey() !== mapSeqKey) return;
        _osrmLegs     = _osrmLegs !== undefined ? _osrmLegs : legs;
        _osrmSeqKey   = mapSeqKey;
        _osrmGeometry = geom;
        if (_poly && geom) _poly.setLatLngs(geom);
        // Redesenha ANTT com distâncias reais e garante que a rota fica por cima
        _drawAnttOnMap();
        if (_poly) _poly.bringToFront();
      });
    }

    // 3. Marcadores de sequência (DOM elements — sempre acima do SVG)
    _seq.forEach(function(p, i) {
      if (!p.lat || !p.lng) return;
      var first = (i === firstCoordIdx), last = (i === lastCoordIdx);
      // Destaque de apoio ANTT apenas quando há alertas ativos na rota
      var isApoio = _anttMapActive && !first && !last && _isApoioAntt(i);
      var bg  = first ? '#22c97a' : last ? '#e05050' : '#f47920';
      var sz  = (first || last) ? 28 : 22;
      var lbl = first ? 'I' : last ? 'F' : String(i + 1);
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;' +
              'background:' + bg + ';border:2.5px solid rgba(255,255,255,0.85);' +
              (isApoio ? 'outline:2px solid rgba(34,197,90,0.75);outline-offset:1px;' : '') +
              'display:flex;align-items:center;justify-content:center;' +
              'font-size:' + (sz > 24 ? '11px' : '10px') + ';font-weight:800;color:#fff;' +
              'box-shadow:0 2px 8px rgba(0,0,0,0.55);">' + lbl + '</div>',
        iconSize: [sz, sz], iconAnchor: [sz/2, sz/2]
      });
      var m = L.marker([+p.lat, +p.lng], { icon: icon });
      m.bindTooltip(
        '<strong>' + esc(p.nomePonto) + '</strong>' +
        '<br><span style="font-size:10px;color:#888;">#' + (i+1) + (p.tipo ? ' · ' + esc(p.tipo) : '') +
        (isApoio ? ' · <span style="color:#4ade80">apoio ANTT</span>' : '') + '</span>',
        { direction: 'top', offset: [0, -(sz/2) - 4] }
      );
      m.addTo(_map);
      _markers.push(m);
    });

    _map.fitBounds(lls, { padding: [44, 44], maxZoom: 13 });
  }, 80);
}

// ============================================================
//  Esquema search
// ============================================================
function setupEsqSearch() {
  var inp  = document.getElementById('esqSearch');
  var drop = document.getElementById('esqDrop');

  // focus programático (abrirModalEsquema) NÃO abre o dropdown quando vazio —
  // só reabre se já havia texto (ex: usuário voltou ao modal após digitar algo).
  // Click do usuário no input → sempre mostra todos os resultados.
  inp.addEventListener('focus', function() {
    if (this.value.trim()) renderEsqs(this.value);
  });
  inp.addEventListener('click', function() {
    renderEsqs(this.value); // usuário clicou intencionalmente → mostra tudo
  });
  inp.addEventListener('input', function() { renderEsqs(this.value); });

  // blur fecha com delay — o mousedown no dropdown cancela o blur antes de fechar
  inp.addEventListener('blur', function() {
    setTimeout(function() { drop.classList.remove('open'); }, 160);
  });

  // mousedown no dropdown previne o blur do input, mantendo a lista visível ao clicar num item
  drop.addEventListener('mousedown', function(e) { e.preventDefault(); });

  document.getElementById('btnNovo').addEventListener('click', novoEsquema);
  document.getElementById('btnSalvEsq').addEventListener('click', salvarEsquema);
}

function renderEsqs(q) {
  var drop = document.getElementById('esqDrop');
  var nq   = norm(q);
  // "1845" ou "845" → "18:45" / "08:45" para casar com horários
  var timeQ = null;
  var digits = (q || '').trim().replace(/\D/g, '');
  if (digits.length === 4) timeQ = digits.slice(0, 2) + ':' + digits.slice(2);
  else if (digits.length === 3) timeQ = '0' + digits[0] + ':' + digits.slice(1);

  var list = _esqs.filter(function(e) {
    return !nq
      || norm(e.id_esquema).includes(nq)
      || norm(e.nome_linha).includes(nq)
      || norm(e.horario || '').includes(nq)
      || norm(e.sentido || '').includes(nq)
      || (timeQ && (e.horario || '').startsWith(timeQ));
  }).slice(0, 60);

  drop.innerHTML = list.length
    ? list.map(function(e) {
        return '<div class="sdi" data-id="' + esc(e.id_esquema) + '">'
          + '<div class="sdi-main">' + hl(e.id_esquema + ' — ' + e.nome_linha, q) + '</div>'
          + '<div class="sdi-meta">'
          + (e.horario ? '<span style="background:#fff8e1;color:#f47920;border:1px solid #ffe082;border-radius:3px;padding:0 5px;margin-right:4px;font-size:10px;">' + esc(e.horario) + '</span>' : '')
          + esc(e.sentido || '')
          + '</div></div>';
      }).join('')
    : '<div class="sd-empty">Nenhum resultado</div>';

  drop.classList.add('open');
  drop.querySelectorAll('.sdi').forEach(function(el) {
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      var id  = el.getAttribute('data-id');
      var esq = _esqs.find(function(e) { return e.id_esquema === id; });
      if (esq) selecionarEsq(esq);
    });
  });
}

function selecionarEsq(esq) {
  _isNovo = false;
  _sel    = esq;
  document.getElementById('esqSearch').value = esq.id_esquema + ' — ' + esq.nome_linha;
  document.getElementById('esqDrop').classList.remove('open');
  renderBadge(esq);
  document.getElementById('fNome').value  = esq.nome_linha || '';
  document.getElementById('fHor').value   = esq.horario   || '';
  document.getElementById('fSent').value  = esq.sentido   || 'Ida';
  document.getElementById('esqForm').style.display = '';
  document.getElementById('btnSalvEsq').textContent = 'Atualizar Esquema';
  _updateHdrEsq(esq);
  carregarPontos(esq.id_esquema);
}

function renderBadge(esq) {
  var el = document.getElementById('esqBadge');
  el.style.display = '';
  el.innerHTML = '<div class="esq-badge">'
    + '<div class="eid">' + esc(esq.id_esquema) + '</div>'
    + '<div class="einfo"><strong>' + esc(esq.nome_linha) + '</strong>'
    + (esq.horario ? '<br>' + esc(esq.horario) : '')
    + (esq.sentido ? ' &middot; ' + esc(esq.sentido) : '')
    + '</div></div>';
}

function _updateHdrEsq(esq) {
  var btn   = document.getElementById('hdrEsqBtn');

  if (esq) {
    label.innerHTML = ico('clipboard', 14) + ' ' + esc(esq.nome_linha || ('Esquema #' + esq.id_esquema));

    label.innerHTML = ico('clipboard', 14) + ' Selecionar Esquema';
    btn.classList.remove('has-schema');
  }
}

function salvarEsquema() {
  var nome  = document.getElementById('fNome').value.trim();
  var hor   = document.getElementById('fHor').value.trim();
  var sent  = document.getElementById('fSent').value;
  if (!nome) { toast('Nome da linha é obrigatório.', 'error'); return; }

  var btn = document.getElementById('btnSalvEsq');
  btn.disabled = true;
  var dados = { nomeLinha: nome, horario: hor, sentido: sent };

  if (_isNovo) {
    loading('Criando esquema…');
    google.script.run
      .withSuccessHandler(function(r) {
        doneLoading();
        btn.disabled = false;
        var novoEsq = { id_esquema: String(r.id), nome_linha: nome, horario: hor, sentido: sent };
        _esqs.push(novoEsq);
        _isNovo = false;
        document.getElementById('btnNovo').style.display = ''; // restaura sempre
        if (_voltaMode && _voltaSnapshot) {
          _voltaMode = false;
          var snap = _voltaSnapshot;
          _voltaSnapshot = null;
          _aplicarVoltaESpelhar(novoEsq, snap);
        } else {
          selecionarEsq(novoEsq);
          toast('Esquema #' + r.id + ' criado!', 'success');
        }
      })
      .withFailureHandler(function(e) {
        doneLoading(); btn.disabled = false;
        toast('Erro: ' + (e.message || e), 'error');
      })
      .criarEsquema(dados);
  } else {
    loading('Atualizando esquema…');
    google.script.run
      .withSuccessHandler(function() {
        doneLoading();
        btn.disabled = false;
        _sel.nome_linha = nome; _sel.horario = hor; _sel.sentido = sent;
        renderBadge(_sel);
        _updateHdrEsq(_sel);
        toast('Esquema atualizado!', 'success');
      })
      .withFailureHandler(function(e) {
        doneLoading(); btn.disabled = false;
        toast('Erro: ' + (e.message || e), 'error');
      })
      .atualizarEsquema(_sel.id_esquema, dados);
  }
}

// ============================================================
//  Load points
// ============================================================
function carregarPontos(idEsq) {
  loading('Carregando pontos…');
  google.script.run
    .withSuccessHandler(function(pontos) {
      doneLoading();
      _seq = pontos.map(function(p) {
        var l = _lMap[String(p.idPonto)] || {};
        return { idPonto: p.idPonto, nomePonto: p.nomePonto, tipo: p.tipo || '', lat: l.lat || null, lng: l.lng || null, isNew: false };
      });
      _seqDirt        = false;
      _osrmLegs       = undefined;
      _osrmSeqKey     = '';
      _osrmGeometry   = null;
      _comercialTimes = {};
      pontos.forEach(function(p) {
        var t = _normalizeHHMM(p.horarioComercial);
        if (t) _comercialTimes[p.idPonto] = t;
      });
      // tempo_local salvo é ignorado: parada vem da aba TEMPO_PERMANENCIA
      // (> padrão por tipo). _customStopTimes só guarda edições da sessão.
      _customStopTimes = {};
      _legVia = {};
      pontos.forEach(function(p) {
        if (p.tipoTrecho) _legVia[p.idPonto] = p.tipoTrecho;
      });
      try {
        var lsVia = JSON.parse(localStorage.getItem('vc_legVia_' + _sel.id_esquema) || '{}');
        Object.keys(lsVia).forEach(function(k) { if (!_legVia[k]) _legVia[k] = lsVia[k]; });
      } catch(e) {}
      _horStartIdx    = 0;
      renderSeq();
      updateInsAfter();
      updateMap();
      _updateImportBtn();
      document.getElementById('ptCard').style.display = '';
      document.getElementById('ptUnsaved').style.display = 'none';
      document.getElementById('btnSalvSeq').disabled = true;
      document.getElementById('hdrViewToggle').style.display = 'flex';
      document.getElementById('btnSalvar').style.display = '';
      document.getElementById('btnVolta').style.display  = '';
      fecharModalEsquema();
      // Restaura config imediatamente (com _tipoViaVel padrão) para renderHorario ter os valores certos
      _restoreHorConfig(_sel);
      var savedView = 'mapa';
      try { savedView = localStorage.getItem('vc_view') || 'mapa'; } catch(e) {}
      toggleView(savedView);
      // Após carregar velocidades da planilha, atualiza e re-renderiza se necessário
      var _selSnap = _sel;
      google.script.run
        .withSuccessHandler(function(v) {
          if (!v || _sel !== _selSnap) return;
          _tipoViaVel = v;
          // Re-aplica customizações do usuário salvas no localStorage (prioridade sobre backend)
          try {
            var _lsCfg = JSON.parse(localStorage.getItem('vc_horcfg_' + _selSnap.id_esquema) || 'null');
            if (_lsCfg && _lsCfg.viaVel) {
              Object.keys(_lsCfg.viaVel).forEach(function(k) { _tipoViaVel[k] = _lsCfg.viaVel[k]; });
            }
          } catch(e) {}
          // Atualiza o campo de velocidade para o tipo ativo
          var via = '';
          document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
            if (b.classList.contains('active')) via = b.textContent.trim();
          });
          var viaKey = _VIA_LABEL_TO_KEY[via] || via;
          if (via && _tipoViaVel[viaKey]) {
            document.getElementById('horVelMedia').value = _tipoViaVel[viaKey];
          }
          if (_view === 'horario') _lastCalc ? _partialUpdateSchedule() : renderHorario();
        })
        .getTipoViaVelocidades(_selSnap.id_esquema);
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Erro ao carregar pontos: ' + (e.message || e), 'error');
    })
    .getPontosEsquemaParaFormulario(idEsq);
}

// ============================================================
//  Sequence
// ============================================================
function renderSeq() {
  var list = document.getElementById('seqList');
  var savedScroll = list ? list.scrollTop : 0;
  document.getElementById('ptCount').textContent = _seq.length;

  if (!_seq.length) {
    list.innerHTML = '<div class="seq-empty">Nenhum ponto. Busque acima para adicionar.</div>';
    return;
  }

  function dividerHtml(afterIdx) {
    return '<div class="seq-insert" data-after="' + afterIdx + '">'
      + '<div class="seq-insert-line"></div>'
      + '<span class="seq-insert-btn">+ inserir</span>'
      + '<div class="seq-insert-line"></div>'
      + '</div>';
  }

  var parts = [dividerHtml(-1)];
  _seq.forEach(function(p, i) {
    parts.push(
      '<div class="seq-item' + (p.isNew ? ' is-new' : '') + '" draggable="true" data-idx="' + i + '">'
      + '<span class="seq-drag" title="Arrastar para reordenar">⠿</span>'
      + '<span class="seq-num">' + (i + 1) + '</span>'
      + '<div class="seq-info">'
        + '<div class="seq-name" title="' + esc(p.nomePonto) + '">' + esc(p.nomePonto) + '</div>'
        + (p.tipo ? '<div class="seq-tipo">' + esc(p.tipo) + '</div>' : '')
      + '</div>'
      + (p.isNew ? '<span class="seq-new">novo</span>' : '')
      + '<button class="btn-icon rm" data-idx="' + i + '" title="Remover">' + ico('x',13) + '</button>'
      + '</div>'
    );
    parts.push(dividerHtml(i));
  });
  list.innerHTML = parts.join('');
  list.scrollTop = savedScroll;

  list.querySelectorAll('.seq-insert').forEach(function(el) {
    el.addEventListener('click', function() {
      document.getElementById('insAfter').value = el.getAttribute('data-after');
      document.getElementById('ptSearch').focus();
    });
  });

  list.querySelectorAll('.btn-icon.rm').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      _seq.splice(parseInt(btn.getAttribute('data-idx')), 1);
      _activeHorRow = null;
      dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
    });
  });

  var dragIdx = null;
  list.querySelectorAll('.seq-item').forEach(function(item) {
    item.addEventListener('dragstart', function(e) {
      dragIdx = parseInt(item.getAttribute('data-idx'));
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function() { item.classList.add('dragging'); }, 0);
    });
    item.addEventListener('dragend', function() {
      item.classList.remove('dragging');
      list.querySelectorAll('.seq-item').forEach(function(el) { el.classList.remove('drag-over'); });
      dragIdx = null;
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.seq-item').forEach(function(el) { el.classList.remove('drag-over'); });
      item.classList.add('drag-over');
    });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      var toIdx = parseInt(item.getAttribute('data-idx'));
      if (dragIdx === null || dragIdx === toIdx) return;
      var moved = _seq.splice(dragIdx, 1)[0];
      _seq.splice(toIdx, 0, moved);
      _pendingSelectIdx = toIdx;
      dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
    });
  });
}

function updateInsAfter() {
  var sel  = document.getElementById('insAfter');
  var prev = sel.value;
  sel.innerHTML = '<option value="-1">↑ No início da sequência</option>'
    + _seq.map(function(p, i) {
        return '<option value="' + i + '">Após ' + (i + 1) + '. ' + esc(p.nomePonto) + '</option>';
      }).join('');
  if (prev !== '-1' && parseInt(prev) < _seq.length) sel.value = prev;
  else sel.value = _seq.length > 0 ? String(_seq.length - 1) : '-1';
}

function _markDirty() {
  _seqDirt = true;
  document.getElementById('ptUnsaved').style.display = '';
  document.getElementById('btnSalvSeq').disabled = false;
  var s = document.getElementById('btnSalvar');
  if (s) { s.style.display = ''; s.disabled = false; }
}

function dirtySeq() {
  _seqDirt         = true;
  _osrmLegs        = undefined;
  _osrmSeqKey      = '';
  _osrmGeometry    = null;
  _horStartIdx     = 0;
  _clearAnttMapLayers();
  document.getElementById('ptUnsaved').style.display = '';
  document.getElementById('btnSalvSeq').disabled = false;
  var s = document.getElementById('btnSalvar');
  if (s) { s.style.display = ''; s.disabled = false; }
}

// ── Viagem de Volta ──────────────────────────────────────────
function iniciarViagemVolta() {
  if (!_sel) { toast('Nenhum esquema selecionado.', 'error'); return; }
  if (!_seq.length) { toast('Adicione pontos antes de criar a viagem de volta.', 'info'); return; }

  // Guarda snapshot do estado atual (sem horários comerciais — usuário preencherá na volta)
  _voltaSnapshot = {
    seq:             _seq.map(function(p){ return Object.assign({}, p); }),
    legVia:          Object.assign({}, _legVia),
    customStopTimes: Object.assign({}, _customStopTimes)
  };
  _voltaMode = true;
  _isNovo    = true;  // força caminho de criação em salvarEsquema()

  // Pré-preenche o modal
  var sentAtual = _sel.sentido || 'Ida';
  var sentVolta = sentAtual === 'Ida' ? 'Volta' : sentAtual === 'Volta' ? 'Ida' : 'Circular';
  document.getElementById('fNome').value  = _sel.nome_linha || '';
  document.getElementById('fHor').value   = '';
  document.getElementById('fSent').value  = sentVolta;
  document.getElementById('esqSearch').value = '';
  document.getElementById('esqBadge').style.display  = 'none';
  document.getElementById('esqForm').style.display   = '';
  document.getElementById('btnSalvEsq').textContent  = 'Criar Viagem de Volta';
  document.getElementById('btnNovo').style.display   = 'none'; // oculta durante o fluxo
  document.getElementById('btnFecharModalEsq').style.display = '';
  abrirModalEsquema();
}

/**
 * Após criar o novo esquema, inverte a sequência do snapshot e salva via
 * salvarSequenciaPontos, preservando tipos de trecho e tempos locais.
 * Horários comerciais são omitidos (usuário preencherá na nova rota).
 */
function _aplicarVoltaESpelhar(novoEsq, snapshot) {
  loading('Espelhando sequência…');

  var orig    = snapshot.seq;              // [A, B, C, …, Z]
  var reversed = orig.slice().reverse();   // [Z, …, C, B, A]

  // Mapeia tipo de trecho para a rota inversa:
  // Trecho X→Y (orig) = mesmo trecho físico Y→X (volta), tipo = snapshot.legVia[X]
  // Logo: voltaLegVia[Y] = snapshot.legVia[X]  (onde Y vem após X na original)
  var voltaLegVia = {};
  for (var i = 0; i < orig.length - 1; i++) {
    voltaLegVia[orig[i + 1].idPonto] = snapshot.legVia[orig[i].idPonto] || 'BR';
  }

  var payload = reversed.map(function(p) {
    return {
      idPonto:         p.idPonto,
      nomePonto:       p.nomePonto,
      tipo:            p.tipo || '',
      horarioComercial: '',
      tempoLocal:      snapshot.customStopTimes[p.idPonto] != null
                         ? snapshot.customStopTimes[p.idPonto] : '',
      tipoTrecho:      voltaLegVia[p.idPonto] || snapshot.legVia[p.idPonto] || ''
    };
  });

  google.script.run
    .withSuccessHandler(function() {
      selecionarEsq(novoEsq);
      toast('Viagem de volta criada — ' + reversed.length + ' pontos espelhados!', 'success');
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Esquema criado, mas erro ao salvar pontos: ' + (e.message || e), 'error');
      selecionarEsq(novoEsq); // abre mesmo assim
    })
    .salvarSequenciaPontos(novoEsq.id_esquema, payload);
}

// ============================================================
//  Salvar unificado
// ============================================================
function salvarTudo() {
  var salvouEsq = false;
  var nomeVal = (document.getElementById('fNome').value || '').trim();
  var formVis = document.getElementById('esqForm').style.display !== 'none';
  if (formVis && nomeVal) {
    salvouEsq = true;
    salvarEsquema();
  }
  if (_seqDirt) {
    salvarSeq();
  }
  if (!salvouEsq && !_seqDirt) {
    toast('Nenhuma alteração pendente.', 'info');
  }
}

// ============================================================
//  Point search
// ============================================================
function setupPtSearch() {
  var inp  = document.getElementById('ptSearch');
  var drop = document.getElementById('ptDrop');
  inp.addEventListener('focus', function() { renderPts(this.value); });
  inp.addEventListener('input', function() { renderPts(this.value); });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#ptSearch') && !e.target.closest('#ptDrop'))
      drop.classList.remove('open');
  });
  document.getElementById('btnSalvSeq').addEventListener('click', salvarSeq);
}

function renderPts(q) {
  var drop = document.getElementById('ptDrop');
  var nq   = norm(q);
  var list = _locais.filter(function(l) {
    return !nq
      || norm(l.descricao).includes(nq)
      || norm(l.tipo || '').includes(nq)
      || norm(l.codigo).includes(nq);
  }).slice(0, 80);

  // ── ANTT context ──────────────────────────────────────────────
  _updateAnttWarnBar();
  var nearLimit = _anttStatus && _anttStatus.accumKm > ANTT_WARN_KM;
  var insertIdx = parseInt(document.getElementById('insAfter').value) || 0;
  var refPt     = _seq[insertIdx] || null; // último ponto antes da inserção

  // Fase 3 — Ordena apoio para o topo quando próximo do limite
  if (nearLimit) {
    list.sort(function(a, b) {
      var aA = _isApoioCandidate(a.descricao), bA = _isApoioCandidate(b.descricao);
      return (aA === bA) ? 0 : aA ? -1 : 1;
    });
  }

  if (!list.length) {
    drop.innerHTML = '<div class="sd-empty">Nenhum resultado</div>';
  } else {
    var seqIdx = {};
    _seq.forEach(function(p, i) { seqIdx[p.idPonto] = i + 1; });

    drop.innerHTML = list.map(function(l) {
      var pos       = seqIdx[l.codigo];
      var jaNo      = pos !== undefined;
      var isApoioT  = _isApoioCandidate(l.descricao);
      var apoioBadge = isApoioT
        ? '<span class="sdi-apoio-badge">apoio</span>'
        : '';

      // Fase 4 — Estimativa de distância (straight-line × 1.3)
      var distChip = '';
      if (nearLimit && isApoioT && l.lat && l.lng && refPt && refPt.lat && refPt.lng) {
        var linKm  = _haversinKm(refPt.lat, refPt.lng, l.lat, l.lng);
        var estKm  = Math.round(linKm * 1.3);
        var total  = _anttStatus.accumKm + estKm;
        distChip = total <= ANTT_MAX_KM
          ? '<span class="antt-dist-ok">~' + estKm + 'km · cabe</span>'
          : '<span class="antt-dist-warn">~' + estKm + 'km · passa</span>';
      }

      return '<div class="sdi' + (jaNo ? ' off' : '') + '" data-cod="' + esc(l.codigo) + '">'
        + '<div class="sdi-main">'
          + hl(l.descricao, q)
          + (jaNo ? ' <span style="font-size:9px;background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;border-radius:3px;padding:0 5px;">pos. ' + pos + '</span>' : '')
          + apoioBadge
        + '</div>'
        + '<div class="sdi-meta">'
          + hl(l.codigo, q) + (l.tipo ? ' · ' + esc(l.tipo) : '')
          + (l.lat ? '' : ' <span style="color:#f87171;font-size:10px;">sem coord.</span>')
          + distChip
        + '</div>'
        + '</div>';
    }).join('');
  }

  drop.classList.add('open');
  drop.querySelectorAll('.sdi:not(.off)').forEach(function(el) {
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      var cod   = el.getAttribute('data-cod');
      var found = _locais.find(function(l) { return l.codigo === cod; });
      if (found) addPonto(found);
    });
  });
}

function addPonto(local) {
  document.getElementById('ptDrop').classList.remove('open');
  document.getElementById('ptSearch').value = '';
  var after = parseInt(document.getElementById('insAfter').value);
  _seq.splice(after + 1, 0, {
    idPonto: local.codigo, nomePonto: local.descricao,
    tipo: local.tipo || '', lat: local.lat || null, lng: local.lng || null, isNew: true
  });
  _pendingSelectIdx = after + 1;
  dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
  document.getElementById('insAfter').value = String(after + 1);
}

/** Adiciona ponto sempre no final da sequência (usado pelas sugestões ANTT no painel lateral). */
function addPontoNoFim(local) {
  var insertAt = _seq.length; // índice após o último
  _seq.push({
    idPonto: local.codigo, nomePonto: local.descricao,
    tipo: local.tipo || '', lat: local.lat || null, lng: local.lng || null, isNew: true
  });
  _pendingSelectIdx = insertAt;
  dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
  document.getElementById('insAfter').value = String(insertAt);
  var list = document.getElementById('seqList');
  if (list) list.scrollTop = list.scrollHeight;
}

/**
 * Para cada par consecutivo (A, B) da sequência, calcula o "desvio extra"
 * que X causaria: dist(A,X) + dist(X,B) − dist(A,B).
 * Retorna o índice i tal que X deve ser inserido APÓS _seq[i].
 */
function _findBestInsertIdx(lat, lng) {
  if (_seq.length <= 1) return 0;
  var best = 0, bestScore = Infinity;
  for (var i = 0; i < _seq.length - 1; i++) {
    var a = _seq[i], b = _seq[i + 1];
    if (!a.lat || !a.lng || !b.lat || !b.lng) continue;
    var dAX = _haversinKm(+a.lat, +a.lng, lat, lng);
    var dXB = _haversinKm(lat, lng, +b.lat, +b.lng);
    var dAB = _haversinKm(+a.lat, +a.lng, +b.lat, +b.lng);
    var score = dAX + dXB - dAB;
    if (score < bestScore) { bestScore = score; best = i; }
  }
  return best;
}

/**
 * Adiciona ponto na posição geográfica correta da sequência
 * (critério de mínimo desvio). Usado pelos pins de sugestão ANTT no mapa.
 */
function addPontoNoMapa(local) {
  if (!local.lat || !local.lng) { addPontoNoFim(local); return; }
  var afterIdx = _findBestInsertIdx(+local.lat, +local.lng);
  _seq.splice(afterIdx + 1, 0, {
    idPonto: local.codigo, nomePonto: local.descricao,
    tipo: local.tipo || '', lat: local.lat || null, lng: local.lng || null, isNew: true
  });
  _pendingSelectIdx = afterIdx + 1;
  dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
  document.getElementById('insAfter').value = String(afterIdx + 1);
  // Rola a lista até o item inserido
  var list = document.getElementById('seqList');
  if (list) {
    var item = list.querySelector('[data-idx="' + (afterIdx + 1) + '"]');
    if (item) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    else list.scrollTop = (afterIdx + 1) * 48;
  }
}

// ============================================================
//  Save sequence
// ============================================================
function salvarSeq() {
  if (!_sel) { toast('Selecione um esquema.', 'error'); return; }
  var btn = document.getElementById('btnSalvSeq');
  btn.disabled = true; btn.textContent = 'Salvando…';

  loading('Salvando sequência…');
  google.script.run
    .withSuccessHandler(function() {
      doneLoading();
      _seq.forEach(function(p) { p.isNew = false; });
      _seqDirt = false;
      document.getElementById('ptUnsaved').style.display = 'none';
      btn.textContent = 'Salvar Sequência';
      btn.disabled = true;
      var formVis = document.getElementById('esqForm').style.display !== 'none';
      var nomeVal = document.getElementById('fNome').value.trim();
      if (!formVis || !nomeVal) {
        var s = document.getElementById('btnSalvar');
        if (s) s.disabled = true;
      }
      renderSeq();
      toast('Sequência salva! (' + _seq.length + ' pontos)', 'success');
    })
    .withFailureHandler(function(e) {
      doneLoading();
      btn.disabled = false; btn.textContent = 'Salvar Sequência';
      toast('Erro ao salvar: ' + (e.message || e), 'error');
    })
    .salvarSequenciaPontos(_sel.id_esquema, _seq.map(function(p) {
      return {
        idPonto: p.idPonto, nomePonto: p.nomePonto, tipo: p.tipo || '',
        horarioComercial: _comercialTimes[p.idPonto] || '',
        tempoLocal: _customStopTimes[p.idPonto] != null ? _customStopTimes[p.idPonto] : '',
        tipoTrecho: _legVia[p.idPonto] || ''
      };
    }));
}

// ============================================================
//  Utils
// ============================================================
function norm(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim();
}
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function hl(text, q) {
  if (!q) return esc(text);
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}
function loading(msg) {
  document.getElementById('ovlMsg').textContent = msg || 'Aguarde…';
  document.getElementById('ovl').classList.add('on');
}
function doneLoading() { document.getElementById('ovl').classList.remove('on'); }
function toast(msg, type, dur) {
  var w = document.getElementById('toastWrap');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0'; t.style.transition = 'opacity 0.3s';
    setTimeout(function() { t.remove(); }, 360);
  }, dur || 4000);
}
</script>
