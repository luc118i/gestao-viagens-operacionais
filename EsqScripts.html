function carregarPontos(idEsq) {
  loading('Carregando pontos…');
  google.script.run
    .withSuccessHandler(function(pontos) {
      doneLoading();
      _seq = pontos.map(function(p) {
        var l = _lMap[String(p.idPonto)] || {};
        // Nome exibido = o guardado no esquema (nomePonto); LOCAIS é só fallback.
        return { idPonto: p.idPonto, nomePonto: (p.nomePonto || l.descricao), tipo: p.tipo || '', lat: l.lat || null, lng: l.lng || null, isNew: false };
      });
      _seqDirt        = false;
      _osrmLegs       = undefined;
      _osrmSeqKey     = '';
      _osrmGeometry   = null;
      _comercialTimes = {};
      pontos.forEach(function(p) {
        var t = _normalizeHHMM(p.horarioComercial);
        if (t) _comercialTimes[p.idPonto] = t;
      });
      // tempo_local não é mais usado como fallback: parada vem da aba e, fora
      // dela, do padrão fixo de 30 min. _customStopTimes só guarda edições da sessão.
      _customStopTimes = {};
      _legVia = {};
      pontos.forEach(function(p) {
        if (p.tipoTrecho) _legVia[p.idPonto] = p.tipoTrecho;
      });
      try {
        var lsVia = JSON.parse(localStorage.getItem('vc_legVia_' + _sel.id_esquema) || '{}');
        Object.keys(lsVia).forEach(function(k) { if (!_legVia[k]) _legVia[k] = lsVia[k]; });
      } catch(e) {}
      _horStartIdx    = 0;
      renderSeq();
      updateInsAfter();
      updateMap();
      _updateImportBtn();
      document.getElementById('ptCard').style.display = '';
      document.getElementById('ptUnsaved').style.display = 'none';
      document.getElementById('btnSalvSeq').disabled = true;
      document.getElementById('hdrViewToggle').style.display = 'flex';
      document.getElementById('btnSalvar').style.display = '';
      document.getElementById('btnVolta').style.display  = '';
      document.getElementById('btnAnalisar').style.display = 'inline-flex';
      fecharModalEsquema();
      // Restaura config imediatamente (com _tipoViaVel padrão) para renderHorario ter os valores certos
      _restoreHorConfig(_sel);
      var savedView = 'mapa';
      try { savedView = localStorage.getItem('vc_view') || 'mapa'; } catch(e) {}
      toggleView(savedView);
      // Após carregar velocidades da planilha, atualiza e re-renderiza se necessário
      var _selSnap = _sel;
      google.script.run
        .withSuccessHandler(function(v) {
          if (!v || _sel !== _selSnap) return;
          _tipoViaVel = v;
          // Re-aplica customizações do usuário salvas no localStorage (prioridade sobre backend)
          try {
            var _lsCfg = JSON.parse(localStorage.getItem('vc_horcfg_' + _selSnap.id_esquema) || 'null');
            if (_lsCfg && _lsCfg.viaVel) {
              Object.keys(_lsCfg.viaVel).forEach(function(k) { _tipoViaVel[k] = _lsCfg.viaVel[k]; });
            }
          } catch(e) {}
          // Atualiza o campo de velocidade para o tipo ativo
          var via = '';
          document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
            if (b.classList.contains('active')) via = b.textContent.trim();
          });
          var viaKey = _VIA_LABEL_TO_KEY[via] || via;
          if (via && _tipoViaVel[viaKey]) {
            document.getElementById('horVelMedia').value = _tipoViaVel[viaKey];
          }
          if (_view === 'horario') _lastCalc ? _partialUpdateSchedule() : renderHorario();
        })
        .getTipoViaVelocidades(_selSnap.id_esquema);
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Erro ao carregar pontos: ' + (e.message || e), 'error');
    })
    .getPontosEsquemaParaFormulario(idEsq);
}

// ============================================================
//  Sequence
// ============================================================
function renderSeq() {
  var list = document.getElementById('seqList');
  var savedScroll = list ? list.scrollTop : 0;
  document.getElementById('ptCount').textContent = _seq.length;

  if (!_seq.length) {
    list.innerHTML = '<div class="seq-empty">Nenhum ponto. Busque acima para adicionar.</div>';
    return;
  }

  function dividerHtml(afterIdx) {
    return '<div class="seq-insert" data-after="' + afterIdx + '">'
      + '<div class="seq-insert-line"></div>'
      + '<span class="seq-insert-btn">+ inserir</span>'
      + '<div class="seq-insert-line"></div>'
      + '</div>';
  }

  var parts = [dividerHtml(-1)];
  _seq.forEach(function(p, i) {
    parts.push(
      '<div class="seq-item' + (p.isNew ? ' is-new' : '') + '" draggable="true" data-idx="' + i + '">'
      + '<span class="seq-drag" title="Arrastar para reordenar">⠿</span>'
      + '<span class="seq-num">' + (i + 1) + '</span>'
      + '<div class="seq-info">'
        + '<div class="seq-name" title="' + esc(p.nomePonto) + '">' + esc(p.nomePonto) + '</div>'
        + (p.tipo ? '<div class="seq-tipo">' + esc(p.tipo) + '</div>' : '')
      + '</div>'
      + (p.isNew ? '<span class="seq-new">novo</span>' : '')
      + '<button class="btn-icon rm" data-idx="' + i + '" title="Remover">' + ico('x',13) + '</button>'
      + '</div>'
    );
    parts.push(dividerHtml(i));
  });
  list.innerHTML = parts.join('');
  list.scrollTop = savedScroll;

  list.querySelectorAll('.seq-insert').forEach(function(el) {
    el.addEventListener('click', function() {
      document.getElementById('insAfter').value = el.getAttribute('data-after');
      document.getElementById('ptSearch').focus();
    });
  });

  list.querySelectorAll('.btn-icon.rm').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      _seq.splice(parseInt(btn.getAttribute('data-idx')), 1);
      _activeHorRow = null;
      dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
    });
  });

  var dragIdx = null;
  list.querySelectorAll('.seq-item').forEach(function(item) {
    item.addEventListener('dragstart', function(e) {
      dragIdx = parseInt(item.getAttribute('data-idx'));
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function() { item.classList.add('dragging'); }, 0);
    });
    item.addEventListener('dragend', function() {
      item.classList.remove('dragging');
      list.querySelectorAll('.seq-item').forEach(function(el) { el.classList.remove('drag-over'); });
      dragIdx = null;
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.seq-item').forEach(function(el) { el.classList.remove('drag-over'); });
      item.classList.add('drag-over');
    });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      var toIdx = parseInt(item.getAttribute('data-idx'));
      if (dragIdx === null || dragIdx === toIdx) return;
      var moved = _seq.splice(dragIdx, 1)[0];
      _seq.splice(toIdx, 0, moved);
      _pendingSelectIdx = toIdx;
      dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
    });
  });
}

function updateInsAfter() {
  var sel  = document.getElementById('insAfter');
  var prev = sel.value;
  sel.innerHTML = '<option value="-1">↑ No início da sequência</option>'
    + _seq.map(function(p, i) {
        return '<option value="' + i + '">Após ' + (i + 1) + '. ' + esc(p.nomePonto) + '</option>';
      }).join('');
  if (prev !== '-1' && parseInt(prev) < _seq.length) sel.value = prev;
  else sel.value = _seq.length > 0 ? String(_seq.length - 1) : '-1';
}

function _markDirty() {
  _seqDirt = true;
  document.getElementById('ptUnsaved').style.display = '';
  document.getElementById('btnSalvSeq').disabled = false;
  var s = document.getElementById('btnSalvar');
  if (s) { s.style.display = ''; s.disabled = false; }
}

function dirtySeq() {
  _seqDirt         = true;
  _osrmLegs        = undefined;
  _osrmSeqKey      = '';
  _osrmGeometry    = null;
  _horStartIdx     = 0;
  _clearAnttMapLayers();
  document.getElementById('ptUnsaved').style.display = '';
  document.getElementById('btnSalvSeq').disabled = false;
  var s = document.getElementById('btnSalvar');
  if (s) { s.style.display = ''; s.disabled = false; }
}

// ============================================================
//  Modal de esquema
// ============================================================
// ============================================================
//  Home — seleção por região (cards)
// ============================================================
var REGIOES_ORDEM  = ['Norte', 'Nordeste', 'Centro-Oeste', 'Sudeste', 'Sul'];
var PERIODOS_ORDEM = ['Madrugada (00–05)', 'Manhã (06–11)', 'Tarde (12–17)', 'Noite (18–23)', 'Sem horário'];
var _homeGroupKeys  = ['regiao'];  // array ordenado de chaves ativas
var _homeLocalFilter = '';         // texto digitado no autocomplete de local
var _homeLocalSel    = null;       // local selecionado: { codigo, descricao }
var _homeView       = 'grid';   // 'grid' | 'list'
var _homeHideEmpty  = false;    // ocultar esquemas sem pontos
var _homeSelectMode = false;
var _homeSelected   = {};      // { id_esquema: true }
var _pdfLoteList    = null;    // lista de esquemas para o batch (null = todos)

// Dimensões de agrupamento da home. keyOf(e) → rótulo do grupo; order (opcional)
// define a ordem fixa das seções.
var HOME_GROUPS = {
  regiao:  { order: REGIOES_ORDEM.concat('Outros'), keyOf: function(e){ return (e.regiao  && e.regiao.trim())  ? e.regiao.trim()  : 'Outros'; } },
  horario: { order: PERIODOS_ORDEM,                 keyOf: function(e){ return _periodoDe(e.horario); } },
  partida: { keyOf: function(e){ return (e.partida && String(e.partida).trim()) ? String(e.partida).trim() : 'Sem partida'; } },
  fim:     { keyOf: function(e){ return (e.fim     && String(e.fim).trim())     ? String(e.fim).trim()     : 'Sem encerramento'; } },
  linha:   { keyOf: function(e){ return (e.nome_linha && String(e.nome_linha).trim()) ? String(e.nome_linha).trim() : '—'; } },
  sentido: { order: ['Ida', 'Volta'],   keyOf: function(e){ return (e.sentido && String(e.sentido).trim()) ? String(e.sentido).trim() : '—'; } },
  // Eixo de busca por local: o usuário escolhe um local cadastrado e vê as
  // linhas que passam por ele. Casa por CÓDIGO do ponto (preciso), não por texto.
  // Sem local selecionado, não devolve seções (renderHome mostra o prompt).
  local:   { keysOf: function(e){
               var sel = _homeLocalSel;
               if (!sel) return [];
               var codSel = String(sel.codigo).trim();
               var has = (e.paradas || []).some(function(p){ return String(p.cod).trim() === codSel; });
               return has ? [sel.descricao || codSel] : [];
             } }
};

function mostrarHome() {
  // Reseta a navbar para o estado "home": esconde o seletor de esquema (redundante
  // aqui, já há busca + grid) e os controles do editor (toggle de view, salvar, volta).
  ['hdrEsqBtn', 'hdrViewToggle', 'btnSalvar', 'btnVolta', 'btnAnalisar'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.style.display = 'none';
  });
  _updateHdrEsq(null);

  try { var v = localStorage.getItem('vc_homeView'); if (v) setHomeView(v); } catch(e) {}
  try {
    var he = localStorage.getItem('vc_homeHideEmpty');
    if (he === '1' && !_homeHideEmpty) toggleHideEmpty();
  } catch(e) {}
  _updateGroupBar();
  renderHome();
  var h = document.getElementById('homeScreen');
  if (h) h.classList.add('open');
}

function esconderHome() {
  var h = document.getElementById('homeScreen');
  if (h) h.classList.remove('open');
  // Saindo para o editor: o seletor de esquema volta (mostra o esquema atual).
  var b = document.getElementById('hdrEsqBtn'); if (b) b.style.display = '';
}

function novoEsquemaHome() {
  esconderHome();
  abrirModalEsquema();
  novoEsquema();
}

function setHomeGroup(g) {
  if (!HOME_GROUPS[g]) return;

  // 'local' é um modo de busca exclusivo (não empilha com os outros eixos).
  if (g === 'local') {
    var jaLocal = _homeGroupKeys.length === 1 && _homeGroupKeys[0] === 'local';
    if (jaLocal) {
      _homeGroupKeys = ['regiao'];   // toggle off → volta ao padrão
      _homeLocalSel = null;
      _homeLocalFilter = '';
    } else {
      _homeGroupKeys = ['local'];     // entra no modo busca por local
    }
    _updateGroupBar();
    renderHome();
    if (_homeGroupKeys[0] === 'local') {
      var inp = document.getElementById('homeLocalInput');
      if (inp) { inp.value = ''; setTimeout(function(){ inp.focus(); }, 0); }
    }
    return;
  }

  // Escolher qualquer outro eixo sai do modo 'local'.
  if (_homeGroupKeys.indexOf('local') !== -1) { _homeGroupKeys = []; _homeLocalSel = null; }

  var idx = _homeGroupKeys.indexOf(g);
  if (idx !== -1) {
    // já está ativo: remove (mas mantém ao menos 1)
    if (_homeGroupKeys.length > 1) _homeGroupKeys.splice(idx, 1);
  } else {
    _homeGroupKeys.push(g);
  }
  if (!_homeGroupKeys.length) _homeGroupKeys = ['regiao'];
  _updateGroupBar();
  renderHome();
}

function _updateGroupBar() {
  var bar = document.getElementById('homeGroupBar');
  if (!bar) return;
  bar.querySelectorAll('.home-gbtn').forEach(function(b) {
    var g   = b.getAttribute('data-g');
    var idx = _homeGroupKeys.indexOf(g);
    var badge = b.querySelector('.home-gbtn-badge');
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'home-gbtn-badge';
      b.appendChild(badge);
    }
    if (idx !== -1) {
      b.classList.add('active');
      badge.textContent = _homeGroupKeys.length > 1 ? (idx + 1) : '';
      badge.style.display = _homeGroupKeys.length > 1 ? '' : 'none';
    } else {
      b.classList.remove('active');
      badge.style.display = 'none';
    }
  });

  // Filtro de local só aparece quando o eixo 'local' está ativo.
  var lf = document.getElementById('homeLocalFilter');
  if (lf) lf.style.display = (_homeGroupKeys.indexOf('local') !== -1) ? '' : 'none';
}

// ── Autocomplete de local ────────────────────────────────────
// Digita "PIRAPORA" → lista os locais cadastrados que casam; seleciona um →
// renderHome mostra as linhas que passam por aquele ponto (match por código).
function onHomeLocalInput(v) {
  _homeLocalFilter = v || '';
  _homeLocalSel = null;                 // digitar de novo limpa a seleção anterior
  renderLocalSuggestions();
  renderHome();
}

function renderLocalSuggestions() {
  var drop = document.getElementById('homeLocalDrop');
  if (!drop) return;
  var q = norm(_homeLocalFilter);
  if (!q) { drop.classList.remove('open'); drop.innerHTML = ''; return; }

  var list = (_locais || []).filter(function(l) {
    return norm(l.descricao).indexOf(q) !== -1 || norm(String(l.codigo)).indexOf(q) !== -1;
  }).slice(0, 50);

  if (!list.length) {
    drop.innerHTML = '<div class="home-localdrop-empty">Nenhum local encontrado</div>';
  } else {
    drop.innerHTML = list.map(function(l) {
      return '<div class="home-localdrop-opt" data-cod="' + esc(String(l.codigo)) + '">'
        + '<span class="home-localdrop-name">' + esc(l.descricao) + '</span>'
        + '<span class="home-localdrop-meta">' + esc(String(l.codigo))
        + (l.tipo ? ' · ' + esc(l.tipo) : '') + '</span></div>';
    }).join('');
  }
  drop.classList.add('open');
  drop.querySelectorAll('.home-localdrop-opt').forEach(function(el) {
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      selecionarLocalHome(el.getAttribute('data-cod'));
    });
  });
}

function selecionarLocalHome(cod) {
  var l = (_locais || []).find(function(x) { return String(x.codigo) === String(cod); });
  if (!l) return;
  _homeLocalSel = { codigo: l.codigo, descricao: l.descricao };
  _homeLocalFilter = l.descricao;
  var inp = document.getElementById('homeLocalInput');
  if (inp) inp.value = l.descricao;
  var drop = document.getElementById('homeLocalDrop');
  if (drop) drop.classList.remove('open');
  renderHome();
}

// Fecha o dropdown de local ao clicar fora dele.
document.addEventListener('click', function(e) {
  if (!e.target.closest('#homeLocalInput') && !e.target.closest('#homeLocalDrop')) {
    var d = document.getElementById('homeLocalDrop');
    if (d) d.classList.remove('open');
  }
});

function toggleHideEmpty() {
  _homeHideEmpty = !_homeHideEmpty;
  var btn = document.getElementById('homeBtnHideEmpty');
  if (btn) btn.classList.toggle('active', _homeHideEmpty);
  try { localStorage.setItem('vc_homeHideEmpty', _homeHideEmpty ? '1' : ''); } catch(e) {}
  renderHome();
}

function setHomeView(v) {
  _homeView = v;
  var gBtn = document.getElementById('homeBtnViewGrid');
  var lBtn = document.getElementById('homeBtnViewList');
  if (gBtn) gBtn.classList.toggle('active', v === 'grid');
  if (lBtn) lBtn.classList.toggle('active', v === 'list');
  try { localStorage.setItem('vc_homeView', v); } catch(e) {}
  renderHome();
}

function _sortedGroupKeys(groups, cfg) {
  var present = Object.keys(groups);
  if (!cfg.order) return present.sort(function(a, b) { return a.localeCompare(b, 'pt-BR'); });
  var fixed = cfg.order.filter(function(k) { return groups[k]; });
  var rest  = present.filter(function(k) { return cfg.order.indexOf(k) === -1; })
                     .sort(function(a, b) { return a.localeCompare(b, 'pt-BR'); });
  return fixed.concat(rest);
}

function _sortItems(items) {
  return items.sort(function(a, b) {
    return String(a.horario || '~').localeCompare(String(b.horario || '~'))
        || norm(a.nome_linha).localeCompare(norm(b.nome_linha));
  });
}

var _LIST_HEADER = '<div class="home-list-header">'
  + '<span>Linha</span><span style="text-align:center;">Hor.</span>'
  + '<span>Partida</span><span>Encerramento</span><span>Sentido</span><span></span>'
  + '</div>';

function _renderItems(items, isList) {
  return isList
    ? '<div class="home-list">' + _LIST_HEADER + _sortItems(items).map(_homeRowHtml).join('') + '</div>'
    : '<div class="home-cards">' + _sortItems(items).map(_homeCardHtml).join('') + '</div>';
}

function _renderGroups(esqs, keys, depth, isList) {
  // keys: array de chaves de agrupamento restantes
  if (!keys.length) return _renderItems(esqs, isList);
  var cfg    = HOME_GROUPS[keys[0]] || HOME_GROUPS.regiao;
  var rest   = keys.slice(1);
  var groups = {};
  esqs.forEach(function(e) {
    // Eixos N:N usam keysOf (array); os demais, keyOf (chave única).
    var ks = cfg.keysOf ? cfg.keysOf(e) : [cfg.keyOf(e) || '—'];
    ks.forEach(function(k) {
      if (!k) return;
      (groups[k] = groups[k] || []).push(e);
    });
  });
  var sorted = _sortedGroupKeys(groups, cfg);
  if (!sorted.length) return '<div class="home-empty">Nenhum esquema.</div>';
  return sorted.map(function(rk) {
    var inner = _renderGroups(groups[rk], rest, depth + 1, isList);
    var cls   = depth === 0 ? 'home-region' : 'home-subregion';
    var hcls  = depth === 0 ? 'home-region-h' : 'home-subregion-h';
    return '<section class="' + cls + '">'
      + '<div class="' + hcls + '"><span class="home-region-name">' + esc(rk) + '</span>'
      + '<span class="home-region-c">' + groups[rk].length + '</span></div>'
      + inner
      + '</section>';
  }).join('');
}

function renderHome() {
  var body = document.getElementById('homeBody');
  if (!body) return;

  var esqs = _homeHideEmpty ? _esqs.filter(function(e) { return e.temPontos; }) : _esqs;

  if (!esqs.length) {
    body.innerHTML = '<div class="home-empty">Nenhum esquema cadastrado.</div>';
    body.classList.toggle('selecting', _homeSelectMode);
    return;
  }

  var isList = (_homeView === 'list');

  // Modo busca por local: sem local selecionado, mostra orientação em vez de
  // despejar todas as paradas.
  if (_homeGroupKeys.length === 1 && _homeGroupKeys[0] === 'local' && !_homeLocalSel) {
    body.innerHTML = '<div class="home-empty">'
      + (_homeLocalFilter
          ? 'Selecione um local na lista para ver as linhas que passam por ele.'
          : 'Digite o nome de um local ou cidade (ex.: <strong>Pirapora</strong>) e selecione-o para ver as linhas que passam por ali.')
      + '</div>';
    body.classList.toggle('selecting', _homeSelectMode);
    return;
  }

  body.innerHTML = _renderGroups(esqs, _homeGroupKeys, 0, isList);

  body.classList.toggle('selecting', _homeSelectMode);
  body.querySelectorAll('.home-card, .home-row').forEach(function(el) {
    var id = el.getAttribute('data-id');
    if (_homeSelectMode && _homeSelected[id]) el.classList.add('selected');
    el.addEventListener('click', function() {
      var esq = _esqs.find(function(e) { return e.id_esquema === id; });
      if (_homeSelectMode) {
        if (esq && esq.temPontos) _toggleHomeSel(id, el);
        return;
      }
      if (esq) selecionarEsq(esq);
    });
    // Clique do scroll (botão do meio) abre o esquema em outra aba.
    el.addEventListener('auxclick', function(ev) {
      if (ev.button !== 1) return;
      ev.preventDefault();
      _abrirEsqNovaAba(id);
    });
    // Evita o autoscroll do navegador ao pressionar o botão do meio.
    el.addEventListener('mousedown', function(ev) {
      if (ev.button === 1) ev.preventDefault();
    });
  });
}

// Abre o editor de um esquema numa nova aba (deep-link ?page=manager&esq=ID).
function _abrirEsqNovaAba(id) {
  if (!id) return;
  if (typeof WEB_APP_URL === 'undefined' || !WEB_APP_URL) {
    toast('URL do app indisponível para abrir em nova aba.', 'error');
    return;
  }
  window.open(WEB_APP_URL + '?page=manager&esq=' + encodeURIComponent(id), '_blank');
}

function _homeCardHtml(e) {
  var cor   = _lineColor(e.nome_linha || e.id_esquema);
  var vazio = !e.temPontos;
  return '<div class="home-card' + (vazio ? ' no-points' : '') + '" data-id="' + esc(e.id_esquema) + '" style="border-left-color:' + cor + ';">'
    + '<div class="home-card-top">'
    +   '<span class="home-card-check">' + ico('check', 12) + '</span>'
    +   '<span class="home-card-id">#' + esc(e.id_esquema) + '</span>'
    +   (vazio ? '<span class="home-card-nopts">sem pontos</span>' : _sentidoTag(e.sentido))
    + '</div>'
    + '<div class="home-card-name">' + esc(e.nome_linha || ('Esquema #' + e.id_esquema)) + '</div>'
    + (e.horario ? '<div class="home-card-hor-row">' + ico('clock', 12) + ' <strong>' + esc(e.horario) + '</strong></div>' : '')
    + '<div class="home-card-meta">'
    +   (e.partida ? '<span class="home-card-loc">' + ico('send', 10)    + ' ' + esc(e.partida) + '</span>' : '')
    +   (e.fim     ? '<span class="home-card-loc">' + ico('map-pin', 10) + ' ' + esc(e.fim)     + '</span>' : '')
    + '</div>'
    + '<button class="home-card-del" title="Excluir esquema" onclick="confirmarExclusao(event,\'' + esc(e.id_esquema) + '\',\'' + esc(e.nome_linha || e.id_esquema) + '\')">'
    +   ico('x', 13)

}

function _homeRowHtml(e) {
  var cor   = _lineColor(e.nome_linha || e.id_esquema);
  var vazio = !e.temPontos;
  return '<div class="home-row' + (vazio ? ' no-points' : '') + '" data-id="' + esc(e.id_esquema) + '" style="border-left-color:' + cor + ';">'
    // Coluna LINHA: check + id + nome (tudo junto)
    + '<span class="home-row-name">'
    +   '<span class="home-row-check">' + ico('check', 11) + '</span>'
    +   '<span class="home-row-id">#' + esc(e.id_esquema) + '</span>'
    +   '<span class="home-row-label">' + esc(e.nome_linha || ('Esquema #' + e.id_esquema)) + '</span>'

    + '</span>'

    + '<span class="home-row-loc">' + (e.partida ? esc(e.partida) : '—') + '</span>'
    + '<span class="home-row-loc">' + (e.fim     ? esc(e.fim)     : '—') + '</span>'
    + '<span class="home-row-sent">' + _sentidoTag(e.sentido) + '</span>'
    + '<button class="home-card-del" title="Excluir" onclick="confirmarExclusao(event,\'' + esc(e.id_esquema) + '\',\'' + esc(e.nome_linha || e.id_esquema) + '\')">' + ico('x', 12) + '</button>'
    + '</div>';
}

function _sentidoTag(s) {
  var t = String(s || '').toLowerCase();
  var cls = t.indexOf('volta') !== -1 ? 'tag-volta'
          : 'tag-ida';
  return '<span class="home-tag ' + cls + '">' + esc(s || '—') + '</span>';
}

function _periodoDe(hhmm) {
  var h = parseInt(String(hhmm || '').split(':')[0], 10);
  if (isNaN(h)) return 'Sem horário';
  if (h < 6)  return 'Madrugada (00–05)';
  if (h < 12) return 'Manhã (06–11)';
  if (h < 18) return 'Tarde (12–17)';
  return 'Noite (18–23)';
}

// Cor determinística por linha (mesma linha → mesma cor)
function _lineColor(key) {
  var s = String(key || ''), h = 0;
  for (var i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; }
  return 'hsl(' + (h % 360) + ', 62%, 52%)';
}

function _executarExclusao(idEsquema, nomeLinha) {
  var overlay = document.getElementById('homeDelOverlay');
  if (overlay) overlay.remove();
  loading('Excluindo esquema…');
  google.script.run
    .withSuccessHandler(function() {
      doneLoading();
      _esqs = _esqs.filter(function(e) { return e.id_esquema !== idEsquema; });
      if (_sel && _sel.id_esquema === idEsquema) { _sel = null; _seq = []; _seqDirt = false; }
      delete _homeSelected[idEsquema];
      renderHome();
      toast('Esquema "' + nomeLinha + '" excluído.', 'success', 3500);
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Erro ao excluir: ' + (e.message || e), 'error');
    })
    .excluirEsquema(idEsquema);
}

function _toggleHomeSel(id, el) {

  if (m) m.remove();

function pdfLoteModeSelect(mode) {
  var isCom = (mode === 'comercial');
  var nLbl = document.getElementById('pdfLoteModeNormalLabel');
  var cLbl = document.getElementById('pdfLoteModeComercialLabel');
  if (nLbl) { nLbl.style.borderColor = isCom ? '#d4d8e8' : '#f47920'; nLbl.style.background = isCom ? '#fff' : '#fff8f0'; }
  if (cLbl) { cLbl.style.borderColor = isCom ? '#f47920' : '#d4d8e8'; cLbl.style.background = isCom ? '#fff8f0' : '#fff'; }
  var nr = document.querySelector('input[name="pdfLoteMode"][value="normal"]');
  var cr = document.querySelector('input[name="pdfLoteMode"][value="comercial"]');
  if (nr) nr.checked = !isCom;
  if (cr) cr.checked =  isCom;
  ['comercial','dif'].forEach(function(k) {
    var lbl = document.getElementById('pdfLoteColLabel_' + k);
    if (lbl) { lbl.style.opacity = isCom ? '0.4' : ''; lbl.style.pointerEvents = isCom ? 'none' : ''; }
  });
}

function gerarPdfsLote() {
  ['chegada','parada','saida','desl','comercial','dif'].forEach(function(k) {
    var el = document.getElementById('pdfLoteCol_' + k);
    if (el) _pdfCols[k] = el.checked;
  });
  var mEl = document.querySelector('input[name="pdfLoteMode"]:checked');
  _pdfMode = mEl ? mEl.value : 'normal';
  _savePdfPrefs();

  var esqList = ((_pdfLoteList && _pdfLoteList.length) ? _pdfLoteList : _esqs)
                  .filter(function(e) { return e.temPontos; });
  fecharModalPdfLote();
  if (!esqList.length) { toast('Nenhum esquema para gerar.', 'error'); return; }

  // Antes de gerar: identifica esquemas que produziriam o mesmo nome de arquivo
  // (mesma linha, horário e sentido) e abre um aviso para revisão.
  var dups = _detectarDuplicadosLote(esqList);
  if (dups.length) { _abrirModalDuplicados(esqList, dups); return; }

  _iniciarLoteServer(esqList);
}

// Agrupa os esquemas pelo nome de arquivo final; retorna só os grupos com 2+ itens.
function _detectarDuplicadosLote(esqList) {
  var byName = {};
  esqList.forEach(function(e) {
    var k = _loteFilename(e).toLowerCase();
    (byName[k] = byName[k] || []).push(e);
  });
  return Object.keys(byName)
    .filter(function(k) { return byName[k].length > 1; })
    .map(function(k) { return byName[k]; });
}

function _iniciarLoteServer(esqList) {
  loading('Preparando dados…');
  google.script.run
    .withSuccessHandler(function(pontosByEsq) {
      pontosByEsq = pontosByEsq || {};
      var seen = {}, allPairs = [];
      esqList.forEach(function(e) {
        var pts = (pontosByEsq[e.id_esquema] || []).filter(function(p) {
          var l = _lMap[String(p.idPonto)]; return l && l.lat && l.lng;
        });
        for (var i = 0; i < pts.length - 1; i++) {
          var a = pts[i].idPonto, b = pts[i + 1].idPonto;
          var k = a <= b ? a + ':' + b : b + ':' + a;
          if (!seen[k]) { seen[k] = 1; allPairs.push({ a: a, b: b }); }
        }
      });
      if (!allPairs.length) { _processLote(esqList, pontosByEsq, {}); return; }
      google.script.run
        .withSuccessHandler(function(cacheMap) { _processLote(esqList, pontosByEsq, cacheMap || {}); })
        .withFailureHandler(function() { _processLote(esqList, pontosByEsq, {}); })
        .getDistanciasCached(allPairs);
    })
    .withFailureHandler(function(e) { doneLoading(); toast('Erro ao carregar pontos: ' + (e.message || e), 'error'); })
    .getTodosPontosParaFormulario();
}

        + '<div style="font-size:14px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;">' + ico('alert-triangle', 15) + ' Esquemas duplicados</div>'
        + '<button onclick="_fecharModalDup()" style="background:none;border:none;color:#9aa0ad;cursor:pointer;padding:4px;display:flex;">' + ico('x', 15) + '</button>'
      + '</div>'
      + '<div style="padding:18px 20px;overflow-y:auto;">'
        + '<p style="font-size:13px;color:#3a3f52;margin:0 0 12px;">' + dups.length + (dups.length === 1 ? ' nome de arquivo se repete' : ' nomes de arquivo se repetem')
          + ' (mesma linha, horário e sentido). Se gerar assim, os repetidos recebem sufixo <strong>(2)</strong>, <strong>(3)</strong>… Revise os esquemas abaixo se forem duplicatas indevidas.</p>'
        + listHtml
      + '</div>'
      + '<div style="padding:12px 20px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid #eef0f6;flex-shrink:0;">'

      + '</div>'
    + '</div></div>';
  document.body.insertAdjacentHTML('beforeend', modal);
  document.getElementById('pdfDupOverlay').addEventListener('click', function(e) { if (e.target === this) _fecharModalDup(); });
}

function _fecharModalDup() {
  var m = document.getElementById('pdfDupOverlay');
  if (m) m.remove();
  _loteDupPending = null;
}

function _confirmarLoteComDup() {
  var lista = _loteDupPending;
  _fecharModalDup();
  if (lista && lista.length) _iniciarLoteServer(lista);
}

// ── Importação de CSV ────────────────────────────────────────
// Ordem das colunas da aba LOCAIS (0..28) com aliases de cabeçalho normalizados.
var _LOC_HEADERS = [
  ['codigo'], ['cod emb'], ['desc resumida'], ['descricao'],
  ['unidade empresarial', 'unidade'], ['tipo'], ['ajuste horario'], ['raio'],
  ['raio advert'], ['vel'], ['grupo pc'], ['dist uso vel'], ['codigo externo'],
  ['ativo'], ['pedagio'], ['rodoviaria'], ['suspensao'], ['garagem'], ['online'],
  ['auxiliar', 'auxlilar'], ['seletivo'], ['ponto vel'], ['area vel'], ['direcoes'],
  ['latitude'], ['longitude'], ['chave'], ['data cadastro'], ['data alteracao']
];

function _normHdr(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, ' ').trim();
}

function _coerceCsv(v) {
  var s = String(v == null ? '' : v).trim();
  if (s === '') return '';
  if (/^-?\d+(?:\.\d+)?$/.test(s)) return Number(s);
  return s;
}

// Parser CSV: aspas, vírgulas internas, CRLF e quebras dentro de aspas.
function _parseCSV(text) {
  var rows = [], row = [], cur = '', q = false, i = 0, c;
  for (; i < text.length; i++) {
    c = text[i];
    if (q) {
      if (c === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else q = false; }
      else cur += c;
    } else {
      if (c === '"') q = true;
      else if (c === ',') { row.push(cur); cur = ''; }
      else if (c === '\r') { /* ignora */ }
      else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
      else cur += c;
    }
  }
  if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function massaCsvFile(input) {
  var file = input && input.files && input.files[0];
  if (!file) return;
  var upd = !!(_massa.import && _massa.import.atualizar);
  _massa.import = { rows: [], fileName: file.name, atualizar: upd };
  massaMsg('Lendo ' + file.name + '…', 'info');
  var reader = new FileReader();
  reader.onload = function() {
    try { _processarCsv(String(reader.result || '')); }
    catch (e) { massaMsg('Erro ao ler CSV: ' + (e.message || e), 'error'); }
  };
  reader.onerror = function() { massaMsg('Não consegui ler o arquivo.', 'error'); };
  // O export vem em Latin-1 (ISO-8859-1) — preserva os acentos.
  reader.readAsText(file, 'ISO-8859-1');
}

function _processarCsv(text) {
  var grid = _parseCSV(text).filter(function(r) {
    return r.some(function(c) { return String(c).trim() !== ''; });
  });
  if (grid.length < 2) { massaMsg('CSV sem linhas de dados.', 'error'); return; }

  // Mapa: índice da coluna no CSV → índice na aba LOCAIS
  var header = grid[0].map(_normHdr);
  var csvToLoc = header.map(function(h) {
    for (var li = 0; li < _LOC_HEADERS.length; li++) {
      if (_LOC_HEADERS[li].indexOf(h) !== -1) return li;
    }
    return -1;
  });
  if (csvToLoc.indexOf(0) === -1) { massaMsg('O cabeçalho não tem a coluna "Código". Confira o arquivo.', 'error'); return; }

  var rows = [];
  for (var r = 1; r < grid.length; r++) {
    var arr = new Array(_LOC_HEADERS.length).fill('');
    grid[r].forEach(function(val, j) {
      var li = csvToLoc[j];
      if (li >= 0) arr[li] = _coerceCsv(val);
    });
    var cod = String(arr[0]).trim();
    var status = !cod ? 'erro' : (_lMap[cod] ? 'existe' : 'novo');
    rows.push({ arr: arr, codigo: cod, descricao: String(arr[3] || ''), tipo: String(arr[5] || ''),
                lat: arr[24], lng: arr[25], status: status });
  }
  // Duplicado dentro do próprio arquivo → marca como 'existe' a partir da 2ª ocorrência
  var seen = {};
  rows.forEach(function(it) {
    if (it.status === 'novo') {
      if (seen[it.codigo]) it.status = 'existe';
      else seen[it.codigo] = true;
    }
  });

  _massa.import.rows = rows;
  _aplicarModoAtualizarImport();
  massaMsg('');
  renderImportTable();
  renderMassaFoot();
}

// Reflete a flag "atualizar existentes" nos status das linhas (existe <-> atualizar).
function _aplicarModoAtualizarImport() {
  var imp = _massa.import; if (!imp) return;
  (imp.rows || []).forEach(function(r) {
    if (imp.atualizar && r.status === 'existe')   r.status = 'atualizar';
    else if (!imp.atualizar && r.status === 'atualizar') r.status = 'existe';
  });
}

function massaImportToggleUpd(checked) {
  if (!_massa.import) return;
  _massa.import.atualizar = !!checked;
  _aplicarModoAtualizarImport();
  renderImportTable();
  renderMassaFoot();
}

function renderImportTable() {
  var box = document.getElementById('massaImportBox'); if (!box) return;
  var data = (_massa.import && _massa.import.rows) || [];
  if (!data.length) { box.innerHTML = ''; return; }
  var nNovo = data.filter(function(r) { return r.status === 'novo'; }).length;
  var nUpd  = data.filter(function(r) { return r.status === 'atualizar'; }).length;
  var nEx   = data.filter(function(r) { return r.status === 'existe'; }).length;
  var nErr  = data.filter(function(r) { return r.status === 'erro'; }).length;
  var nOk   = data.filter(function(r) { return r.status === 'importado' || r.status === 'atualizado'; }).length;

  var badge = {
    novo:       '<span class="imp-b imp-novo">Novo</span>',
    atualizar:  '<span class="imp-b imp-upd">Atualizar</span>',
    existe:     '<span class="imp-b imp-existe">Já existe</span>',
    erro:       '<span class="imp-b imp-erro">Erro</span>',
    importado:  '<span class="imp-b imp-ok">Importado</span>',
    atualizado: '<span class="imp-b imp-ok">Atualizado</span>'
  };
  var head = '<div class="imp-sum"><strong>' + data.length + '</strong> linha(s) · '
    + '<span style="color:#1e7d43;">' + nNovo + ' novo(s)</span>'
    + (nUpd ? ' · <span style="color:#c47f17;">' + nUpd + ' p/ atualizar</span>' : '')
    + (nEx  ? ' · <span style="color:#7a8299;">' + nEx + ' já existe(m)</span>' : '')
    + (nErr ? ' · <span style="color:#c62828;">' + nErr + ' erro</span>' : '')
    + (nOk  ? ' · <span style="color:#1e7d43;">' + nOk + ' gravado(s)</span>' : '') + '</div>';

  var rowsHtml = data.map(function(r) {
    var skip = (r.status === 'existe' || r.status === 'erro');
    return '<tr class="' + (skip ? 'imp-row-skip' : '') + '">'
      + '<td>' + (badge[r.status] || '') + '</td>'
      + '<td>' + esc(r.codigo || '—') + '</td>'
      + '<td>' + esc(r.descricao || '') + '</td>'
      + '<td>' + esc(r.tipo || '') + '</td>'
      + '<td class="imp-num">' + esc(r.lat === '' ? '' : String(r.lat)) + '</td>'
      + '<td class="imp-num">' + esc(r.lng === '' ? '' : String(r.lng)) + '</td>'
      + '</tr>';
  }).join('');

  box.innerHTML = head
    + '<div class="imp-table-wrap"><table class="imp-table">'
    + '<thead><tr><th>Status</th><th>Código</th><th>Descrição</th><th>Tipo</th><th>Lat</th><th>Lng</th></tr></thead>'
    + '<tbody>' + rowsHtml + '</tbody></table></div>';
}

function massaImportSalvar() {
  var data = (_massa.import && _massa.import.rows) || [];
  var gravar = data.filter(function(r) { return r.status === 'novo' || r.status === 'atualizar'; });
  if (!gravar.length) { massaMsg('Nenhuma linha para gravar.', 'error'); return; }
  var atualizar = !!(_massa.import && _massa.import.atualizar);
  var btn = document.getElementById('massaBtnImp');
  if (btn) { btn.disabled = true; btn.textContent = 'Importando…'; }
  massaMsg('');
  var payload = gravar.map(function(r) { return r.arr; });
  google.script.run
    .withSuccessHandler(function(res) {
      res = res || { imported: [], updated: [], skipped: [] };
      var impSet = {}, updSet = {};
      (res.imported || []).forEach(function(c) { impSet[String(c)] = true; });
      (res.updated  || []).forEach(function(c) { updSet[String(c)] = true; });
      data.forEach(function(r) {
        var obj = { codigo: r.codigo, descricao: r.descricao, tipo: r.tipo,
                    lat: (r.lat === '' ? null : Number(r.lat)), lng: (r.lng === '' ? null : Number(r.lng)) };
        if (impSet[r.codigo]) { r.status = 'importado'; _locais.push(obj); _lMap[r.codigo] = obj; }
        else if (updSet[r.codigo]) { r.status = 'atualizado'; _lMap[r.codigo] = obj; }
      });
      renderImportTable(); renderMassaFoot();
      var nImp = (res.imported || []).length, nUpd = (res.updated || []).length;
      var partes = [];
      if (nImp) partes.push(nImp + ' importado(s)');
      if (nUpd) partes.push(nUpd + ' atualizado(s)');
      if ((res.skipped || []).length) partes.push((res.skipped).length + ' pulado(s)');
      massaMsg(partes.join(' · ') || 'Nada a gravar.', 'success');
      toast((nImp + nUpd) + ' ponto(s) gravado(s).', 'success', 4000);
    })
    .withFailureHandler(function(e) {
      var b = document.getElementById('massaBtnImp');
      if (b) { b.disabled = false; b.textContent = 'Importar'; }
      massaMsg('Erro ao importar: ' + (e.message || e), 'error');
    })
    .importarLocais(payload, atualizar);
}

// ── Ajuste de rota (aba 'rota') ──────────────────────────────
function _massaRotaTouch() { /* hook de digitação (reservado) */ }

function _parseTempoMin(s) {
  s = String(s || '').trim();
  if (!s) return 0;
  if (s.indexOf(':') !== -1) { var p = s.split(':'); return (parseInt(p[0], 10) || 0) * 60 + (parseInt(p[1], 10) || 0); }
  var m = s.match(/(\d+)\s*h\s*(\d+)?/i);
  if (m) return (parseInt(m[1], 10) || 0) * 60 + (parseInt(m[2], 10) || 0);
  return parseInt(s, 10) || 0;
}
function _fmtMin(min) {
  min = Math.round(min || 0); var h = Math.floor(min / 60), m = min % 60;
  return h ? (h + 'h' + (m ? (' ' + m + 'min') : '')) : (m + 'min');
}

// Linhas onde A e B são paradas consecutivas (qualquer sentido).
function _linhasComTrecho(codA, codB) {
  if (!codA || !codB) return [];
  return _esqs.filter(function(e) {
    var ps = e.paradas || [];
    for (var i = 0; i < ps.length - 1; i++) {
      var a = String(ps[i].cod), b = String(ps[i + 1].cod);
      if ((a === codA && b === codB) || (a === codB && b === codA)) return true;
    }
    return false;
  });
}

function renderRotaPreview() {
  var box = document.getElementById('massaRotaPreview'); if (!box) return;
  if (!_massa.ra || !_massa.rb) { box.innerHTML = ''; return; }

  box.innerHTML = '<div class="massa-prev" style="margin-top:12px;">'
    + '<div class="massa-prev-h"><strong>' + afet.length + '</strong> linha(s) usam este trecho (A↔B consecutivos)</div>'
    + (afet.length
        ? '<div class="massa-prev-list">' + afet.map(function(e) { return '<div>' + esc(e.id_esquema + ' — ' + e.nome_linha) + '</div>'; }).join('') + '</div>'
        : '<div class="massa-prev-empty">Nenhuma linha tem A e B consecutivos hoje. O ajuste fica salvo e passa a valer quando isso ocorrer.</div>')
    + '</div>';
}

function renderRotasList() {

      + '</div>';
  }).join('');

function _refreshRotas(cb) {

    .withSuccessHandler(function(list) { _setRotasAjust(list || []); if (cb) cb(); })
    .withFailureHandler(function() { if (cb) cb(); })
    .getRotasAjustadas();
}

function massaRotaSalvar() {
  if (!_massa.ra || !_massa.rb) { massaMsg('Selecione os pontos A e B.', 'error'); return; }

  var min = _parseTempoMin((document.getElementById('ra_tempo') || {}).value);

function massaRotaExcluir(codA, codB) {

// ── Mapa-arrasta do ajuste de rota (Leaflet + OSRM) ──────────
var _rotaMap = null, _rotaLine = null, _rotaVias = [], _rotaViaMarkers = [], _rotaABMarkers = [];
var _rotaResult = { km: 0, min: 0, geom: null };

function _rotaHasCoords(p) { return !!(p && p.lat != null && p.lng != null && !isNaN(+p.lat) && !isNaN(+p.lng)); }

function _rotaPointsChanged() {
  if (!_massa || _massa.tab !== 'rota') return;
  var status = document.getElementById('rotaMapStatus');
  var clearBtn = document.getElementById('rotaBtnClear');
  var a = _massa.ra, b = _massa.rb;
  if (!_rotaHasCoords(a) || !_rotaHasCoords(b)) {
    if (status) status.textContent = (a && b)
      ? 'Um dos pontos não tem coordenadas — informe km/tempo manualmente.'
      : 'Selecione A e B (com coordenadas) para abrir o mapa.';
    _rotaDestroyMap();
    if (clearBtn) clearBtn.style.display = 'none';
    return;
  }
  _rotaVias = [];
  _rotaInitMap();
  _rotaRoute();
}

function _rotaInitMap() {
  var el = document.getElementById('rotaMap'); if (!el || typeof L === 'undefined') return;
  _rotaDestroyMap();
  _rotaMap = L.map(el, { zoomControl: true, attributionControl: false });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, crossOrigin: true }).addTo(_rotaMap);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19, opacity: 0.85, crossOrigin: true }).addTo(_rotaMap);
  setTimeout(function() { if (_rotaMap) _rotaMap.invalidateSize(); }, 80);
}

function _rotaDestroyMap() {
  if (_rotaMap) { try { _rotaMap.remove(); } catch (e) {} _rotaMap = null; }
  _rotaLine = null; _rotaViaMarkers = []; _rotaABMarkers = [];
}

function _rotaWaypoints() {
  var wp = [];
  if (_rotaHasCoords(_massa.ra)) wp.push({ lat: +_massa.ra.lat, lng: +_massa.ra.lng });
  _rotaVias.forEach(function(v) { wp.push({ lat: v.lat, lng: v.lng }); });
  if (_rotaHasCoords(_massa.rb)) wp.push({ lat: +_massa.rb.lat, lng: +_massa.rb.lng });
  return wp;
}

function _rotaRoute() {
  if (!_rotaMap) return;
  var wp = _rotaWaypoints(); if (wp.length < 2) return;
  var status = document.getElementById('rotaMapStatus');
  if (status) status.textContent = 'Calculando rota…';
  var coords = wp.map(function(p) { return (+p.lng).toFixed(6) + ',' + (+p.lat).toFixed(6); }).join(';');
  var url = 'https://router.project-osrm.org/route/v1/driving/' + coords + '?overview=full&geometries=geojson&continue_straight=false';
  fetch(url).then(function(r) { return r.ok ? r.json() : Promise.reject('http'); })
    .then(function(data) {
      if (!data || data.code !== 'Ok' || !data.routes || !data.routes[0]) return Promise.reject('no-route');
      var route = data.routes[0];
      var km  = Math.round(route.distance / 100) / 10;
      var min = Math.round(route.duration / 60);
      var geom = (route.geometry && route.geometry.coordinates) ? route.geometry.coordinates.map(function(c) { return [c[1], c[0]]; }) : [];
      _rotaResult = { km: km, min: min, geom: geom };
      _rotaDrawRoute(geom, wp);
      var kmEl = document.getElementById('ra_km');    if (kmEl) kmEl.value = km;
      var tEl  = document.getElementById('ra_tempo'); if (tEl)  tEl.value = _hhmmFromMin(min);
      if (status) status.textContent = km + ' km · ' + _fmtMin(min) + (_rotaVias.length ? (' · ' + _rotaVias.length + ' desvio(s)') : ' · rota direta');
      var cb = document.getElementById('rotaBtnClear'); if (cb) cb.style.display = _rotaVias.length ? '' : 'none';
    })
    .catch(function() { if (status) status.textContent = 'Não consegui rotear (OSRM). Informe km/tempo manualmente.'; });
}

function _hhmmFromMin(min) { min = Math.round(min || 0); var h = Math.floor(min / 60), m = min % 60; return h + ':' + ('0' + m).slice(-2); }

function _rotaDrawRoute(geom, wp) {
  if (!_rotaMap) return;
  if (_rotaLine) { _rotaMap.removeLayer(_rotaLine); _rotaLine = null; }
  _rotaLine = L.polyline(geom, { color: '#f47920', weight: 5, opacity: 0.9 }).addTo(_rotaMap);
  _rotaLine.on('click', function(e) { _rotaAddVia(e.latlng); });

  _rotaABMarkers.forEach(function(m) { _rotaMap.removeLayer(m); });
  _rotaABMarkers = [];
  var aLL = wp[0], bLL = wp[wp.length - 1];
  _rotaABMarkers.push(L.circleMarker([aLL.lat, aLL.lng], { radius: 7, color: '#fff', weight: 2, fillColor: '#22c55e', fillOpacity: 1 }).addTo(_rotaMap).bindTooltip('A', { permanent: false }));
  _rotaABMarkers.push(L.circleMarker([bLL.lat, bLL.lng], { radius: 7, color: '#fff', weight: 2, fillColor: '#ef4444', fillOpacity: 1 }).addTo(_rotaMap).bindTooltip('B', { permanent: false }));

  _rotaViaMarkers.forEach(function(m) { _rotaMap.removeLayer(m); });
  _rotaViaMarkers = [];
  _rotaVias.forEach(function(v, idx) {
    var mk = L.marker([v.lat, v.lng], { draggable: true, icon: _rotaViaIcon() }).addTo(_rotaMap);
    mk.bindTooltip('Arraste para ajustar · clique-direito remove', { direction: 'top' });
    mk.on('drag', function(e) { var ll = e.target.getLatLng(); _rotaVias[idx] = { lat: ll.lat, lng: ll.lng }; });
    mk.on('dragend', function() { _rotaSortVias(); _rotaRoute(); });
    mk.on('contextmenu', function() { _rotaVias.splice(idx, 1); _rotaRoute(); });
    _rotaViaMarkers.push(mk);
  });

  if (_rotaVias.length === 0) {
    try { _rotaMap.fitBounds(_rotaLine.getBounds(), { padding: [30, 30], maxZoom: 12 }); } catch (e) {}
  }
}

function _rotaViaIcon() {
  return L.divIcon({ className: '', iconSize: [16, 16], iconAnchor: [8, 8],
    html: '<div style="width:14px;height:14px;border-radius:50%;background:#7c3aed;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);"></div>' });
}

function _rotaAddVia(latlng) {
  _rotaVias.push({ lat: latlng.lat, lng: latlng.lng });
  _rotaSortVias();
  _rotaRoute();
}

// Ordena os vias pela projeção no eixo A→B (mantém a ordem ao longo do trecho).
function _rotaSortVias() {
  var a = _massa.ra, b = _massa.rb;
  if (!_rotaHasCoords(a) || !_rotaHasCoords(b)) return;
  var ax = +a.lng, ay = +a.lat, dx = (+b.lng) - ax, dy = (+b.lat) - ay, len2 = dx * dx + dy * dy || 1;
  _rotaVias.sort(function(p, q) {
    var tp = ((p.lng - ax) * dx + (p.lat - ay) * dy) / len2;
    var tq = ((q.lng - ax) * dx + (q.lat - ay) * dy) / len2;
    return tp - tq;
  });
}

function _rotaClearVias() { _rotaVias = []; _rotaRoute(); }

// ── Modal de confirmação in-app (substitui o confirm() do navegador) ──
// opts: { titulo, mensagem, okLabel, okLoadingLabel, danger, onOk }
// Ao confirmar, o botão entra em estado de carregando NA HORA e o modal
// permanece até a operação chamar appConfirmClose() (no sucesso/erro).
function appConfirm(opts) {
  opts = opts || {};
  var ex = document.getElementById('appConfirmOverlay'); if (ex) ex.remove();
  var msgHtml = esc(String(opts.mensagem || '')).replace(/\n/g, '<br>');
  var html =
    '<div id="appConfirmOverlay" class="appc-overlay">'
    + '<div class="appc-card">'
      + '<div class="appc-title">' + esc(opts.titulo || 'Confirmar') + '</div>'
      + '<div class="appc-msg">' + msgHtml + '</div>'
      + '<div class="appc-foot">'
        + '<button class="btn btn-ghost" id="appcCancel">Cancelar</button>'
        + '<button class="btn ' + (opts.danger ? 'btn-danger' : 'btn-dark') + '" id="appcOk">' + esc(opts.okLabel || 'Confirmar') + '</button>'
      + '</div>'
    + '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
  var ov = document.getElementById('appConfirmOverlay');
  var busy = false;

  function cleanup() { document.removeEventListener('keydown', onKey); if (ov && ov.parentNode) ov.remove(); }
  // Exposto para a operação fechar o modal quando terminar (sucesso ou erro).
  window._appConfirmCleanup = cleanup;

  function fechar() { if (busy) return; cleanup(); }

  function confirmar() {
    if (busy) return;
    busy = true;
    var okb = document.getElementById('appcOk');
    var cb  = document.getElementById('appcCancel');
    if (cb)  cb.disabled = true;
    if (okb) { okb.disabled = true; okb.innerHTML = '<span class="appc-spin"></span>' + esc(opts.okLoadingLabel || 'Aplicando…'); }
    if (opts.onOk) opts.onOk();
  }

  function onKey(e) {
    if (e.key === 'Escape') fechar();
    else if (e.key === 'Enter') confirmar();
  }

  document.getElementById('appcCancel').addEventListener('click', fechar);
  ov.addEventListener('click', function(e) { if (e.target === ov && !busy) fechar(); });
  document.getElementById('appcOk').addEventListener('click', confirmar);
  document.addEventListener('keydown', onKey);
  setTimeout(function() { var b = document.getElementById('appcOk'); if (b) b.focus(); }, 30);
}

// Markdown leve: **negrito**, bullets (-, *, •) e quebras de linha.
function _mdLite(s) {
  var t = esc(String(s || '')).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return t.split('\n').map(function(l) {
    var x = l.trim();
    if (/^[-*•]\s+/.test(x)) return '<div class="an-bullet">' + x.replace(/^[-*•]\s+/, '') + '</div>';
    return x ? '<div>' + x + '</div>' : '<div style="height:6px;"></div>';
  }).join('');
}

function _processLote(esqList, pontosByEsq, cacheMap) {
  if (typeof PDFLib === 'undefined' || typeof JSZip === 'undefined') {
    doneLoading(); toast('Bibliotecas de PDF não carregaram. Recarregue a página.', 'error'); return;
  }
  // Monta o HTML de cada esquema no cliente (toda a lógica de cálculo continua
  // aqui). O servidor converte HTML → PDF (sem rodapé) e o cliente carimba o
  // rodapé em todas as páginas via pdf-lib e monta o zip.
  var snap  = _snapshotEsqState();
  var items = [], fail = 0;

  esqList.forEach(function(e) {
    var pts = pontosByEsq[e.id_esquema] || [];
    if (!pts.length) { fail++; return; }
    try {
      _setupEsqStateLote(e, pts);
      _restoreHorConfig(e);
      _osrmLegs   = _legsFromCacheMap(cacheMap);
      _osrmStatus = (_osrmLegs && _osrmLegs.some(function(l) { return l; })) ? 'cache' : 'unavailable';
      var html = imprimirHorario(true, true);
      if (!html) { fail++; return; }
      items.push({ name: _loteFilename(e), html: html });
    } catch (err) { fail++; }
  });

  _restoreEsqState(snap);

  if (!items.length) { doneLoading(); toast('Nenhum PDF foi gerado.', 'error'); return; }

  loading('Gerando ' + items.length + ' PDFs no servidor…');
  google.script.run
    .withSuccessHandler(function(lista) {
      if (!lista || !lista.length) { doneLoading(); toast('O servidor não retornou os PDFs.', 'error'); return; }
      loading('Aplicando rodapé…');
      _finalizarLotePdfs(lista, fail).catch(function(err) {
        doneLoading(); toast('Erro ao finalizar os PDFs: ' + (err && err.message ? err.message : err), 'error');
      });
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Erro ao gerar PDFs: ' + (e && e.message ? e.message : e), 'error');
    })
    .gerarPdfsEsquemas(items);
}

// Carimba o rodapé em todas as páginas de cada PDF (pdf-lib) e monta o zip.
function _finalizarLotePdfs(lista, fail) {
  var zip = new JSZip();
  var genStr = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  var i = 0;
  function passo() {
    if (i >= lista.length) {
      return zip.generateAsync({ type: 'blob' }).then(function(blob) {
        doneLoading();
        _baixarBlob(blob, 'esquemas_pdfs.zip');
        toast(lista.length + ' PDFs gerados' + (fail ? (' · ' + fail + ' sem pontos') : ''), 'success', 4500);
      });
    }
    loading('Aplicando rodapé… (' + (i + 1) + '/' + lista.length + ')');
    return _carimbarRodape(_base64ToBytes(lista[i].b64), genStr).then(function(bytes) {
      zip.file(lista[i].name, bytes);
      i++;
      return passo();
    });
  }
  return passo();
}

// Desenha empresa/CNPJ à esquerda e Pág. X/Y · data à direita, no pé de cada página.
function _carimbarRodape(bytes, genStr) {
  return PDFLib.PDFDocument.load(bytes).then(function(doc) {
    return Promise.all([
      doc.embedFont(PDFLib.StandardFonts.Helvetica),
      doc.embedFont(PDFLib.StandardFonts.HelveticaBold)
    ]).then(function(fonts) {
      var font = fonts[0], bold = fonts[1];
      var pages  = doc.getPages();
      var orange = PDFLib.rgb(0.957, 0.475, 0.125);
      var dark   = PDFLib.rgb(0.102, 0.114, 0.137);
      var gray   = PDFLib.rgb(0.533, 0.533, 0.533);
      var M = 34, sz = 7, comp = 'KANDANGO TRANSPORTE E TURISMO LTDA';
      var compW = bold.widthOfTextAtSize(comp, sz);
      pages.forEach(function(page, idx) {
        var w = page.getWidth();
        page.drawLine({ start: { x: M, y: 30 }, end: { x: w - M, y: 30 }, thickness: 1.4, color: orange });
        page.drawText(comp, { x: M, y: 16, size: sz, font: bold, color: dark });
        page.drawText(' · CNPJ: 03.233.439/0001-52', { x: M + compW, y: 16, size: sz, font: font, color: gray });
        var right = 'Pág. ' + (idx + 1) + ' / ' + pages.length + '   ·   Gerado em ' + genStr;
        var rW = font.widthOfTextAtSize(right, sz);
        page.drawText(right, { x: w - M - rW, y: 16, size: sz, font: font, color: gray });
      });
      return doc.save();
    });
  });
}

function _base64ToBytes(b64) {
  var bin   = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function _setupEsqStateLote(e, pts) {
  _sel = e;
  _seq = pts.map(function(p) {
    var l = _lMap[String(p.idPonto)] || {};
    return { idPonto: p.idPonto, nomePonto: p.nomePonto, tipo: p.tipo || '', lat: l.lat || null, lng: l.lng || null, isNew: false };
  });
  _comercialTimes = {};
  pts.forEach(function(p) { var t = _normalizeHHMM(p.horarioComercial); if (t) _comercialTimes[p.idPonto] = t; });
  _customStopTimes = {};  // tempo_local não é mais fallback (aba → 30 min fixo)
  _legVia = {};
  pts.forEach(function(p) { if (p.tipoTrecho) _legVia[p.idPonto] = p.tipoTrecho; });
  _horStartIdx  = 0;
  _osrmGeometry = null;
}

function _legsFromCacheMap(cacheMap) {
  var pts = _seq.filter(function(p) { return p.lat && p.lng; });
  if (pts.length < 2) return null;
  function nk(a, b) { return a <= b ? a + ':' + b : b + ':' + a; }
  return pts.slice(0, -1).map(function(pt, i) {
    var ent = cacheMap[nk(pt.idPonto, pts[i + 1].idPonto)];
    var km  = ent && ent.km > 0 ? ent.km : 0;
    if (km > 0 && ent.tipoVia && !_legVia[pt.idPonto]) _legVia[pt.idPonto] = ent.tipoVia;
    return km > 0 ? { distKm: km, durationMin: 0 } : null;
  });
}

function _snapshotEsqState() {
  return {
    sel: _sel, seq: _seq, com: _comercialTimes, cst: _customStopTimes, lv: _legVia,
    hsi: _horStartIdx, legs: _osrmLegs, st: _osrmStatus, geo: _osrmGeometry,
    partida: (document.getElementById('horHoraPartida') || {}).value,
    vel:     (document.getElementById('horVelMedia')   || {}).value
  };
}
function _restoreEsqState(s) {
  _sel = s.sel; _seq = s.seq; _comercialTimes = s.com; _customStopTimes = s.cst; _legVia = s.lv;
  _horStartIdx = s.hsi; _osrmLegs = s.legs; _osrmStatus = s.st; _osrmGeometry = s.geo;
  var hp = document.getElementById('horHoraPartida'); if (hp && s.partida != null) hp.value = s.partida;
  var hv = document.getElementById('horVelMedia');    if (hv && s.vel != null)     hv.value = s.vel;
}

function _loteFilename(e) {
  // Sem o código de sequência do esquema; com o sentido entre parênteses.
  var sent = e.sentido ? ' (' + e.sentido + ')' : '';
  var base = (e.horario || '').replace(':', 'h') + ' - ' + (e.nome_linha || ('Esquema ' + e.id_esquema)) + sent;
  base = base.replace(/[\\/:*?"<>|]/g, '-').replace(/\s+/g, ' ').trim();
  return (base || ('esquema_' + e.id_esquema)) + '.pdf';
}

function _baixarBlob(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

/**
 * Após criar o novo esquema, inverte a sequência do snapshot e salva via
 * salvarSequenciaPontos, preservando tipos de trecho e tempos locais.
 * Horários comerciais são omitidos (usuário preencherá na nova rota).
 */
function _aplicarVoltaESpelhar(novoEsq, snapshot) {
  loading('Espelhando sequência…');

  var orig    = snapshot.seq;              // [A, B, C, …, Z]
  var reversed = orig.slice().reverse();   // [Z, …, C, B, A]

  // Mapeia tipo de trecho para a rota inversa:
  // Trecho X→Y (orig) = mesmo trecho físico Y→X (volta), tipo = snapshot.legVia[X]
  // Logo: voltaLegVia[Y] = snapshot.legVia[X]  (onde Y vem após X na original)
  var voltaLegVia = {};
  for (var i = 0; i < orig.length - 1; i++) {
    voltaLegVia[orig[i + 1].idPonto] = snapshot.legVia[orig[i].idPonto] || 'BR';
  }

  var payload = reversed.map(function(p) {
    return {
      idPonto:         p.idPonto,
      nomePonto:       p.nomePonto,
      tipo:            p.tipo || '',
      horarioComercial: '',
      tempoLocal:      snapshot.customStopTimes[p.idPonto] != null
                         ? snapshot.customStopTimes[p.idPonto] : '',
      tipoTrecho:      voltaLegVia[p.idPonto] || snapshot.legVia[p.idPonto] || ''
    };
  });

  google.script.run
    .withSuccessHandler(function() {
      selecionarEsq(novoEsq);
      toast('Viagem de volta criada — ' + reversed.length + ' pontos espelhados!', 'success');
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Esquema criado, mas erro ao salvar pontos: ' + (e.message || e), 'error');
      selecionarEsq(novoEsq); // abre mesmo assim
    })
    .salvarSequenciaPontos(novoEsq.id_esquema, payload);
}

function salvarTudo() {
  var salvouEsq = false;
  var nomeVal = (document.getElementById('fNome').value || '').trim();
  var formVis = document.getElementById('esqForm').style.display !== 'none';
  if (formVis && nomeVal) {
    salvouEsq = true;
    salvarEsquema();
  }
  if (_seqDirt) {
    salvarSeq();
  }
  if (!salvouEsq && !_seqDirt) {
    toast('Nenhuma alteração pendente.', 'info');
  }
}

// ============================================================
//  Point search
// ============================================================
function setupPtSearch() {
  var inp  = document.getElementById('ptSearch');
  var drop = document.getElementById('ptDrop');
  inp.addEventListener('focus', function() { renderPts(this.value); });
  inp.addEventListener('input', function() { renderPts(this.value); });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#ptSearch') && !e.target.closest('#ptDrop'))
      drop.classList.remove('open');
  });
  document.getElementById('btnSalvSeq').addEventListener('click', salvarSeq);
}

function renderPts(q) {
  var drop = document.getElementById('ptDrop');
  var nq   = norm(q);
  var list = _locais.filter(function(l) {
    return !nq
      || norm(l.descricao).includes(nq)
      || norm(l.tipo || '').includes(nq)
      || norm(l.codigo).includes(nq);
  }).slice(0, 80);

  // ── ANTT context ──────────────────────────────────────────────
  _updateAnttWarnBar();
  var nearLimit = _anttStatus && _anttStatus.accumKm > ANTT_WARN_KM;
  var insertIdx = parseInt(document.getElementById('insAfter').value) || 0;
  var refPt     = _seq[insertIdx] || null; // último ponto antes da inserção

  // Fase 3 — Ordena apoio para o topo quando próximo do limite
  if (nearLimit) {
    list.sort(function(a, b) {
      var aA = _isApoioCandidate(a.descricao), bA = _isApoioCandidate(b.descricao);
      return (aA === bA) ? 0 : aA ? -1 : 1;
    });
  }

  if (!list.length) {
    drop.innerHTML = '<div class="sd-empty">Nenhum resultado</div>';
  } else {
    var seqIdx = {};
    _seq.forEach(function(p, i) { seqIdx[p.idPonto] = i + 1; });

    drop.innerHTML = list.map(function(l) {
      var pos       = seqIdx[l.codigo];
      var jaNo      = pos !== undefined;
      var isApoioT  = _isApoioCandidate(l.descricao);
      var apoioBadge = isApoioT
        ? '<span class="sdi-apoio-badge">apoio</span>'
        : '';

      // Fase 4 — Estimativa de distância (straight-line × 1.3)
      var distChip = '';
      if (nearLimit && isApoioT && l.lat && l.lng && refPt && refPt.lat && refPt.lng) {
        var linKm  = _haversinKm(refPt.lat, refPt.lng, l.lat, l.lng);
        var estKm  = Math.round(linKm * 1.3);
        var total  = _anttStatus.accumKm + estKm;
        distChip = total <= ANTT_MAX_KM
          ? '<span class="antt-dist-ok">~' + estKm + 'km · cabe</span>'
          : '<span class="antt-dist-warn">~' + estKm + 'km · passa</span>';
      }

      return '<div class="sdi' + (jaNo ? ' off' : '') + '" data-cod="' + esc(l.codigo) + '">'
        + '<div class="sdi-main">'
          + hl(l.descricao, q)
          + (jaNo ? ' <span style="font-size:9px;background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;border-radius:3px;padding:0 5px;">pos. ' + pos + '</span>' : '')
          + apoioBadge
        + '</div>'
        + '<div class="sdi-meta">'
          + hl(l.codigo, q) + (l.tipo ? ' · ' + esc(l.tipo) : '')
          + (l.lat ? '' : ' <span style="color:#f87171;font-size:10px;">sem coord.</span>')
          + distChip
        + '</div>'
        + '</div>';
    }).join('');
  }

  drop.classList.add('open');
  drop.querySelectorAll('.sdi:not(.off)').forEach(function(el) {
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      var cod   = el.getAttribute('data-cod');
      var found = _locais.find(function(l) { return l.codigo === cod; });
      if (found) addPonto(found);
    });
  });
}

function addPonto(local) {
  document.getElementById('ptDrop').classList.remove('open');
  document.getElementById('ptSearch').value = '';
  var after = parseInt(document.getElementById('insAfter').value);
  _seq.splice(after + 1, 0, {
    idPonto: local.codigo, nomePonto: local.descricao,
    tipo: local.tipo || '', lat: local.lat || null, lng: local.lng || null, isNew: true
  });
  _pendingSelectIdx = after + 1;
  dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
  document.getElementById('insAfter').value = String(after + 1);
}

/** Adiciona ponto sempre no final da sequência (usado pelas sugestões ANTT no painel lateral). */
function addPontoNoFim(local) {
  var insertAt = _seq.length; // índice após o último
  _seq.push({
    idPonto: local.codigo, nomePonto: local.descricao,
    tipo: local.tipo || '', lat: local.lat || null, lng: local.lng || null, isNew: true
  });
  _pendingSelectIdx = insertAt;
  dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
  document.getElementById('insAfter').value = String(insertAt);
  var list = document.getElementById('seqList');
  if (list) list.scrollTop = list.scrollHeight;
}

/**
 * Para cada par consecutivo (A, B) da sequência, calcula o "desvio extra"
 * que X causaria: dist(A,X) + dist(X,B) − dist(A,B).
 * Retorna o índice i tal que X deve ser inserido APÓS _seq[i].
 */
function _findBestInsertIdx(lat, lng) {
  if (_seq.length <= 1) return 0;
  var best = 0, bestScore = Infinity;
  for (var i = 0; i < _seq.length - 1; i++) {
    var a = _seq[i], b = _seq[i + 1];
    if (!a.lat || !a.lng || !b.lat || !b.lng) continue;
    var dAX = _haversinKm(+a.lat, +a.lng, lat, lng);
    var dXB = _haversinKm(lat, lng, +b.lat, +b.lng);
    var dAB = _haversinKm(+a.lat, +a.lng, +b.lat, +b.lng);
    var score = dAX + dXB - dAB;
    if (score < bestScore) { bestScore = score; best = i; }
  }
  return best;
}

/**
 * Adiciona ponto na posição geográfica correta da sequência
 * (critério de mínimo desvio). Usado pelos pins de sugestão ANTT no mapa.
 */
function addPontoNoMapa(local) {
  if (!local.lat || !local.lng) { addPontoNoFim(local); return; }
  var afterIdx = _findBestInsertIdx(+local.lat, +local.lng);
  _seq.splice(afterIdx + 1, 0, {
    idPonto: local.codigo, nomePonto: local.descricao,
    tipo: local.tipo || '', lat: local.lat || null, lng: local.lng || null, isNew: true
  });
  _pendingSelectIdx = afterIdx + 1;
  dirtySeq(); renderSeq(); updateInsAfter(); updateMap();
  document.getElementById('insAfter').value = String(afterIdx + 1);
  // Rola a lista até o item inserido
  var list = document.getElementById('seqList');
  if (list) {
    var item = list.querySelector('[data-idx="' + (afterIdx + 1) + '"]');
    if (item) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    else list.scrollTop = (afterIdx + 1) * 48;
  }
}

// ============================================================
//  Save sequence
// ============================================================
function salvarSeq() {
  if (!_sel) { toast('Selecione um esquema.', 'error'); return; }
  var btn = document.getElementById('btnSalvSeq');
  btn.disabled = true; btn.textContent = 'Salvando…';

  loading('Salvando sequência…');
  google.script.run
    .withSuccessHandler(function() {
      doneLoading();
      _seq.forEach(function(p) { p.isNew = false; });
      _seqDirt = false;
      document.getElementById('ptUnsaved').style.display = 'none';
      btn.textContent = 'Salvar Sequência';
      btn.disabled = true;
      var formVis = document.getElementById('esqForm').style.display !== 'none';
      var nomeVal = document.getElementById('fNome').value.trim();
      if (!formVis || !nomeVal) {
        var s = document.getElementById('btnSalvar');
        if (s) s.disabled = true;
      }
      renderSeq();
      toast('Sequência salva! (' + _seq.length + ' pontos)', 'success');
    })
    .withFailureHandler(function(e) {
      doneLoading();
      btn.disabled = false; btn.textContent = 'Salvar Sequência';
      toast('Erro ao salvar: ' + (e.message || e), 'error');
    })
    .salvarSequenciaPontos(_sel.id_esquema, _seq.map(function(p) {
      return {
        idPonto: p.idPonto, nomePonto: p.nomePonto, tipo: p.tipo || '',
        horarioComercial: _comercialTimes[p.idPonto] || '',
        tempoLocal: _customStopTimes[p.idPonto] != null ? _customStopTimes[p.idPonto] : '',
        tipoTrecho: _legVia[p.idPonto] || ''
      };
    }));
}

// ============================================================
//  Utils
// ============================================================
function norm(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim();
}
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function hl(text, q) {
  if (!q) return esc(text);
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}
function loading(msg) {
  document.getElementById('ovlMsg').textContent = msg || 'Aguarde…';
  document.getElementById('ovl').classList.add('on');
}
function doneLoading() { document.getElementById('ovl').classList.remove('on'); }
function toast(msg, type, dur) {
  var w = document.getElementById('toastWrap');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0'; t.style.transition = 'opacity 0.3s';
    setTimeout(function() { t.remove(); }, 360);
  }, dur || 4000);
}
</script>
