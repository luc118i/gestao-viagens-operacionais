  var distBadge = _osrmStatus === 'pending'
    ? _S('#e3f2fd','#1565c0','#90caf9','⏳ Calculando…')
    : _osrmStatus === 'ok'
      ? _S('#e8f5e9','#2e7d32','#a5d6a7', ico('map-pin',11) + ' Traçado real (OSM)')
      : _osrmStatus === 'cache'
        ? _S('#e8eaf6','#283593','#9fa8da', ico('archive',11) + ' Cache de distâncias')
        : _S('#fce4ec','#c62828','#ef9a9a', ico('alert-triangle',11) + ' OSRM indisponível — mín. 30 min');
  var timeBadge = '<span style="background:#fff8e1;color:#f57f17;border:1px solid #ffe082;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;">' + ico('gauge',11) + ' ' + Math.round(c.vel || 85) + ' km/h</span>';
  return '<div class="hor-src-bar">' + distBadge + timeBadge + '</div>'
    + '<div class="hor-summary">'
    + '<div class="hor-stat"><div class="hor-stat-val">' + c.distTotal + ' km</div><div class="hor-stat-lbl">Distância total</div></div>'
    + '<div class="hor-stat"><div class="hor-stat-val">' + _hhmm(c.tvTotal) + '</div><div class="hor-stat-lbl">Em deslocamento</div></div>'
    + '<div class="hor-stat"><div class="hor-stat-val">' + _hhmm(c.tpTotal) + '</div><div class="hor-stat-lbl">Em paradas</div></div>'
    + '<div class="hor-stat" style="background:#fff8f0;border-color:#fddcb3;">'
      + '<div class="hor-stat-val" style="color:#f47920;">' + _hhmm(c.totalMin) + '</div>'
      + '<div class="hor-stat-lbl">Tempo total</div></div>'
    + '</div>';
}

function _renderHorarioWith(osrmLegs) {
  var body = document.getElementById('horBody');
  if (!body) return;

  _updateStartPtSelect();

  var c       = _calcHorario(osrmLegs);
  _lastCalc   = c;
  _recomputeComercialBase(c);
  _computeAnttAlerts(c);
  var partida  = document.getElementById('horHoraPartida').value || '00:00';
  var startIdx = Math.min(_horStartIdx, _seq.length - 1);

  // ── Sidebar ────────────────────────────────────
  var sideItems = c.pontos.map(function(p, i) {
    var comVal   = _comercialTimes[_seq[i].idPonto] || '';
    var preDep   = p.preDep;
    var chegaStr = preDep ? '—' : (p.chegadaMin !== null ? _ms(p.chegadaMin) : partida);
    var deltaHtml = '';
    if (!preDep && comVal && p.chegadaMin !== null) {
      var diff = _diffMin(comVal, p.chegadaMin, _seq[i].idPonto);
      var cls3, sign3;
      if      (diff >  2) { cls3 = 'delta-ok';   sign3 = '+'; }
      else if (diff < -2) { cls3 = 'delta-late';  sign3 = '−'; }
      else                { cls3 = 'delta-warn';  sign3 = '≈'; }
      deltaHtml = '<span class="hor-sidebar-delta ' + cls3 + '">'
        + sign3 + (Math.abs(diff) > 1 ? _dur(Math.abs(diff)) : '') + '</span>';
    }
    var startMark = (i === startIdx)
      ? '<span style="display:inline-flex;align-items:center;background:#f47920;color:#fff;border-radius:3px;padding:1px 4px;margin-left:3px;">' + ico('send',9) + '</span>' : '';
    return '<div class="hor-sidebar-item" id="horSbar' + i + '"'
      + (preDep ? ' style="opacity:0.4;"' : '') + '>'
      + '<div class="hor-sidebar-num">' + (i + 1) + startMark + '</div>'
      + '<div class="hor-sidebar-name" title="' + esc(p.nomePonto) + '">' + esc(p.nomePonto) + '</div>'
      + '<div class="hor-sidebar-time">' + chegaStr + deltaHtml + '</div>'
      + '</div>';
  }).join('');

  var sidebarHidden = _horSidebarHidden;
  var sidebar = '<div class="hor-sidebar' + (sidebarHidden ? ' hor-sidebar-collapsed' : '') + '" id="horSidebarWrap">'
    + '<div class="hor-sidebar-head">Pontos <span class="count-badge">' + c.pontos.length + '</span>'
    + '<button class="hor-panel-close" onclick="toggleHorSidebar()" title="' + (sidebarHidden ? 'Mostrar' : 'Ocultar') + ' painel">×</button>'
    + '</div>'
    + '<div class="hor-sidebar-list">' + sideItems + '</div>'
    + '</div>';

  var stats = '<div id="horStatsPanel">' + _buildStatsHtml(c, osrmLegs) + '</div>';

  // ── Tabela por ponto ───────────────────────────
  var rows = c.pontos.map(function(p, i) {
    var isStart = (i === startIdx);
    var isLast  = (i === c.pontos.length - 1);
    var preDep  = p.preDep;

    var clsArr = [];
    if      (preDep)   clsArr.push('row-predep');
    else if (isStart)  clsArr.push('row-first');
    else if (isLast)   clsArr.push('row-last');
    var anttA = !preDep && _anttMap[i];
    if (anttA) clsArr.push('antt-row-' + anttA.type);
    var cls = clsArr.length ? ' class="' + clsArr.join(' ') + '"' : '';

    if (preDep) {
      return '<tr id="horRow' + i + '" class="row-predep">'
        + '<td style="font-weight:600;">' + esc(p.nomePonto) + '</td>'
        + '<td colspan="6" style="text-align:center;font-style:italic;color:#bbb;font-size:10px;">pré-partida</td>'
        + '</tr>';
    }

    var tvCel = _buildLegViaCell(i, c);

    var tpVals = [2,5,10,15,20,30,40];
    var tpMatch = tpVals.indexOf(p.tp) !== -1 ? p.tp : null;
    var tpOpts = (tpMatch === null ? '<option value="' + p.tp + '" selected>' + _hhmm(p.tp) + '</option>' : '')
      + tpVals.map(function(v){
          return '<option value="' + v + '"' + (p.tp === v ? ' selected' : '') + '>' + _hhmm(v) + '</option>';
        }).join('');
    var tpCel = '<select class="hor-tp-input" onchange="onStopTimeChange(' + i + ',this.value)">' + tpOpts + '</select>';

    var chegStr = p.chegadaMin !== null ? _ms(p.chegadaMin) : partida;
    if (isStart) chegStr = partida;
    var saidStr = p.saidaMin !== null
                ? _ms(p.saidaMin)
                : (p.chegadaMin !== null
                    ? '<strong style="color:#f47920;">' + ico('star',11) + ' ' + _ms(p.chegadaMin) + '</strong>'
                    : '—');

    var cidadeCell = '<td style="font-weight:600;">'
      + esc(p.nomePonto)
      + (isStart ? ' <span style="display:inline-flex;align-items:center;background:#f47920;color:#fff;border-radius:3px;padding:1px 4px;">' + ico('send',9) + '</span>' : '')
      + _anttBadgeHtml(i)
      + '</td>';

    var comVal  = _comercialTimes[_seq[i].idPonto] || '';
    var comCell;
    if (comVal) {
      comCell = '<span class="hor-com-display" onclick="editComercial(' + i + ',this)">'
              + esc(comVal) + '<span class="hor-com-edit-icon">' + ico('pencil',10) + '</span></span>';
    } else {
      comCell = '<input type="text" class="hor-com-input" placeholder="HH:MM" '
              + 'onfocus="highlightRow(' + i + ')" '
              + 'oninput="_autoFormatTime(this)" '
              + 'onblur="_confirmComercial(' + i + ',this,false)" '
              + 'onkeydown="if(event.key===\'Enter\'){event.preventDefault();_confirmComercial(' + i + ',this,true)}'
              + 'else if(event.key===\'Escape\'){this.value=\'\';unhighlightRow(' + i + ')}" />';
    }
    var deltaCell = p.chegadaMin !== null ? _deltaCellHtml(comVal, p.chegadaMin, _seq[i].idPonto) : '—';

    return '<tr id="horRow' + i + '"' + cls + ' onclick="selectHorRow(' + i + ')">'
      + cidadeCell
      + '<td style="text-align:center;font-weight:600;">' + chegStr + '</td>'
      + '<td style="text-align:center;">' + tpCel + '</td>'
      + '<td style="text-align:center;font-weight:600;">' + saidStr + '</td>'
      + '<td class="hor-via-td">' + tvCel + '</td>'
      + '<td style="text-align:center;">' + comCell + '</td>'
      + '<td id="horDelta' + i + '" style="text-align:center;">' + deltaCell + '</td>'
      + '</tr>';
  }).join('');

  var table = '<div class="hor-table-wrap"><table class="hor-table" style="min-width:560px;">'
    + '<thead><tr>'
    + '<th>Cidade</th>'
    + '<th style="text-align:center;">Chegada</th>'
    + '<th style="text-align:center;">Parada</th>'
    + '<th style="text-align:center;">Saída</th>'
    + '<th style="text-align:right;" title="Tempo até o próximo ponto — passe o mouse para configurar o tipo de via do trecho">Temp. Desl. ' + ico('arrow-down',11) + '</th>'
    + '<th style="text-align:center;">Comercial</th>'
    + '<th style="text-align:center;" title="Diferença: Comercial − Calculado (+folga / −estouro)">Dif.</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>';

  var main = '<div class="hor-main">' + stats + table + _buildComAnalysis(c) + '</div>';
  var _prevMain = body.querySelector('.hor-main');
  var _savedScroll = _prevMain ? _prevMain.scrollTop : 0;
  body.innerHTML = sidebar + main;
  requestAnimationFrame(function() {
    var nm = body.querySelector('.hor-main');
    var focusIdx = _pendingSelectIdx !== null ? _pendingSelectIdx : _activeHorRow;
    if (focusIdx !== null) {
      if (_pendingSelectIdx !== null) _pendingSelectIdx = null;
      selectHorRow(focusIdx);
      var targetRow = document.getElementById('horRow' + focusIdx);
      if (nm && targetRow) {
        var nmRect  = nm.getBoundingClientRect();
        var rowRect = targetRow.getBoundingClientRect();
        var offset  = nm.scrollTop + rowRect.top - nmRect.top
                    - Math.floor((nm.clientHeight - rowRect.height) / 2);
        nm.scrollTop = Math.max(0, offset);
      }
    } else if (nm && _savedScroll > 0) {
      nm.scrollTop = _savedScroll;
    }
  });
}

// ============================================================
//  Análise comparativa OSM vs. Horário Comercial por trecho
// ============================================================
function _buildComAnalysis(c) {
  var segs = [];
  for (var i = 1; i < c.pontos.length; i++) {
    var p     = c.pontos[i];
    var pPrev = c.pontos[i - 1];
    if (p.preDep || pPrev.preDep || !p.hasCoords) continue;
    var comVal  = _comercialTimes[_seq[i].idPonto]     || '';
    var comPrev = _comercialTimes[_seq[i - 1].idPonto] || '';
    if (!comVal || !comPrev) continue;

    var comSeg = _p(comVal) - _p(comPrev);
    if (comSeg < 0) comSeg += 1440;
    segs.push({
      from:   pPrev.nomePonto,
      to:     p.nomePonto,
      osrm:   p.tv,
      com:    comSeg,
      diff:   comSeg - p.tv,
      isOsrm: p.distSource === 'osrm'
    });
  }
  if (segs.length === 0) return '';

  var totalOsrm = 0, totalCom = 0;
  segs.forEach(function(s) { totalOsrm += s.osrm; totalCom += s.com; });
  var totalDiff = totalCom - totalOsrm;

  var rows = segs.map(function(s) {
    var abs = Math.abs(s.diff);
    var cls = s.diff > 2 ? 'delta-ok' : s.diff < -2 ? 'delta-late' : 'delta-warn';
    var sgn = s.diff > 2 ? '+' : s.diff < -2 ? '−' : '≈';
    var osrmStr = _hhmm(s.osrm) + (s.isOsrm ? '' : '<span style="color:#ccc;font-size:9px;"> ~</span>');
    return '<tr>'
      + '<td>' + esc(s.from) + '</td>'
      + '<td>' + esc(s.to)   + '</td>'
      + '<td style="text-align:center;">' + osrmStr + '</td>'
      + '<td style="text-align:center;">' + _hhmm(s.com) + '</td>'
      + '<td style="text-align:center;"><span class="' + cls + '">'
        + sgn + (abs > 1 ? _dur(abs) : '') + '</span></td>'
      + '</tr>';
  }).join('');

  var tAbs = Math.abs(totalDiff);
  var tCls = totalDiff > 5 ? 'delta-ok' : totalDiff < -5 ? 'delta-late' : 'delta-warn';
  var tSgn = totalDiff > 0 ? '+' : totalDiff < 0 ? '−' : '≈';

  return '<div class="hor-osm-analysis" id="horOsmWrap"' + (_horOsmHidden ? ' style="display:none;"' : '') + '>'
    + '<div class="hor-osm-title">' + ico('bar-chart',13) + ' OSM vs. Comercial — Comparativo por trecho'
    + '<button class="hor-panel-close" onclick="toggleHorOsm()" title="Ocultar">×</button>'
    + '</div>'
    + '<div class="hor-osm-legend">'
    + '<span class="delta-ok">+ folga</span> = comercial concede mais tempo que o OSM &nbsp;·&nbsp; '
    + '<span class="delta-late">− estouro</span> = comercial exige mais que o OSM permite'
    + '</div>'
    + '<table class="hor-table" style="min-width:480px;">'
    + '<thead><tr><th>De</th><th>Até</th>'
    + '<th style="text-align:center;">OSM</th>'
    + '<th style="text-align:center;">Comercial</th>'
    + '<th style="text-align:center;" title="Comercial − OSM">Dif.</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '<tfoot><tr>'
    + '<td colspan="2" style="font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:#7a8299;">Total</td>'
    + '<td style="text-align:center;font-weight:700;">' + _hhmm(totalOsrm) + '</td>'
    + '<td style="text-align:center;font-weight:700;">' + _hhmm(totalCom)  + '</td>'
    + '<td style="text-align:center;"><span class="' + tCls + '" style="font-size:12px;">'
      + tSgn + (tAbs > 1 ? _dur(tAbs) : '') + '</span></td>'
    + '</tr></tfoot>'
    + '</table></div>';
}

// ============================================================
//  Célula Temp. Desl. com seletor de via por trecho
// ============================================================
var _LEG_LABEL = { BR:'Rodovia federal', Est:'Estadual', Mun:'Municipal', Urb:'Urbana' };

function _buildLegViaCell(i, c) {
  var isLast = (i >= c.pontos.length - 1);
  var next   = isLast ? null : c.pontos[i + 1];

  if (!next || next.preDep || !next.hasCoords) {
    return '<span style="color:#ccc;">—</span>';
  }

  var isApprox = (next.distSource !== 'osrm');
  var distStr  = next.dist > 0
    ? (isApprox ? '~' : '') + next.dist.toFixed(1) + ' km'
    : '';
  var approxMark = isApprox
    ? '<span style="color:#bbb;font-size:9px;" title="Sem dados de rota — tempo mínimo aplicado"> ~</span>'
    : '';

  var tvHtml = '<span class="hor-via-time">' + _hhmm(next.tv) + approxMark + '</span>'
    + (distStr ? '<span class="hor-via-dist">' + distStr + '</span>' : '');

  var viaKey = _legVia[_seq[i].idPonto];
  var badge  = viaKey
    ? '<span class="hor-via-badge" data-via="' + viaKey + '">' + viaKey + '</span>'
    : '';

  var btns = ['BR','Est','Mun','Urb'].map(function(t) {
    return '<button class="hor-via-btn' + (viaKey === t ? ' active' : '') + '" '
      + 'data-via="' + t + '" '
      + 'onclick="setLegVia(' + i + ',\'' + t + '\',event)" '
      + 'title="' + _LEG_LABEL[t] + '">' + t + '</button>';
  }).join('');

  return '<div class="hor-via-wrap">'
    + tvHtml + badge
    + '<div class="hor-via-overlay">' + btns + '</div>'
    + '</div>';
}

function setLegVia(i, type, evt) {
  if (evt) { evt.stopPropagation(); evt.preventDefault(); }
  var key = _seq[i].idPonto;
  if (_legVia[key] === type) delete _legVia[key]; else _legVia[key] = type;
  try { if (_sel) localStorage.setItem('vc_legVia_' + _sel.id_esquema, JSON.stringify(_legVia)); } catch(e) {}
  _markDirty();
  _partialUpdateSchedule();
  // Fecha o overlay após o clique para evitar re-clique acidental (o rebuild via CSS hover
  // manteria o overlay aberto, causando toggle indesejado se o cursor ficasse sobre ele)
  var row = document.getElementById('horRow' + i);
  if (row) {
    var td = row.querySelectorAll('td')[4];
    if (td) {
      td.classList.add('hor-via-done');
      setTimeout(function() { td.classList.remove('hor-via-done'); }, 500);
    }
  }
}

function _deltaCellHtml(comVal, chegadaMin, idPonto) {
  if (!comVal) return '<span style="color:#dde1ee;font-size:14px;">—</span>';
  var diff    = _diffMin(comVal, chegadaMin, idPonto);
  var diffAbs = Math.abs(diff);
  var cls, sign;
  if      (diff >  2) { cls = 'delta-ok';   sign = '+'; }
  else if (diff < -2) { cls = 'delta-late';  sign = '−'; }
  else                { cls = 'delta-warn';  sign = '≈'; }
  return '<div class="' + cls + '">' + sign + (diffAbs > 1 ? _dur(diffAbs) : '') + '</div>';
}

function _autoFormatTime(input) {
  var pos  = input.selectionStart;
  var raw  = input.value.replace(/\D/g, '').slice(0, 4);
  var fmt  = raw.length >= 3 ? raw.slice(0, 2) + ':' + raw.slice(2) : raw;
  input.value = fmt;
  // mantém cursor após o caractere recém digitado
  var newPos = fmt.length >= 3 && pos >= 2 ? pos + 1 : pos;
  try { input.setSelectionRange(newPos, newPos); } catch(e) {}
}

function _validateHHMM(s) {
  var m = String(s || '').trim().match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
  if (!m) return null;
  return ('0' + m[1]).slice(-2) + ':' + m[2];
}

function _confirmComercial(idx, inputEl, moveNext) {
  var raw = inputEl.value.trim();
  if (raw === '') {
    inputEl.classList.remove('hor-com-error');
    onComercialTimeChange(idx, '', inputEl);
    if (moveNext) _focusNextComercial(idx);
    return;
  }
  var val = _validateHHMM(raw);
  if (!val) {
    inputEl.classList.add('hor-com-error');
    inputEl.focus();
    return;
  }
  inputEl.classList.remove('hor-com-error');
  onComercialTimeChange(idx, val, inputEl);
  if (moveNext) _focusNextComercial(idx);
}

function onComercialTimeChange(idx, val, inputEl) {
  var key = _seq[idx].idPonto;
  if (val) { _comercialTimes[key] = val; } else { delete _comercialTimes[key]; }
  _markDirty();

  if (inputEl) {
    // Zera onblur ANTES de manipular o DOM para evitar chamada re-entrante
    // quando o browser dispara blur sincronamente ao remover o elemento via innerHTML
    inputEl.onblur = null;
    var td = inputEl.parentNode;
    if (td && val) {
      td.innerHTML = '<span class="hor-com-display" onclick="editComercial(' + idx + ',this)">'
        + esc(val) + '<span class="hor-com-edit-icon">' + ico('pencil',10) + '</span></span>';
    }
  }

  unhighlightRow(idx);
  _partialUpdateComercial();
}

function _focusNextComercial(fromIdx) {
  var nextRow = document.getElementById('horRow' + (fromIdx + 1));
  if (!nextRow) return;
  var input = nextRow.querySelector('.hor-com-input');
  if (input) { input.focus(); return; }
  var display = nextRow.querySelector('.hor-com-display');
  if (display) { editComercial(fromIdx + 1, display); }
}

function editComercial(idx, el) {
  var key    = _seq[idx].idPonto;
  var curVal = _comercialTimes[key] || '';
  var input  = document.createElement('input');
  input.type = 'text';
  input.className = 'hor-com-input';
  input.placeholder = 'HH:MM';
  input.value = curVal;
  input.oninput = function() { _autoFormatTime(this); };
  input.onkeydown = function(e) {
    if (e.key === 'Enter')  { e.preventDefault(); _confirmComercial(idx, this, true); }
    if (e.key === 'Escape') {
      this.classList.remove('hor-com-error');
      unhighlightRow(idx);
      this.parentNode && this.parentNode.replaceChild(el, this);
    }
  };
  input.onblur = function() { _confirmComercial(idx, this); };
  highlightRow(idx);
  el.parentNode.replaceChild(input, el);
  input.focus();
  input.select();
}

function selectHorRow(idx) {
  _activeHorRow = idx;
  document.querySelectorAll('#horBody tr').forEach(function(r) { r.classList.remove('row-editing'); });
  var row = document.getElementById('horRow' + idx);
  if (row) row.classList.add('row-editing');
}
function highlightRow(idx) {
  var row = document.getElementById('horRow' + idx);
  if (row) row.classList.add('row-editing');
}
function unhighlightRow(idx) {
  var row = document.getElementById('horRow' + idx);
  if (row) row.classList.remove('row-editing');
}

// Atualização parcial: recalcula deltas sem re-renderizar a tabela
function _partialUpdateComercial() {
  if (!_lastCalc) { _renderHorarioWith(Array.isArray(_osrmLegs) ? _osrmLegs : null); return; }
  var c = _lastCalc;
  _recomputeComercialBase(c);
  var partida  = (document.getElementById('horHoraPartida') || {}).value || '00:00';
  var startIdx = Math.min(_horStartIdx, _seq.length - 1);

  for (var i = 0; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    var deltaEl = document.getElementById('horDelta' + i);
    if (!deltaEl) continue;
    var comVal = _comercialTimes[_seq[i].idPonto] || '';
    deltaEl.innerHTML = p.chegadaMin !== null ? _deltaCellHtml(comVal, p.chegadaMin, _seq[i].idPonto) : '—';
  }

  for (var i = 0; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    var sbarEl = document.getElementById('horSbar' + i);
    if (!sbarEl) continue;
    var timeEl = sbarEl.querySelector('.hor-sidebar-time');
    if (!timeEl) continue;
    var comVal   = _comercialTimes[_seq[i].idPonto] || '';
    var chegaStr = p.preDep ? '—' : (p.chegadaMin !== null ? _ms(p.chegadaMin) : partida);
    if (i === startIdx) chegaStr = partida;
    var deltaHtml = '';
    if (!p.preDep && comVal && p.chegadaMin !== null) {
      var diff = _diffMin(comVal, p.chegadaMin, _seq[i].idPonto);
      var cls3 = diff > 2 ? 'delta-ok' : diff < -2 ? 'delta-late' : 'delta-warn';
      var sgn3 = diff > 2 ? '+' : diff < -2 ? '−' : '≈';
      deltaHtml = '<span class="hor-sidebar-delta ' + cls3 + '">'
        + sgn3 + (Math.abs(diff) > 1 ? _dur(Math.abs(diff)) : '') + '</span>';
    }
    timeEl.innerHTML = chegaStr + deltaHtml;
  }

  _applyAnttToRows(c);

  var horMain   = document.querySelector('#horBody .hor-main');
  if (!horMain) return;
  var analysisEl = horMain.querySelector('.hor-osm-analysis');
  var newHtml    = _buildComAnalysis(c);
  if (newHtml) {
    if (analysisEl) { analysisEl.outerHTML = newHtml; }
    else            { horMain.insertAdjacentHTML('beforeend', newHtml); }
  } else if (analysisEl) {
    analysisEl.remove();
  }
}

function _updateStartPtSelect() {
  var sel = document.getElementById('horStartPt');
  if (!sel) return;
  if (_horStartIdx >= _seq.length) _horStartIdx = 0;
  sel.innerHTML = _seq.map(function(p, i) {
    return '<option value="' + i + '">' + (i + 1) + ' — ' + esc(p.nomePonto) + '</option>';
  }).join('') || '<option value="0">—</option>';
  sel.value = String(_horStartIdx);
}

// Atualização parcial do schedule sem reconstruir a tabela
function _partialUpdateSchedule() {
  if (!_lastCalc) { _renderHorarioWith(Array.isArray(_osrmLegs) ? _osrmLegs : null); return; }
  var osrmLegs = Array.isArray(_osrmLegs) ? _osrmLegs : null;
  var c        = _calcHorario(osrmLegs);
  _lastCalc    = c;
  _recomputeComercialBase(c);
  var partida  = (document.getElementById('horHoraPartida') || {}).value || '00:00';
  var startIdx = Math.min(_horStartIdx, _seq.length - 1);

  var statsEl = document.getElementById('horStatsPanel');
  if (statsEl) statsEl.innerHTML = _buildStatsHtml(c, osrmLegs);

  for (var i = 0; i < c.pontos.length; i++) {
    var p   = c.pontos[i];
    var row = document.getElementById('horRow' + i);
    if (!row || p.preDep) continue;
    var isStart = (i === startIdx);
    var tds     = row.querySelectorAll('td');
    if (tds.length < 7) continue;

    var chegStr = (isStart || p.chegadaMin === null) ? partida : _ms(p.chegadaMin);
    tds[1].textContent = chegStr;

    if (p.saidaMin !== null) {
      tds[3].textContent = _ms(p.saidaMin);
    } else if (p.chegadaMin !== null) {
      tds[3].innerHTML = '<strong style="color:#f47920;">' + ico('star',11) + ' ' + _ms(p.chegadaMin) + '</strong>';
    } else {
      tds[3].textContent = '—';
    }

    tds[4].className = 'hor-via-td';
    tds[4].innerHTML = _buildLegViaCell(i, c);

    var comVal = _comercialTimes[_seq[i].idPonto] || '';
    tds[6].innerHTML = p.chegadaMin !== null ? _deltaCellHtml(comVal, p.chegadaMin, _seq[i].idPonto) : '—';
  }

  for (var i = 0; i < c.pontos.length; i++) {
    var p      = c.pontos[i];
    var sbarEl = document.getElementById('horSbar' + i);
    if (!sbarEl) continue;
    var timeEl = sbarEl.querySelector('.hor-sidebar-time');
    if (!timeEl) continue;
    var comVal    = _comercialTimes[_seq[i].idPonto] || '';
    var chegaStr  = p.preDep ? '—' : (p.chegadaMin !== null ? _ms(p.chegadaMin) : partida);
    if (i === startIdx) chegaStr = partida;
    var dHtml = '';
    if (!p.preDep && comVal && p.chegadaMin !== null) {
      var diff = _diffMin(comVal, p.chegadaMin, _seq[i].idPonto);
      var dc   = diff > 2 ? 'delta-ok' : diff < -2 ? 'delta-late' : 'delta-warn';
      var ds   = diff > 2 ? '+' : diff < -2 ? '−' : '≈';
      dHtml = '<span class="hor-sidebar-delta ' + dc + '">'
        + ds + (Math.abs(diff) > 1 ? _dur(Math.abs(diff)) : '') + '</span>';
    }
    timeEl.innerHTML = chegaStr + dHtml;
  }

  _applyAnttToRows(c);

  var horMain    = document.querySelector('#horBody .hor-main');
  if (!horMain) return;
  var analysisEl = horMain.querySelector('.hor-osm-analysis');
  var newHtml    = _buildComAnalysis(c);
  if (newHtml) {
    if (analysisEl) { analysisEl.outerHTML = newHtml; }
    else            { horMain.insertAdjacentHTML('beforeend', newHtml); }
  } else if (analysisEl) {
    analysisEl.remove();
  }
}

function onStopTimeChange(idx, val) {
  _customStopTimes[_seq[idx].idPonto] = Math.max(0, Math.round(+val || 0));
  _markDirty();
  highlightRow(idx);
  _partialUpdateSchedule();
  setTimeout(function() { unhighlightRow(idx); }, 600);
}

// ============================================================
//  Modal de configuração do PDF
// ============================================================
function abrirModalPdf() {
  if (!_sel || !_seq.length) { toast('Adicione pontos ao esquema antes de gerar o PDF.', 'error'); return; }
  var ex = document.getElementById('pdfModalOverlay');
  if (ex) ex.remove();

  var _partStr = (_sel.horario || '00:00').replace(':', 'h');
  var _sentStr = _sel.sentido ? ' (' + _sel.sentido + ')' : '';
  var title    = _pdfTitle    || (_partStr + ' - ' + _sel.nome_linha + ' (' + _sel.id_esquema + ')' + _sentStr);
  var subtitle = _pdfSubtitle || '';

  var colDefs = [
    { key:'chegada',   label:'Chegada'           },
    { key:'parada',    label:'Parada'             },
    { key:'saida',     label:'Saída'              },
    { key:'desl',      label:'Temp. Deslocamento' },
    { key:'comercial', label:'Comercial'          },
    { key:'dif',       label:'Dif.'               }
  ];
  var comDisabled = (_pdfMode === 'comercial');
  var disabledKeys = { comercial:true, dif:true };
  var checks = colDefs.map(function(c) {
    var isDisabled = comDisabled && disabledKeys[c.key];
    return '<label id="pdfColLabel_' + c.key + '" style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:12px;'
      + (isDisabled ? 'opacity:0.4;pointer-events:none;' : '') + '">'
      + '<input type="checkbox" id="pdfCol_' + c.key + '"'
      + (_pdfCols[c.key] ? ' checked' : '')
      + ' style="width:14px;height:14px;accent-color:#f47920;cursor:pointer;">'
      + c.label + '</label>';
  }).join('');

  var modal =
    '<div id="pdfModalOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;">'
    + '<div style="background:#fff;border-radius:12px;width:440px;max-width:94vw;box-shadow:0 8px 40px rgba(0,0,0,0.25);overflow:hidden;">'
      + '<div style="background:#1a1d23;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;">'
        + '<div style="font-size:14px;font-weight:800;color:#fff;">Exportar PDF</div>'
        + '<button onclick="fecharModalPdf()" style="background:none;border:none;color:#9aa0ad;cursor:pointer;line-height:1;padding:4px;display:flex;align-items:center;">' + ico('x',16) + '</button>'
      + '</div>'
      + '<div style="padding:20px 22px;">'
        + '<div style="margin-bottom:12px;">'
          + '<label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a8299;margin-bottom:4px;">Título</label>'
          + '<input id="pdfTitleInput" type="text" value="' + esc(title) + '" style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d4d8e8;border-radius:6px;font-size:12px;font-family:inherit;">'
        + '</div>'
        + '<div style="margin-bottom:16px;">'
          + '<label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a8299;margin-bottom:4px;">Subtítulo <span style="font-weight:400;text-transform:none;">(opcional)</span></label>'
          + '<input id="pdfSubtitleInput" type="text" value="' + esc(subtitle) + '" placeholder="Ex: SUGESTÃO DE MUDANÇA" style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d4d8e8;border-radius:6px;font-size:12px;font-family:inherit;">'
        + '</div>'
        + '<div style="margin-bottom:16px;">'
          + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a8299;margin-bottom:8px;">Modo</div>'
          + '<div style="display:flex;gap:8px;">'
            + '<label id="pdfModeNormalLabel" onclick="pdfModeSelect(\'normal\')" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border:1px solid ' + (_pdfMode !== 'comercial' ? '#f47920' : '#d4d8e8') + ';border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:' + (_pdfMode !== 'comercial' ? '#fff8f0' : '#fff') + ';">'
              + '<input type="radio" name="pdfMode" id="pdfModeNormal" value="normal"' + (_pdfMode !== 'comercial' ? ' checked' : '') + ' style="accent-color:#f47920;cursor:pointer;"> Normal'
            + '</label>'
            + '<label id="pdfModeComercialLabel" onclick="pdfModeSelect(\'comercial\')" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border:1px solid ' + (_pdfMode === 'comercial' ? '#f47920' : '#d4d8e8') + ';border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:' + (_pdfMode === 'comercial' ? '#fff8f0' : '#fff') + ';">'
              + '<input type="radio" name="pdfMode" id="pdfModeComercial" value="comercial"' + (_pdfMode === 'comercial' ? ' checked' : '') + ' style="accent-color:#f47920;cursor:pointer;"> Hor. Comercial'
            + '</label>'
          + '</div>'
        + '</div>'
        + '<div>'
          + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a8299;margin-bottom:8px;">Colunas</div>'
          + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px;">' + checks + '</div>'
        + '</div>'
      + '</div>'
      + '<div style="padding:14px 22px;border-top:1px solid #f0f2f8;display:flex;gap:8px;justify-content:flex-end;">'
        + '<button onclick="fecharModalPdf()" style="padding:8px 16px;border:1px solid #d4d8e8;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#5a6070;">Cancelar</button>'
        + '<button onclick="gerarPdfComOpcoes()" style="padding:8px 20px;border:none;border-radius:6px;background:#f47920;color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;">' + ico('arrow-down',13) + ' Gerar PDF</button>'
      + '</div>'
    + '</div></div>';

  document.body.insertAdjacentHTML('beforeend', modal);
  document.getElementById('pdfModalOverlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModalPdf();
  });
  setTimeout(function() { var t = document.getElementById('pdfTitleInput'); if (t) { t.focus(); t.select(); } }, 50);
}

function fecharModalPdf() {
  var m = document.getElementById('pdfModalOverlay');
  if (m) m.remove();
}

function pdfModeSelect(mode) {
  var nLbl = document.getElementById('pdfModeNormalLabel');
  var cLbl = document.getElementById('pdfModeComercialLabel');
  var nRad = document.getElementById('pdfModeNormal');
  var cRad = document.getElementById('pdfModeComercial');
  var isCom = (mode === 'comercial');
  if (nLbl) { nLbl.style.borderColor = isCom ? '#d4d8e8' : '#f47920'; nLbl.style.background = isCom ? '#fff' : '#fff8f0'; }
  if (cLbl) { cLbl.style.borderColor = isCom ? '#f47920' : '#d4d8e8'; cLbl.style.background = isCom ? '#fff8f0' : '#fff'; }
  if (nRad) nRad.checked = !isCom;
  if (cRad) cRad.checked =  isCom;
  ['comercial','dif'].forEach(function(k) {
    var lbl = document.getElementById('pdfColLabel_' + k);
    if (lbl) { lbl.style.opacity = isCom ? '0.4' : ''; lbl.style.pointerEvents = isCom ? 'none' : ''; }
  });
}

function gerarPdfComOpcoes() {
  ['chegada','parada','saida','desl','comercial','dif'].forEach(function(k) {
    var el = document.getElementById('pdfCol_' + k);
    if (el) _pdfCols[k] = el.checked;
  });
  var mEl = document.querySelector('input[name="pdfMode"]:checked');
  _pdfMode = mEl ? mEl.value : 'normal';
  var tEl = document.getElementById('pdfTitleInput');
  var sEl = document.getElementById('pdfSubtitleInput');
  _pdfTitle    = tEl ? tEl.value.trim() : '';
  _pdfSubtitle = sEl ? sEl.value.trim() : '';
  _savePdfPrefs();
  fecharModalPdf();
  imprimirHorario();
}

// ============================================================
//  Gera PDF em nova janela
// ============================================================
function imprimirHorario(returnHtml, forServer) {
  if (!_sel || !_seq.length) return;
  var osrmLegs = Array.isArray(_osrmLegs) ? _osrmLegs : null;
  var c        = _calcHorario(osrmLegs);
  _recomputeComercialBase(c);
  var partida  = document.getElementById('horHoraPartida').value || '00:00';
  var vel      = document.getElementById('horVelMedia').value || '85';
  var tipoVia  = '';
  document.querySelectorAll('.hor-preset-btn').forEach(function(b){ if (b.classList.contains('active')) tipoVia = b.textContent; });
  var fonteDist = _osrmStatus === 'ok' ? 'Traçado real (OSM)' : _osrmStatus === 'cache' ? 'Cache de distâncias' : 'Mín. 30 min (sem rota)';
  var startIdx  = Math.min(_horStartIdx, c.pontos.length - 1);
  var cols      = _pdfCols;
  var _sentStr  = _sel.sentido ? ' (' + _sel.sentido + ')' : '';
  // Título sem o código de sequência do esquema (ex.: "(158)"). O código de
  // linha (ex.: "(RNSP00530460)") já vem embutido em nome_linha quando existe.
  var title     = _pdfTitle    || ((_sel.horario || '00:00').replace(':', 'h') + ' - ' + _sel.nome_linha + _sentStr);
  var subtitle  = _pdfSubtitle || '';

  function pe(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function hhmm(m){ m=Math.round(m||0); var h=Math.floor(m/60),mm=m%60; return ('0'+h).slice(-2)+':'+('0'+mm).slice(-2); }
  function ms(m){ m=Math.round(m); return ('0'+Math.floor(m/60)%24).slice(-2)+':'+('0'+(m%60)).slice(-2); }
  // Arredonda minutos para múltiplo de 5 — somente para exibição no PDF
  function r5(m){ return Math.round(m / 5) * 5; }
  function msR(m){ return ms(r5(m)); }
  function partidaR(s){ var p=(s||'00:00').split(':'); return ms(r5(+p[0]*60+(+p[1]||0))); }
  function comR(s){ if(!s) return s; var p=s.split(':'); return p.length<2 ? s : ms(r5(+p[0]*60+(+p[1]||0))); }

  var pdfMode   = _pdfMode || 'normal';
  var activeCols = [{ key:'cidade', label:'Cidade', align:'left' }];
  if (cols.chegada) activeCols.push({ key:'chegada', label:'Chegada', align:'center' });
  if (cols.parada)  activeCols.push({ key:'parada',  label:'Parada',  align:'center' });
  if (cols.saida)   activeCols.push({ key:'saida',   label:'Saída',   align:'center' });
  if (cols.desl) activeCols.push({ key:'desl', label:'Desl.', align:'left' });
  if (pdfMode !== 'comercial') {
    if (cols.comercial) activeCols.push({ key:'comercial', label:'Comercial', align:'center' });
    if (cols.dif)       activeCols.push({ key:'dif',       label:'Dif.',      align:'center' });
  }

  var thead = activeCols.map(function(col) {
    return '<th bgcolor="#f0f2f8" style="text-align:' + col.align + ';">' + col.label + '</th>';
  }).join('');

  // Badge de partida: o conversor de PDF do servidor não renderiza SVG inline,
  // então no modo forServer usamos um símbolo de texto no lugar do ícone.
  var startBadge = forServer
    ? '<span style="background:#f47920;color:#fff;border-radius:3px;padding:0 5px;margin-left:4px;font-size:9px;font-weight:700;">&#9658;</span>'
    : '<span style="display:inline-flex;align-items:center;background:#f47920;color:#fff;border-radius:3px;padding:1px 5px;margin-left:3px;">' + ico('send',9) + '</span>';

  var tbody = '';
  var accumTv = 0, accumDist = 0, accumAllOsrm = true;
  c.pontos.forEach(function(p, i) {
    var isStart = (i === startIdx);
    var isLast  = (i === c.pontos.length - 1);
    if (p.preDep) {
      tbody += '<tr style="opacity:0.32;">'
        + '<td><strong>' + pe(p.nomePonto) + '</strong></td>'
        + '<td colspan="' + (activeCols.length - 1) + '" style="text-align:center;color:#aaa;font-style:italic;font-size:10px;">pré-partida</td>'
        + '</tr>';
      return;
    }
    var comVal = _comercialTimes[_seq[i].idPonto] || '';
    if (pdfMode === 'comercial' && !isStart) {
      accumTv   += (p.tv   || 0);
      accumDist += (p.dist || 0);
      if (p.distSource !== 'osrm') accumAllOsrm = false;
    }
    if (pdfMode === 'comercial' && !comVal) return;
    var cells  = {};

    cells.cidade = '<strong>' + pe(p.nomePonto) + '</strong>'
      + (isStart ? ' ' + startBadge : '');

    if (pdfMode === 'comercial') {
      cells.chegada = isStart
        ? '<span style="color:#bbb;">—</span>'
        : (comVal ? '<strong>' + pe(comR(comVal)) + '</strong>' : '<span style="color:#ccc;">—</span>');
      cells.parada = (!isStart && !isLast && p.tp) ? hhmm(p.tp) : '—';
      if (isStart) {
        cells.saida = comVal ? '<strong>' + pe(comR(comVal)) + '</strong>' : '—';
      } else if (isLast) {
        cells.saida = '<span style="color:#bbb;">—</span>';
      } else if (comVal) {
        cells.saida = '<strong>' + msR(_p(comVal) + (p.tp || 0)) + '</strong>';
      } else {
        cells.saida = '—';
      }
      if (isStart || (accumDist === 0 && accumTv === 0)) {
        cells.desl = '—';
      } else {
        var tvStr2   = hhmm(accumTv) + (!accumAllOsrm ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        var distStr2 = accumDist.toFixed(1) + ' km' + (!accumAllOsrm ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        cells.desl   = tvStr2 + ' <span style="color:#d4d8e8;margin:0 2px;">|</span> ' + distStr2;
      }
      accumTv = 0; accumDist = 0; accumAllOsrm = true;
    } else {
      cells.chegada = isStart
        ? '<span style="color:#bbb;">—</span>'
        : '<strong>' + (p.chegadaMin === null ? '—' : msR(p.chegadaMin)) + '</strong>';
      cells.parada  = (!isStart && !isLast && p.saidaMin !== null) ? hhmm(p.tp) : '—';
      cells.saida   = p.saidaMin !== null
        ? '<strong>' + msR(p.saidaMin) + '</strong>'
        : (p.chegadaMin !== null ? '<strong style="color:#f47920;">' + (forServer ? '&#9733;' : ico('star',11)) + ' ' + msR(p.chegadaMin) + '</strong>' : '—');

      if (isStart || !p.hasCoords) {
        cells.desl = '—';
      } else {
        var tvStr   = hhmm(p.tv)   + (p.distSource !== 'osrm' ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        var distStr = p.dist.toFixed(1) + ' km' + (p.distSource !== 'osrm' ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        cells.desl  = tvStr + ' <span style="color:#d4d8e8;margin:0 2px;">|</span> ' + distStr;
      }

      cells.comercial = comVal
        ? '<strong style="color:#1565c0;">' + pe(comR(comVal)) + '</strong>'
        : '<span style="color:#ccc;">—</span>';

      cells.dif = '—';
      if (comVal && p.chegadaMin !== null) {
        var d2 = _diffMin(comVal, p.chegadaMin, _seq[i].idPonto), a2 = Math.abs(d2);
        var c2 = d2 > 2 ? '#22c97a' : d2 < -2 ? '#e53935' : '#f47920';
        var s2 = d2 > 2 ? '+' : d2 < -2 ? '−' : '≈';
        cells.dif = '<strong style="color:' + c2 + ';">' + s2 + (a2 > 1 ? hhmm(a2) : '') + '</strong>';
      }
    }

    var rowBgColor = isStart ? '#f0fff8' : isLast ? '#fff8f0' : (!comVal ? '#fff8f2' : '');
    tbody += '<tr' + (rowBgColor ? ' bgcolor="' + rowBgColor + '" style="background-color:' + rowBgColor + ';"' : '') + '>';
    activeCols.forEach(function(col) {
      tbody += '<td style="text-align:' + col.align + ';">' + (cells[col.key] || '—') + '</td>';
    });
    tbody += '</tr>';
  });

  // ── Modo servidor: HTML enxuto para o conversor do Google (getAs PDF).
  // O conversor não suporta grid/flex/position:fixed/SVG, então stats viram
  // <table> e os ícones viram texto. O rodapé NÃO vai no HTML: é carimbado
  // depois em todas as páginas via pdf-lib (o conversor não fixa rodapé por
  // página); o @page reserva 14mm no pé para o carimbo não cobrir as linhas.
  if (forServer) {
    var sMeta = [_sel.sentido, 'Partida ' + partidaR(partida), (tipoVia || 'BR'), vel + ' km/h', fonteDist]
                  .filter(Boolean).map(pe).join(' &nbsp;·&nbsp; ');
    // table-layout:fixed + larguras explícitas: as colunas de tempo/valor ficam
    // estreitas e a Cidade fica com o restante, para nomes longos caberem em 1
    // linha (evita linhas altas e baixas alternadas). Garante também que a tabela
    // nunca exceda a página (o conversor do Google cortava colunas ao transbordar).
    var colW     = { chegada: 13, parada: 11, saida: 13, comercial: 13, dif: 11, desl: 18 };
    var usadas   = activeCols.slice(1).reduce(function(s, col) { return s + (colW[col.key] || 14); }, 0);
    var firstW   = Math.max(28, 100 - usadas);
    var colgroup = '<colgroup><col style="width:' + firstW + '%;">'
      + activeCols.slice(1).map(function(col) { return '<col style="width:' + (colW[col.key] || 14) + '%;">'; }).join('')
      + '</colgroup>';
    var s = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>' + pe(title) + '</title><style>'
      + '@page{size:A4 portrait;margin:0 0 14mm 0;}'
      // print-color-adjust:exact → o conversor do Google preserva as cores de
      // fundo (barra escura do cabeçalho, realce dos stats, fundo do thead);
      // sem isso ele descarta backgrounds ao renderizar como impressão.
      + '*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}'
      + 'html,body{width:210mm;}'
      + 'body{font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#1a1d23;}'
      + '.hdr{background:#1a1d23;color:#fff;padding:22px 12mm 18px;}'
      + '.hdr-title{font-size:22px;font-weight:900;letter-spacing:.01em;line-height:1.1;}'
      + '.hdr-sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#f47920;margin-top:5px;}'
      + '.hdr-meta{font-size:10px;color:#9aa0ad;margin-top:7px;}'
      + '.body{padding:7mm 12mm 8mm;}'
      + 'table.stats{width:100%;border-collapse:separate;border-spacing:6px 0;margin-bottom:14px;}'
      + 'table.stats td{border:1px solid #dde1ee;border-radius:6px;padding:10px 12px;text-align:center;width:25%;}'
      + 'table.stats td.hi{background:#fff8f0;border-color:#fddcb3;}'
      + '.sv{font-size:16px;font-weight:800;color:#1a1d23;}'
      + 'table.stats td.hi .sv{color:#f47920;}'
      + '.sl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-top:2px;}'
      + 'table.sched{width:100%;table-layout:fixed;border-collapse:collapse;font-size:11px;border:1px solid #cdd2e5;}'
      + 'table.sched th{background:#f0f2f8;padding:6px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#5a6070;border:1px solid #cdd2e5;white-space:normal;}'
      + 'table.sched td{padding:7px 10px;border:1px solid #dde1ee;vertical-align:middle;word-break:break-word;}'
      + 'tr{page-break-inside:avoid;}'
      + '</style></head><body>'
      // Cabeçalho via <table bgcolor> + cores inline: o conversor do Google
      // ignora `background` em CSS, mas respeita o atributo bgcolor.
      + '<table width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">'
      +   '<tr><td bgcolor="#1a1d23" style="background-color:#1a1d23;padding:22px 12mm 18px;">'
      +     '<div style="font-size:22px;font-weight:900;letter-spacing:.01em;line-height:1.1;color:#ffffff;">' + pe(title) + '</div>'
      +     (subtitle ? '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#f47920;margin-top:5px;">' + pe(subtitle) + '</div>' : '')
      +     '<div style="font-size:10px;color:#9aa0ad;margin-top:7px;">' + sMeta + '</div>'
      +   '</td></tr>'
      + '</table>'
      + '<div class="body">'
      +   '<table class="stats"><tr>'
      +     '<td><div class="sv">' + c.distTotal + ' km</div><div class="sl">Distância</div></td>'
      +     '<td><div class="sv">' + hhmm(c.tvTotal) + '</div><div class="sl">Deslocamento</div></td>'
      +     '<td><div class="sv">' + hhmm(c.tpTotal) + '</div><div class="sl">Paradas</div></td>'
      +     '<td class="hi" bgcolor="#fff8f0"><div class="sv">' + hhmm(c.totalMin) + '</div><div class="sl">Tempo total</div></td>'
      +   '</tr></table>'
      +   '<table class="sched">' + colgroup + '<thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table>'
      + '</div>'
      + '</body></html>';
    return s;
  }

  var html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    + '<title>' + pe(title) + '</title><style>'
    + '@page{margin:10mm 12mm 28mm 12mm;}'
    + '*{box-sizing:border-box;margin:0;padding:0;}'
    + 'body{font-family:Arial,sans-serif;font-size:12px;color:#1a1d23;}'
    + '.hdr{background:#1a1d23;color:#fff;padding:22px 28px 18px;}'
    + '.hdr-title{font-size:22px;font-weight:900;letter-spacing:.01em;line-height:1.1;}'
    + '.hdr-sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#f47920;margin-top:5px;}'
    + '.hdr-meta{font-size:10px;color:#9aa0ad;margin-top:7px;}'
    + '.body{padding:18px 28px 24mm 28px;}'
    + '.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}'
    + '.stat{border:1px solid #dde1ee;border-radius:6px;padding:10px 12px;text-align:center;}'
    + '.sv{font-size:16px;font-weight:800;color:#1a1d23;}'
    + '.sl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-top:2px;}'
    + '.stat.hi{background:#fff8f0;border-color:#fddcb3;}.stat.hi .sv{color:#f47920;}'
    + 'table{width:100%;border-collapse:collapse;font-size:11px;border:1px solid #cdd2e5;}'
    + 'th{background:#f0f2f8;padding:6px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#5a6070;border:1px solid #cdd2e5;white-space:nowrap;}'
    + 'td{padding:7px 10px;border:1px solid #dde1ee;vertical-align:middle;}'
    + '.pfooter{position:fixed;bottom:0;left:0;right:0;height:18mm;background:#fff;border-top:2px solid #f47920;padding:5px 28px 3px;font-size:9px;color:#555;display:flex;justify-content:space-between;align-items:center;line-height:1.5;}'
    + '.pfooter-left{display:flex;flex-direction:column;}'
    + '.pfooter-company{font-weight:700;color:#1a1d23;font-size:9.5px;}'
    + '.pfooter-cnpj{color:#888;}'
    + '.pfooter-right{text-align:right;color:#888;font-size:9px;}'
    + '@media print{'
    +   '*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}'
    +   'tr{page-break-inside:avoid;}'
    +   '.pfooter{display:flex !important;}'
    + '}'
    + '</style></head><body>';

  html += '<div class="hdr"><div class="hdr-title">' + pe(title) + '</div>';
  if (subtitle) html += '<div class="hdr-sub">' + pe(subtitle) + '</div>';
  html += '<div class="hdr-meta">'
    + [_sel.sentido, 'Partida ' + partidaR(partida), (tipoVia || 'BR'), vel + ' km/h', fonteDist]
      .filter(Boolean).map(pe).join(' &nbsp;·&nbsp; ')
    + '</div></div>';

  html += '<div class="body">'
    + '<div class="stats">'
    + '<div class="stat"><div class="sv">' + c.distTotal + ' km</div><div class="sl">Distância</div></div>'
    + '<div class="stat"><div class="sv">' + hhmm(c.tvTotal) + '</div><div class="sl">Deslocamento</div></div>'
    + '<div class="stat"><div class="sv">' + hhmm(c.tpTotal) + '</div><div class="sl">Paradas</div></div>'
    + '<div class="stat hi"><div class="sv">' + hhmm(c.totalMin) + '</div><div class="sl">Tempo total</div></div>'
    + '</div>'
    + '<table><thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table>'
    + '</div>';

  var genDate = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  html += '<div class="pfooter">'
    + '<div class="pfooter-left">'
    +   '<span class="pfooter-company">KANDANGO TRANSPORTE E TURISMO LTDA</span>'
    +   '<span class="pfooter-cnpj">CNPJ: 03.233.439/0001-52</span>'
    + '</div>'
    + '<div class="pfooter-right" id="pfPageInfo">Gerado em ' + pe(genDate) + '</div>'
    + '</div>';
  if (!returnHtml) html += '<script>'
    + 'window.onload = function() {'
    +   'try {'
    +     'var PX    = 96 / 25.4;'                                        // px por mm a 96 DPI (CSS pixels)
    +     'var pageH = Math.round((297 - 10 - 28) * PX);'                // A4 − margens top+bottom = 259mm
    +     'var safe  = Math.round(22 * PX);'                             // zona segura ≥ footer (18mm) + buffer
    +     'var a4W   = Math.round(186 * PX);'                            // largura do conteúdo A4 (210-12-12 mm)
    +     'var body  = document.querySelector(".body");'
    +     'var tbody = document.querySelector("tbody");'
    +     'if (tbody && body) {'
    +       'body.style.width = a4W + "px";'                             // força largura de impressão para medir
    +       'void body.offsetHeight;'                                     // reflow síncrono — alturas reais de A4
    +       'var curY = tbody.getBoundingClientRect().top % pageH;'
    +       'Array.from(tbody.querySelectorAll("tr")).forEach(function(row) {'
    +         'var rh = row.getBoundingClientRect().height;'
    +         'if (curY + rh > pageH - safe) {'
    +           'row.style.breakBefore = "page";'
    +           'row.style.pageBreakBefore = "always";'
    +           'curY = rh;'
    +         '} else {'
    +           'curY += rh;'
    +         '}'
    +       '});'
    +       'body.style.width = "";'                                      // restaura antes de imprimir
    +     '}'
    +     'var bodyH = document.querySelector(".body").scrollHeight;'
    +     'var pages = Math.max(1, Math.ceil(bodyH / pageH));'
    +     'var el = document.getElementById("pfPageInfo");'
    +     'if (el) el.innerHTML = "Pág. <span id=\\"pn\\">1</span> / " + pages;'
    +   '} catch(e) {}'
    +   'window.print();'
    + '};'
    + '<\/script>';
  html += '</body></html>';

  if (returnHtml) return html;

  var w = window.open('', '_blank', 'width=1000,height=760');
  if (!w) { toast('Popup bloqueado. Permita popups para este site.', 'error'); return; }
  w.document.write(html);
  w.document.close();
}

function abrirImportarPontos() {
  if (!_sel) return;
  var outros = _esqs.filter(function(e) {
    return e.id_esquema !== _sel.id_esquema && e.nome_linha === _sel.nome_linha;
  });

  }

  document.getElementById('importModalOverlay').style.display = 'flex';

  function _renderImportList(contagem) {
    list.innerHTML = outros.map(function(e) {
      var cnt = contagem ? (contagem[String(e.id_esquema)] || 0) : null;
      var vazio = cnt !== null && cnt === 0;

        ? '<span style="margin-left:6px;font-size:10px;color:' + (vazio ? '#f87171' : '#6ee7b7') + ';">'

        : '';
      return '<div class="sdi" data-id="' + esc(e.id_esquema) + '"'
        + (vazio ? ' style="opacity:.45;pointer-events:none;cursor:default;"' : ' style="cursor:pointer;"')
        + '>'
        + '<div class="sdi-main">' + esc(e.id_esquema) + ' — ' + esc(e.nome_linha) + cntHtml + '</div>'
        + '<div class="sdi-meta">'
        + (e.horario ? '<span style="background:#fff8e1;color:#f47920;border:1px solid #ffe082;border-radius:3px;padding:0 5px;margin-right:4px;font-size:10px;">' + esc(e.horario) + '</span>' : '')
        + esc(e.sentido || '')
        + '</div></div>';
    }).join('');
    list.querySelectorAll('.sdi:not([style*="pointer-events:none"])').forEach(function(el) {
      el.addEventListener('click', function() {
        importarDeEsquema(el.getAttribute('data-id'));
      });
    });

  if (typeof google !== 'undefined' && google.script) {
    var ids = outros.map(function(e){ return e.id_esquema; });
    google.script.run
      .withSuccessHandler(function(contagem) { _renderImportList(contagem); })
      .withFailureHandler(function()         { _renderImportList(null);     })
      .getContagemPontosEsquemas(ids);
  } else {
    _renderImportList(null);
  }
}

function fecharImportModal() {

}

function importarDeEsquema(idEsq) {
  if (_seq.length > 0) {
    if (!confirm('A sequência atual será substituída pelos pontos importados. Continuar?')) return;
  }
  fecharImportModal();
  loading('Importando pontos…');
  google.script.run
    .withSuccessHandler(function(pontos) {
      doneLoading();
      if (!pontos || !pontos.length) {
        toast('O horário de origem não possui pontos cadastrados.', 'error');
        return;
      }
      // Monta sequência com dados de local do _lMap
      _seq = pontos.map(function(p) {
        var l = _lMap[String(p.idPonto)] || {};
        return { idPonto: p.idPonto, nomePonto: p.nomePonto, tipo: p.tipo || '',
                 lat: l.lat || null, lng: l.lng || null, isNew: true };
      });
      // Importa dados específicos da ROTA (não do horário)
      _legVia = {};
      pontos.forEach(function(p) { if (p.tipoTrecho) _legVia[p.idPonto] = p.tipoTrecho; });
      // tempo_local não é mais usado: parada vem da aba TEMPO_PERMANENCIA e,
      // fora dela, do padrão fixo de 30 min. _customStopTimes só guarda edições
      // feitas na sessão.
      _customStopTimes = {};
      // Horários comerciais são específicos de cada horário — não importar
      _comercialTimes  = {};
      _osrmLegs        = undefined;
      _osrmSeqKey      = '';
      _osrmGeometry    = null;
      _horStartIdx     = 0;
      _osrmStatus      = 'pending';
      renderSeq();
      updateInsAfter();
      updateMap();
      dirtySeq();
      var srcEsq = _esqs.find(function(e) { return e.id_esquema === idEsq; });
      var srcLabel = srcEsq ? (srcEsq.horario ? srcEsq.horario + ' (' + srcEsq.sentido + ')' : srcEsq.id_esquema) : idEsq;
      toast(pontos.length + ' pontos importados de ' + srcLabel + '. Salve para confirmar.', 'success', 5000);
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Erro ao importar: ' + (e.message || e), 'error');
    })
    .getPontosEsquemaParaFormulario(idEsq);
}

function initMap() {
  _map = L.map('map', { zoomControl: true }).setView([-14.235, -51.9253], 4);
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: '&copy; Esri', maxZoom: 19, crossOrigin: true }
  ).addTo(_map);
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
    { subdomains: 'abcd', maxZoom: 19, opacity: 0.85, crossOrigin: true }
  ).addTo(_map);
}

function updateMap() {
  if (_view === 'horario') { renderHorario(); return; }
  if (!_map) return;
  _markers.forEach(function(m) { m.remove(); });
  _markers = [];
  if (_poly) { _poly.remove(); _poly = null; }
  _clearAnttMapLayers();

  var pts = _seq.filter(function(p) { return p.lat && p.lng; });
  if (!pts.length) {
    document.getElementById('map').style.display = 'none';
    document.getElementById('mapPh').style.display = '';
    document.getElementById('mapLegend').classList.remove('show');
    return;
  }

  document.getElementById('map').style.display = 'block';
  document.getElementById('mapPh').style.display = 'none';
  document.getElementById('mapLegend').classList.add('show');

  var seqCoordIdxs = [];
  _seq.forEach(function(p, i) { if (p.lat && p.lng) seqCoordIdxs.push(i); });
  var firstCoordIdx = seqCoordIdxs[0];
  var lastCoordIdx  = seqCoordIdxs[seqCoordIdxs.length - 1];
  var lls = pts.map(function(p) { return [+p.lat, +p.lng]; });

  var mapSeqKey = _seqCoordsKey();
  setTimeout(function() {
    _map.invalidateSize();

    // 1. Desenha trechos ANTT coloridos PRIMEIRO (ficam abaixo da rota laranja)
    _drawAnttOnMap();

    // 2. Rota principal por cima
    _poly = L.polyline(lls, { color: '#f47920', weight: 5, opacity: 0.9 }).addTo(_map);

    if (_osrmGeometry && _osrmSeqKey === mapSeqKey) {
      _poly.setLatLngs(_osrmGeometry);
    } else if (!_osrmGeometry || _osrmSeqKey !== mapSeqKey) {
      _fetchOsrmDistances(function(legs, geom) {
        if (_seqCoordsKey() !== mapSeqKey) return;
        _osrmLegs     = _osrmLegs !== undefined ? _osrmLegs : legs;
        _osrmSeqKey   = mapSeqKey;
        _osrmGeometry = geom;
        if (_poly && geom) _poly.setLatLngs(geom);
        // Redesenha ANTT com distâncias reais e garante que a rota fica por cima
        _drawAnttOnMap();
        if (_poly) _poly.bringToFront();
      });
    }

    // 3. Marcadores de sequência (DOM elements — sempre acima do SVG)
    _seq.forEach(function(p, i) {
      if (!p.lat || !p.lng) return;
      var first = (i === firstCoordIdx), last = (i === lastCoordIdx);
      // Destaque de apoio ANTT apenas quando há alertas ativos na rota
      var isApoio = _anttMapActive && !first && !last && _isApoioAntt(i);
      var bg  = first ? '#22c97a' : last ? '#e05050' : '#f47920';
      var sz  = (first || last) ? 28 : 22;
      var lbl = first ? 'I' : last ? 'F' : String(i + 1);
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;' +
              'background:' + bg + ';border:2.5px solid rgba(255,255,255,0.85);' +
              (isApoio ? 'outline:2px solid rgba(34,197,90,0.75);outline-offset:1px;' : '') +
              'display:flex;align-items:center;justify-content:center;' +
              'font-size:' + (sz > 24 ? '11px' : '10px') + ';font-weight:800;color:#fff;' +
              'box-shadow:0 2px 8px rgba(0,0,0,0.55);">' + lbl + '</div>',
        iconSize: [sz, sz], iconAnchor: [sz/2, sz/2]
      });
      var m = L.marker([+p.lat, +p.lng], { icon: icon });
      m.bindTooltip(
        '<strong>' + esc(p.nomePonto) + '</strong>' +
        '<br><span style="font-size:10px;color:#888;">#' + (i+1) + (p.tipo ? ' · ' + esc(p.tipo) : '') +
        (isApoio ? ' · <span style="color:#4ade80">apoio ANTT</span>' : '') + '</span>',
        { direction: 'top', offset: [0, -(sz/2) - 4] }
      );
      m.addTo(_map);
      _markers.push(m);
    });

    _map.fitBounds(lls, { padding: [44, 44], maxZoom: 13 });
  }, 80);
}

function setupEsqSearch() {
  var inp  = document.getElementById('esqSearch');
  var drop = document.getElementById('esqDrop');

  // Lista persistente agrupada por terminal de partida — sempre visível no
  // modal e filtrada conforme o usuário digita.
  inp.addEventListener('focus', function() { renderEsqs(this.value); });
  inp.addEventListener('click', function() { renderEsqs(this.value); });
  inp.addEventListener('input', function() { renderEsqs(this.value); });

  // mousedown no item previne o blur do input, mantendo a seleção funcionando
  drop.addEventListener('mousedown', function(e) { e.preventDefault(); });

  document.getElementById('btnNovo').addEventListener('click', novoEsquema);
  document.getElementById('btnSalvEsq').addEventListener('click', salvarEsquema);
}

function renderEsqs(q) {
  var drop = document.getElementById('esqDrop');
  var nq   = norm(q);
  // "1845" ou "845" → "18:45" / "08:45" para casar com horários
  var timeQ = null;
  var digits = (q || '').trim().replace(/\D/g, '');
  if (digits.length === 4) timeQ = digits.slice(0, 2) + ':' + digits.slice(2);
  else if (digits.length === 3) timeQ = '0' + digits[0] + ':' + digits.slice(1);

  var list = _esqs.filter(function(e) {
    return !nq
      || norm(e.id_esquema).includes(nq)
      || norm(e.nome_linha).includes(nq)
      || norm(e.horario || '').includes(nq)
      || norm(e.sentido || '').includes(nq)
      || norm(e.partida || '').includes(nq)
      || (timeQ && (e.horario || '').startsWith(timeQ));
  });

  if (!list.length) {
    drop.innerHTML = '<div class="sd-empty">Nenhum resultado</div>';
    drop.classList.add('open');
    return;
  }

  // Agrupa por terminal de partida (1º ponto do esquema)
  var groups = {};
  list.forEach(function(e) {
    var key = (e.partida && e.partida.trim()) ? e.partida.trim() : 'Sem partida definida';
    (groups[key] = groups[key] || []).push(e);
  });
  var keys = Object.keys(groups).sort(function(a, b) { return a.localeCompare(b, 'pt-BR'); });

  drop.innerHTML = keys.map(function(gk) {
    var items = groups[gk].sort(function(a, b) {
      return norm(a.nome_linha).localeCompare(norm(b.nome_linha))
          || String(a.horario || '').localeCompare(String(b.horario || ''));
    });
    return '<div class="esq-group-h">' + esc(gk)
      + '<span class="esq-group-c">' + items.length + '</span></div>'
      + items.map(function(e) {
          return '<div class="sdi" data-id="' + esc(e.id_esquema) + '">'
            + '<div class="sdi-main">' + hl(e.id_esquema + ' — ' + e.nome_linha, q) + '</div>'
            + '<div class="sdi-meta">'
            + (e.horario ? '<span style="background:#fff8e1;color:#f47920;border:1px solid #ffe082;border-radius:3px;padding:0 5px;margin-right:4px;font-size:10px;">' + esc(e.horario) + '</span>' : '')
            + esc(e.sentido || '')
            + '</div></div>';
        }).join('');
  }).join('');

  drop.classList.add('open');
  drop.querySelectorAll('.sdi').forEach(function(el) {
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      var id  = el.getAttribute('data-id');
      var esq = _esqs.find(function(e) { return e.id_esquema === id; });
      if (esq) selecionarEsq(esq);
    });
  });
}

function salvarEsquema() {
  var nome  = document.getElementById('fNome').value.trim();
  var hor   = document.getElementById('fHor').value.trim();
  var sent  = document.getElementById('fSent').value;
  if (!nome) { toast('Nome da linha é obrigatório.', 'error'); return; }

  var btn = document.getElementById('btnSalvEsq');
  btn.disabled = true;
  var dados = { nomeLinha: nome, horario: hor, sentido: sent };

  if (_isNovo) {
    loading('Criando esquema…');
    google.script.run
      .withSuccessHandler(function(r) {
        doneLoading();
        btn.disabled = false;
        var novoEsq = { id_esquema: String(r.id), nome_linha: nome, horario: hor, sentido: sent };
        _esqs.push(novoEsq);
        _isNovo = false;
        document.getElementById('btnNovo').style.display = ''; // restaura sempre
        if (_voltaMode && _voltaSnapshot) {
          _voltaMode = false;
          var snap = _voltaSnapshot;
          _voltaSnapshot = null;
          _aplicarVoltaESpelhar(novoEsq, snap);
        } else {
          selecionarEsq(novoEsq);
          toast('Esquema #' + r.id + ' criado!', 'success');
        }
      })
      .withFailureHandler(function(e) {
        doneLoading(); btn.disabled = false;
        toast('Erro: ' + (e.message || e), 'error');
      })
      .criarEsquema(dados);
  } else {
    loading('Atualizando esquema…');
    google.script.run
      .withSuccessHandler(function() {
        doneLoading();
        btn.disabled = false;
        _sel.nome_linha = nome; _sel.horario = hor; _sel.sentido = sent;
        renderBadge(_sel);
        _updateHdrEsq(_sel);
        toast('Esquema atualizado!', 'success');
      })
      .withFailureHandler(function(e) {
        doneLoading(); btn.disabled = false;
        toast('Erro: ' + (e.message || e), 'error');
      })
      .atualizarEsquema(_sel.id_esquema, dados);
  }
}
