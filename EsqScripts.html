<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
// ============================================================
//  Estado
// ============================================================
var _esqs    = [];
var _locais  = [];
var _lMap    = {};
var _sel     = null;
var _seq     = [];
var _isNovo        = false;
var _seqDirt       = false;
var _voltaMode     = false;  // true quando criando viagem de volta
var _voltaSnapshot = null;   // { seq, legVia, customStopTimes } da viagem original

var _map     = null;
var _markers = [];
var _poly    = null;

// ============================================================
//  Horário — estado persistente
// ============================================================
var _view            = 'mapa';
var _comercialBase   = null;
var _comercialAbsMap = {};
var _lastCalc        = null;
var _pendingSelectIdx = null;
var _activeHorRow    = null;
var _pdfCols     = { chegada:true, parada:true, saida:true, desl:true, comercial:true, dif:true };
var _pdfMode     = 'normal';
var _pdfTitle    = '';
var _pdfSubtitle = '';
var _osrmLegs        = undefined;
var _osrmSeqKey      = '';
var _osrmGeometry    = null;
var _comercialTimes  = {};
var _horStartIdx     = 0;
var _customStopTimes = {};
var _temposPermanencia = {};   // { codigoLocal: minutos } — vindo da aba TEMPO_PERMANENCIA
var _legVia          = {};
var _tipoViaVel      = { BR: 85, Est: 75, Mun: 60, Urb: 45 };
var _VIA_LABEL_TO_KEY = { 'BR': 'BR', 'Estadual': 'Est', 'Municipal': 'Mun', 'Urbana': 'Urb' };
var _osrmStatus      = 'pending';
var _horSidebarHidden = (function(){ try { return localStorage.getItem('vc_hor_sidebar') === 'hidden'; } catch(e){ return false; } })();
var _horOsmHidden     = (function(){ try { return localStorage.getItem('vc_hor_osm')     === 'hidden'; } catch(e){ return false; } })();

// ── ANTT ──────────────────────────────────────────────────────
var ANTT_MAX_KM  = 495; // km — máximo entre pontos de apoio consecutivos (ANTT)
var ANTT_WARN_KM = 395; // km — aviso de proximidade ao limite
var ANTT_MIN_KM  = 30;  // km — pontos de apoio desnecessariamente próximos
var _anttMap          = {};   // { rowIdx → { type, dist, fromNome } }
var _anttStatus       = null; // estado do fim da rota
var _anttWarnIdx      = -1;   // índice da linha com badge warn atual (para substituição por error)
var _anttSuggCands    = [];   // candidatos de sugestão calculados
var _anttSuggCacheKey = '';   // chave do último batch de cache consultado
var _stretchPolys     = [];   // Leaflet polylines para coloração de trechos ANTT (map view)
var _suggMapMarkers   = [];   // Leaflet markers para sugestões de apoio (map view)
var _anttMapActive    = false; // true quando overlays ANTT estão desenhados no mapa

// Tempo de parada (minutos) por tipo de ponto
var STOP_TIMES = {
  RODOVIARIA: 15, TERMINAL: 15, RODOVIARIO: 15,
  GARAGEM: 20,
  POSTO: 20, POSTO_COMBUSTIVEL: 20, ABASTECIMENTO: 20,
  PEDAGIO: 2, PEDAGIO_PARADA: 2,
  PONTO: 5, PARADA: 5
};
var STOP_DEFAULT = 5;
var MIN_LEG_TV   = 30;

function _stopTime(tipo) {
  if (!tipo) return STOP_DEFAULT;
  var t = tipo.trim().toUpperCase().replace(/\s+/g, '_').replace(/[^A-Z_]/g, '');
  for (var k in STOP_TIMES) {
    if (t.indexOf(k) !== -1) return STOP_TIMES[k];
  }
  return STOP_DEFAULT;
}

function _getStopTime(idx, tipo) {
  var key = _seq[idx] ? _seq[idx].idPonto : idx;
  // Hierarquia: 1º edição manual / tempo_local salvo no esquema
  //             2º TEMPO_PERMANENCIA (limite por rodoviária)
  //             3º padrão por tipo (15/20/5)
  if (_customStopTimes[key] !== undefined)   return _customStopTimes[key];
  if (_temposPermanencia[key] !== undefined) return _temposPermanencia[key];
  return _stopTime(tipo);
}

// Haversine client-side (km) — mantido para uso eventual no mapa
function _hvs(lat1, lng1, lat2, lng2) {
  var R = 6371, tr = function(d){ return d * Math.PI / 180; };
  var dLat = tr(lat2 - lat1), dLng = tr(lng2 - lng1);
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(tr(lat1))*Math.cos(tr(lat2))*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)) * 10) / 10;
}

// Normaliza qualquer valor de horário para "HH:MM"
function _normalizeHHMM(val) {
  if (!val) return '';
  var s = String(val).trim();
  var m = s.match(/^(\d{1,2}):(\d{2})/);
  if (m) return ('0' + m[1]).slice(-2) + ':' + m[2];
  var dm = s.match(/\b(\d{1,2}):(\d{2}):\d{2}\b/);
  if (dm) return ('0' + dm[1]).slice(-2) + ':' + dm[2];
  return '';
}

// "HH:MM" → total minutos
function _p(s) {
  if (!s) return 0;
  var p = s.split(':'); return (+p[0] || 0) * 60 + (+p[1] || 0);
}
// total minutos → "HH:MM"
function _ms(m) {
  m = Math.round(m);
  var h = Math.floor(m / 60) % 24, mm = m % 60;
  return ('0' + h).slice(-2) + ':' + ('0' + mm).slice(-2);
}

// Diferença entre horário comercial e chegada calculada.
// Usa _comercialAbsMap quando disponível para rotas multi-dia.
function _diffMin(comVal, chegadaMin, idPonto) {
  if (idPonto !== undefined && _comercialAbsMap[idPonto] !== undefined) {
    return _comercialAbsMap[idPonto] - chegadaMin;
  }
  if (_comercialBase !== null) {
    var comElapsed = _p(comVal) - _comercialBase.comMin;
    while (comElapsed < 0) comElapsed += 1440;
    var calcElapsed = chegadaMin - _comercialBase.calcMin;
    return comElapsed - calcElapsed;
  }
  var base = chegadaMin % 1440;
  var diff = _p(comVal) - base;
  if (diff < -720) diff += 1440;
  if (diff >  720) diff -= 1440;
  return diff;
}

// Reconstrói _comercialBase e _comercialAbsMap incrementalmente.
function _recomputeComercialBase(c) {
  _comercialBase   = null;
  _comercialAbsMap = {};
  if (!c) return;
  var absMin    = null;
  var prevClock = null;
  for (var i = 0; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    if (p.preDep || p.chegadaMin === null) continue;
    var idPonto = _seq[i].idPonto;
    var comVal  = _comercialTimes[idPonto] || '';
    if (!comVal) continue;
    var clock = _p(comVal);
    if (absMin === null) {
      absMin = clock;
      _comercialBase = { comMin: clock, calcMin: p.chegadaMin };
    } else {
      var delta = clock - prevClock;
      if (delta < 0) delta += 1440;
      absMin = absMin + delta;
    }
    prevClock = clock;
    _comercialAbsMap[idPonto] = absMin;
  }
}

// minutos → "Xh YYmin"
function _dur(m) {
  m = Math.round(m);
  if (!m || m < 1) return '—';
  var h = Math.floor(m / 60), mm = m % 60;
  if (h && mm) return h + 'h ' + ('0' + mm).slice(-2) + 'min';
  if (h)        return h + 'h';
  return mm + 'min';
}
// minutos → "HH:MM" (duração)
function _hhmm(m) {
  m = Math.round(m || 0);
  var h = Math.floor(m / 60), mm = m % 60;
  return ('0' + h).slice(-2) + ':' + ('0' + mm).slice(-2);
}

// ============================================================
//  OSRM — distâncias reais de rota
// ============================================================
function _seqCoordsKey() {
  return _seq
    .filter(function(p){ return p.lat && p.lng; })
    .map(function(p){ return (+p.lat).toFixed(5) + ',' + (+p.lng).toFixed(5); })
    .join('|');
}

function _fetchOsrmDistances(callback) {
  var pts = _seq.filter(function(p){ return p.lat && p.lng; });
  if (pts.length < 2) { callback(null, null); return; }

  function normKey(a, b) { return a <= b ? (a+':'+b) : (b+':'+a); }

  var pairs = pts.slice(0, -1).map(function(pt, i) {
    return { a: pt.idPonto, b: pts[i+1].idPonto };
  });

  function legsFromCache(cached) {
    return pts.slice(0, -1).map(function(pt, i) {
      var entry = cached[normKey(pt.idPonto, pts[i+1].idPonto)];
      var km = entry && entry.km > 0 ? entry.km : 0;
      if (km > 0 && entry.tipoVia && !_legVia[pt.idPonto]) {
        _legVia[pt.idPonto] = entry.tipoVia;
      }
      return km > 0 ? { distKm: km, durationMin: 0 } : null;
    });
  }

  function callOsrm(cached) {
    var coords = pts.map(function(p){
      return (+p.lng).toFixed(6) + ',' + (+p.lat).toFixed(6);
    }).join(';');
    var url = 'https://router.project-osrm.org/route/v1/driving/' + coords
            + '?overview=full&geometries=geojson&annotations=false&continue_straight=false';

    fetch(url)
      .then(function(r){ return r.ok ? r.json() : Promise.reject('http'); })
      .then(function(data) {
        if (!data || data.code !== 'Ok' || !data.routes || !data.routes[0])
          return Promise.reject('no-route');

        var route = data.routes[0];
        var legs  = route.legs.map(function(l) {
          return {
            distKm:      Math.round(l.distance / 100) / 10,
            durationMin: Math.round(l.duration  / 6)  / 10
          };
        });

        var toSave = [];
        legs.forEach(function(leg, i) {
          if (!pts[i] || !pts[i+1]) return;
          var key    = normKey(pts[i].idPonto, pts[i+1].idPonto);
          var isNew  = leg.distKm > 0 && !((cached[key] || {}).km > 0);
          var via    = _legVia[pts[i].idPonto] || 'BR';
          // Envia TODOS os pares: km > 0 apenas nos novos; existentes recebem km=0
          // para que o backend só atualize tipo_via sem criar linha duplicada
          toSave.push({ a: pts[i].idPonto, b: pts[i+1].idPonto, km: isNew ? leg.distKm : 0, tipoVia: via });
        });
        if (toSave.length && typeof google !== 'undefined' && google.script)
          google.script.run.saveDistanciasCached(toSave);

        _osrmStatus = 'ok';
        var geom = route.geometry && route.geometry.coordinates
          ? route.geometry.coordinates.map(function(c){ return [c[1], c[0]]; })
          : null;
        callback(legs, geom);
      })
      .catch(function() {
        var fallback = legsFromCache(cached || {});
        var hasAny   = fallback.some(function(l){ return l !== null; });
        _osrmStatus  = hasAny ? 'cache' : 'unavailable';
        callback(hasAny ? fallback : null, null);
      });
  }

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(function(cached) {
        var allHit = pairs.every(function(p){ return (cached[normKey(p.a, p.b)] || {}).km > 0; });
        if (allHit) {
          _osrmStatus = 'cache';
          callback(legsFromCache(cached), null);
        } else {
          callOsrm(cached);
        }
      })
      .withFailureHandler(function(){ callOsrm({}); })
      .getDistanciasCached(pairs);
  } else {
    callOsrm({});
  }
}

// ============================================================
//  Preset de velocidade
// ============================================================
function setPreset(btn, defaultVel) {
  document.querySelectorAll('.hor-preset-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var tipo = btn.textContent.trim();
  var key  = _VIA_LABEL_TO_KEY[tipo] || tipo;
  document.getElementById('horVelMedia').value = (_tipoViaVel[key] || defaultVel);
  saveHorConfig();
  renderHorario();
}

function saveHorConfig() {
  if (!_sel) return;
  var partida = document.getElementById('horHoraPartida').value || '';
  var via = '', vel = parseFloat(document.getElementById('horVelMedia').value);
  document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
    if (b.classList.contains('active')) via = b.textContent.trim();
  });
  if (via && !isNaN(vel) && vel > 0) {
    _tipoViaVel[_VIA_LABEL_TO_KEY[via] || via] = vel;
  }
  try { localStorage.setItem('vc_horcfg_' + _sel.id_esquema, JSON.stringify({ partida: partida, via: via, viaVel: _tipoViaVel })); } catch(e) {}
}

function _restoreHorConfig(esq) {
  var cfg = null;
  try { cfg = JSON.parse(localStorage.getItem('vc_horcfg_' + esq.id_esquema) || 'null'); } catch(e) {}
  var partida = (cfg && cfg.partida) ? cfg.partida : (esq.horario || '00:00');
  var via     = (cfg && cfg.via)     ? cfg.via     : 'BR';
  if (cfg && cfg.viaVel) {
    Object.keys(cfg.viaVel).forEach(function(k) { _tipoViaVel[k] = cfg.viaVel[k]; });
  }
  document.getElementById('horHoraPartida').value = partida;
  var viaKey = _VIA_LABEL_TO_KEY[via] || via;
  document.getElementById('horVelMedia').value = _tipoViaVel[viaKey] || 85;
  document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim() === via);
  });
}

function _salvarVelAtiva() {
  if (!_sel) return;
  var vel = parseFloat(document.getElementById('horVelMedia').value);
  if (isNaN(vel) || vel <= 0) return;
  var tipo = '';
  document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
    if (b.classList.contains('active')) tipo = b.textContent.trim();
  });
  if (!tipo) return;
  var tipoKey = _VIA_LABEL_TO_KEY[tipo] || tipo;
  _tipoViaVel[tipoKey] = vel;
  google.script.run
    .withSuccessHandler(function() { toast(tipo + ' → ' + vel + ' km/h salvo', 'success'); })
    .withFailureHandler(function(e) { toast('Erro: ' + (e.message || e), 'error'); })
    .salvarTipoViaVelocidade(_sel.id_esquema, tipoKey, vel);
}

// ============================================================
//  Toggle painéis do horário
// ============================================================
function toggleHorSidebar() {
  _horSidebarHidden = !_horSidebarHidden;
  try { localStorage.setItem('vc_hor_sidebar', _horSidebarHidden ? 'hidden' : 'visible'); } catch(e) {}
  var el = document.getElementById('horSidebarWrap');
  if (!el) return;

}

function toggleHorOsm() {
  _horOsmHidden = !_horOsmHidden;
  try { localStorage.setItem('vc_hor_osm', _horOsmHidden ? 'hidden' : 'visible'); } catch(e) {}
  var el = document.getElementById('horOsmWrap');
  if (el) el.style.display = _horOsmHidden ? 'none' : '';
}

// ============================================================
//  Toggle Mapa / Horário
// ============================================================
function toggleView(v) {
  _view = v;
  try { localStorage.setItem('vc_view', v); } catch(e) {}
  var mapEl  = document.getElementById('map');
  var mapPh  = document.getElementById('mapPh');
  var mapLeg = document.getElementById('mapLegend');
  var horPan = document.getElementById('horPanel');
  var btnM   = document.getElementById('btnViewMapa');
  var btnH   = document.getElementById('btnViewHorario');

  if (v === 'horario') {
    mapEl.style.display  = 'none';
    mapPh.style.display  = 'none';
    mapLeg.classList.remove('show');
    horPan.style.display = 'flex';
    btnM.classList.remove('active'); btnH.classList.add('active');
    renderHorario();
  } else {
    horPan.style.display = 'none';
    btnM.classList.add('active'); btnH.classList.remove('active');
    updateMap();
  }
}

// ============================================================
//  Cálculo de horário
// ============================================================
function _calcHorario(osrmLegs) {
  var vel      = parseFloat(document.getElementById('horVelMedia').value) || 80;
  var partida  = document.getElementById('horHoraPartida').value || '00:00';
  var startIdx = Math.min(_horStartIdx, _seq.length - 1);
  var cur      = _p(partida);
  var res = [], distTotal = 0, tvTotal = 0, tpTotal = 0;
  var osrmOk   = Array.isArray(osrmLegs) && osrmLegs.length > 0;

  var coordRank = {};
  if (osrmOk) {
    var r = 0;
    _seq.forEach(function(p, i){ if (p.lat && p.lng) coordRank[i] = r++; });
  }

  _seq.forEach(function(p, i) {
    var preDep  = (i < startIdx);
    var isStart = (i === startIdx);
    var isLast  = (i === _seq.length - 1);

    var dist = 0, tv = 0, distSource = 'none', timeSource = 'none';
    if (!preDep && !isStart) {
      var prev = _seq[i - 1];
      var legViaType = _legVia[prev.idPonto];
      var legVel = legViaType ? (_tipoViaVel[legViaType] || vel) : vel;
      var pRank = osrmOk ? coordRank[i - 1] : undefined;
      var cRank = osrmOk ? coordRank[i]     : undefined;
      var leg   = (osrmOk && pRank !== undefined && cRank !== undefined
                   && cRank === pRank + 1) ? osrmLegs[pRank] : null;
      if (leg) {
        dist = leg.distKm; distSource = 'osrm';
        tv   = Math.max(Math.round((leg.distKm / legVel) * 60), MIN_LEG_TV);
        timeSource = 'vel';
      } else {
        dist = 0; distSource = 'none';
        tv   = MIN_LEG_TV; timeSource = 'min';
      }
    }

    var tp = (preDep || isStart) ? 0 : _getStopTime(i, p.tipo);

    var chegada, saida;
    if (preDep) {
      chegada = null; saida = null;
    } else if (isStart) {
      chegada = cur; saida = cur;
    } else {
      chegada = cur + tv; saida = chegada + tp;
    }

    if (!preDep) {
      distTotal += dist; tvTotal += tv; tpTotal += tp;
      if (saida !== null) cur = isLast ? chegada : saida;
    }

    res.push({
      idx: i, nomePonto: p.nomePonto, tipo: p.tipo || '',
      preDep: preDep,
      dist: Math.round(dist * 10) / 10,
      tv: tv, tp: tp,
      chegadaMin: chegada !== null ? Math.round(chegada) : null,
      saidaMin:   (!preDep && !isLast && saida !== null) ? Math.round(saida) : null,
      hasCoords:  !!(p.lat && p.lng),
      distSource: distSource,
      timeSource: timeSource
    });
  });

  var anyOsrm  = res.some(function(p){ return p.distSource === 'osrm'; });
  var lastCalc = res.slice().reverse().find(function(p){ return p.chegadaMin !== null; });
  return {
    pontos:       res,
    distTotal:    Math.round(distTotal * 10) / 10,
    tvTotal:      Math.round(tvTotal),
    tpTotal:      Math.round(tpTotal),
    totalMin:     Math.round(tvTotal + tpTotal),
    chegadaFinal: lastCalc ? lastCalc.chegadaMin : _p(partida),
    usedOsrm:     anyOsrm,
    vel:          vel
  };
}

// ============================================================
//  Renderiza painel de horário
// ============================================================
function renderHorario() {
  var body = document.getElementById('horBody');
  if (!body) return;

  if (!_sel || !_seq.length) {
    body.innerHTML = '<div style="text-align:center;color:#9aa0ad;padding:40px 20px;">'
      + (!_sel ? 'Selecione um esquema para calcular o horário.'
               : 'Adicione pontos ao esquema para calcular o horário.')
      + '</div>';
    return;
  }

  var key = _seqCoordsKey();

  if (_osrmSeqKey === key && _osrmLegs !== undefined) {
    _renderHorarioWith(_osrmLegs);
    return;
  }

  _osrmSeqKey  = key;
  _osrmLegs    = undefined;
  _osrmStatus  = 'pending';
  _renderHorarioWith(null);

  _fetchOsrmDistances(function(legs, geom) {
    if (_osrmSeqKey !== key) return;
    _osrmLegs     = legs;
    _osrmGeometry = geom;
    if (_view === 'horario') {
      _renderHorarioWith(legs);
    } else if (geom && _poly) {
      _poly.setLatLngs(geom);
    }
  });
}

// ============================================================
//  ANTT — Verificação de Pontos de Apoio
// ============================================================

/**
 * Ponto de apoio ANTT = qualquer ponto da sequência SEM horário comercial definido.
 * Independe de tipo ou nome — o critério único é a ausência de saída comercial.
 */
function _isApoioAntt(idx) {
  var p = _seq[idx];
  if (!p) return false;
  return !_comercialTimes[p.idPonto];
}

/**
 * Percorre a sequência acumulando km entre pontos de apoio consecutivos.
 * - Pontos de apoio: qualquer ponto sem horário comercial → zera o contador.
 * - Pontos comerciais: alerta no PRIMEIRO que cruzar 395 km (warn) ou 495 km (error).
 * - Último ponto: sempre verifica o trecho final.
 * Preenche _anttMap[rowIdx] = { type, dist, fromNome }.
 */
function _computeAnttAlerts(c) {
  _anttMap     = {};
  _anttWarnIdx = -1;
  if (!c || _seq.length < 2) return;

  var startIdx     = Math.min(_horStartIdx, _seq.length - 1);
  var vel          = parseFloat(document.getElementById('horVelMedia').value) || 80;
  var lastNome     = _seq[startIdx] ? _seq[startIdx].nomePonto : '';
  var lastApoioIdx = startIdx;
  var accumDist    = 0;
  var maxStretch   = 0;   // maior trecho já fechado (entre dois apoios)
  var warnFired    = false;
  var errorFired   = false;

  for (var i = startIdx + 1; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    if (p.preDep) continue;

    var seg = p.dist || 0;
    if (seg === 0 && p.tv > 0) seg = Math.round((p.tv / 60) * vel * 10) / 10;
    accumDist += seg;

    var isLast  = (i === _seq.length - 1);
    var isApoio = _isApoioAntt(i);
    var d       = Math.round(accumDist);

    if (isApoio) {
      if (d > maxStretch) maxStretch = d;
      if      (d > ANTT_MAX_KM)            _anttMap[i] = { type: 'error', dist: d, fromNome: lastNome };
      else if (d > ANTT_WARN_KM)           _anttMap[i] = { type: 'warn',  dist: d, fromNome: lastNome };
      else if (d > 0 && d < ANTT_MIN_KM)  _anttMap[i] = { type: 'info',  dist: d, fromNome: lastNome };
      lastNome     = _seq[i].nomePonto;
      lastApoioIdx = i;
      accumDist    = 0;
      warnFired    = false;
      errorFired   = false;
    } else {
      if (!errorFired && d > ANTT_MAX_KM) {
        if (warnFired) { delete _anttMap[_anttWarnIdx]; }
        _anttMap[i] = { type: 'error', dist: d, fromNome: lastNome };
        errorFired = true;
      } else if (!warnFired && d > ANTT_WARN_KM) {
        _anttMap[i] = { type: 'warn', dist: d, fromNome: lastNome };
        _anttWarnIdx = i;
        warnFired = true;
      }
      if (isLast) {
        if (d > maxStretch) maxStretch = d;
        if (!_anttMap[i] && !errorFired) {
          if      (d > ANTT_MAX_KM)  _anttMap[i] = { type: 'error', dist: d, fromNome: lastNome };
          else if (d > ANTT_WARN_KM) _anttMap[i] = { type: 'warn',  dist: d, fromNome: lastNome };
        }
      }
    }
  }

  var apoioPt = _seq[lastApoioIdx];
  _anttStatus = {
    accumKm:       Math.round(accumDist),
    remaining:     Math.round(ANTT_MAX_KM - accumDist),
    maxStretch:    maxStretch,
    lastApoioNome: lastNome,
    lastApoioLat:  apoioPt ? (apoioPt.lat || null) : null,
    lastApoioLng:  apoioPt ? (apoioPt.lng || null) : null
  };
}

/**
 * Retorna true se o ponto pode ser candidato a apoio nas sugestões.
 * Usa o NOME (mais confiável que tipo) para excluir rodoviárias/terminais.
 */
function _isApoioCandidate(nome) {
  var n = (nome || '').trim().toUpperCase();
  return !['RODOVIARIA','RODOVIARIO','TERMINAL','ESTACAO'].some(function(k){
    return n.indexOf(k) !== -1;
  });
}

/** Distância em km entre dois pares de coordenadas (fórmula de Haversine). */
function _haversinKm(lat1, lng1, lat2, lng2) {
  var R = 6371, r = Math.PI / 180;
  var dLat = (lat2 - lat1) * r, dLng = (lng2 - lng1) * r;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)
        + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/** Atualiza a barra de status ANTT (ok / warn / error) no card de pontos. */
function _updateAnttWarnBar() {
  var bar = document.getElementById('anttWarn');
  if (!bar) return;
  if (!_anttStatus) { bar.style.display = 'none'; return; }

  // Determina o pior estado em toda a rota
  var hasError = false, hasWarn = false, worstDist = 0;
  Object.keys(_anttMap).forEach(function(k) {
    var a = _anttMap[k];
    if (!a) return;
    if (a.type === 'error') { hasError = true; if (a.dist > worstDist) worstDist = a.dist; }
    if (a.type === 'warn'  && !hasError) { hasWarn = true; if (a.dist > worstDist) worstDist = a.dist; }
  });

  var icoHtml, cls, txt;
  if (hasError) {
    icoHtml = ico('alert-triangle', 14); cls = 'error';
    txt = worstDist + 'km sem apoio — excede o limite ANTT de ' + ANTT_MAX_KM + 'km';
  } else if (hasWarn) {
    icoHtml = ico('zap', 14); cls = 'warn';
    txt = worstDist + 'km no trecho mais longo — faltam ' + (ANTT_MAX_KM - worstDist) + 'km para o limite';
  } else {
    var ms = _anttStatus.maxStretch || _anttStatus.accumKm || 0;
    icoHtml = ico('check', 14); cls = 'ok';
    txt = 'Conforme ANTT — maior trecho: ' + ms + 'km / ' + ANTT_MAX_KM + 'km';
  }

  bar.className = 'antt-warn-bar ' + cls;
  bar.style.display = '';
  bar.innerHTML = '<span class="antt-warn-ico">' + icoHtml + '</span>'
    + '<span class="antt-warn-txt">' + txt + '</span>';
}

// ─── Sugestões de próximo apoio ──────────────────────────────

/**
 * Calcula até `max` candidatos de apoio mais próximos na direção do trajeto.
 * Retorna array de { local, estKm, realKm, isForward }.
 */
function _computeApoioSuggestions(max) {
  if (!_anttStatus || !_anttStatus.lastApoioLat || !_anttStatus.lastApoioLng) return [];

  // Referência = último apoio (onde o trecho problemático começa)
  var refLat = +_anttStatus.lastApoioLat, refLng = +_anttStatus.lastApoioLng;
  // Busca pontos até o limite máximo a partir do último apoio
  var searchRadius = ANTT_MAX_KM;

  // Vetor direcional: do último apoio para o último ponto da rota
  var tail = _seq[_seq.length - 1];
  var hasDirVec = tail && tail.lat && tail.lng
    && (+tail.lat !== refLat || +tail.lng !== refLng);
  var dirLat = hasDirVec ? (+tail.lat - refLat) : 0;
  var dirLng = hasDirVec ? (+tail.lng - refLng) : 0;

  // IDs já na sequência → não sugerir
  var inSeq = {};
  _seq.forEach(function(p) { inSeq[p.idPonto] = true; });

  var cands = [];
  _locais.forEach(function(l) {
    if (!_isApoioCandidate(l.descricao) || !l.lat || !l.lng || inSeq[l.codigo]) return;
    var linKm = _haversinKm(refLat, refLng, +l.lat, +l.lng);
    var estKm = Math.round(linKm * 1.3);
    if (estKm < 10 || estKm > searchRadius) return;

    var isForward = true;
    if (hasDirVec) {
      var vLat = +l.lat - refLat, vLng = +l.lng - refLng;
      isForward = (vLat * dirLat + vLng * dirLng) >= 0;
    }
    cands.push({ local: l, estKm: estKm, realKm: null, isForward: isForward });
  });

  cands.sort(function(a, b) {
    if (a.isForward !== b.isForward) return a.isForward ? -1 : 1;
    return a.estKm - b.estKm;
  });

  return cands.slice(0, max || 5);
}

/** Renderiza o painel de sugestões no sidebar. */
function _renderApoioSuggestions(cands) {
  var el = document.getElementById('anttSuggest');
  if (!el) return;
  if (!cands || !cands.length) { el.style.display = 'none'; return; }

  var isErr = _anttStatus && _anttStatus.accumKm > ANTT_MAX_KM;
  el.className = 'antt-sugg-panel' + (isErr ? ' error' : '');
  el.style.display = '';

  var html = '<div class="antt-sugg-head">' + ico('lightbulb', 13) + ' Sugestões de apoio</div>';
  html += cands.map(function(c) {
    var dClass = c.realKm ? 'real' : 'est';
    var dVal   = c.realKm ? c.realKm : c.estKm;
    var dPfx   = c.realKm ? '' : '~';
    return '<div class="antt-sugg-item" data-cod="' + esc(c.local.codigo) + '">'
      + '<div class="antt-sugg-info">'
        + '<div class="antt-sugg-nome">' + esc(c.local.descricao) + '</div>'
        + '<div class="antt-sugg-meta">'
          + '<span class="antt-sugg-dist ' + dClass + '">' + dPfx + dVal + 'km</span>'
          + (c.local.tipo ? ' · ' + esc(c.local.tipo) : '')
          + (!c.isForward ? ' <span class="antt-sugg-behind">' + ico('arrow-left', 11) + ' atrás</span>' : '')
        + '</div>'
      + '</div>'
      + '<button class="antt-sugg-add btn-add-sugg" data-cod="' + esc(c.local.codigo) + '">+</button>'
      + '</div>';
  }).join('');
  el.innerHTML = html;

  el.querySelectorAll('.antt-sugg-add').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var found = _locais.find(function(l){ return l.codigo === btn.getAttribute('data-cod'); });
      if (found) addPontoNoFim(found);
    });
  });
}

/**
 * Consulta o cache de distâncias (Sheets) para os pares
 * último-ponto → candidato e atualiza os km reais onde houver hit.
 */
function _refreshSuggestionsWithCache(cands) {
  if (!cands.length || typeof google === 'undefined' || !google.script) return;
  var lastPt = _seq.length ? _seq[_seq.length - 1] : null;
  if (!lastPt) return;

  // Evita re-consultar o mesmo conjunto
  var key = lastPt.idPonto + '|' + cands.map(function(c){ return c.local.codigo; }).join(',');
  if (key === _anttSuggCacheKey) return;
  _anttSuggCacheKey = key;

  var pairs = cands.map(function(c){ return { a: lastPt.idPonto, b: c.local.codigo }; });

  google.script.run
    .withSuccessHandler(function(cached) {
      var updated = false;
      cands.forEach(function(c) {
        var a = lastPt.idPonto, b = c.local.codigo;
        var k = (a <= b) ? (a + ':' + b) : (b + ':' + a);
        var ck = (cached[k] || {}).km || 0;
        if (ck > 0 && ck !== c.realKm) {
          c.realKm = ck;
          updated = true;
        }
      });
      if (!updated) return;
      // Re-ordena com distâncias reais
      cands.sort(function(a, b) {
        if (a.isForward !== b.isForward) return a.isForward ? -1 : 1;
        return (a.realKm || a.estKm) - (b.realKm || b.estKm);
      });
      _renderApoioSuggestions(cands);
    })
    .withFailureHandler(function(){})
    .getDistanciasCached(pairs);
}

/** Ponto de entrada: calcula, renderiza e dispara consulta ao cache. */
function _updateApoioSuggestions() {
  if (!_anttStatus || _anttStatus.accumKm <= ANTT_WARN_KM) {
    var el = document.getElementById('anttSuggest');
    if (el) el.style.display = 'none';
    _anttSuggCands = [];
    return;
  }
  _anttSuggCands = _computeApoioSuggestions(5);
  _renderApoioSuggestions(_anttSuggCands);
  _refreshSuggestionsWithCache(_anttSuggCands);
}

// ── ANTT map overlays ────────────────────────────────────────

/** Remove todas as camadas ANTT do mapa (stretch polys + suggestion markers). */
function _clearAnttMapLayers() {
  _stretchPolys.forEach(function(p){ p.remove(); });
  _stretchPolys = [];
  _suggMapMarkers.forEach(function(m){ m.remove(); });
  _suggMapMarkers = [];
  _anttMapActive = false;
  var anttLeg = document.getElementById('mapAnttLegend');
  if (anttLeg) anttLeg.style.display = 'none';
}

/**
 * Desenha no mapa:
 *  1. Polylines coloridas por trecho entre pontos de apoio (verde/âmbar/vermelho)
 *  2. Marcadores de sugestão de apoio (pins roxos clicáveis)
 * Chamada de updateMap() — ANTES de adicionar _poly para que a rota fique por cima.
 */
function _drawAnttOnMap() {
  _clearAnttMapLayers();
  if (!_map || _seq.length < 2) return;

  // Calcula horário + ANTT com as legs disponíveis
  var legs = Array.isArray(_osrmLegs) ? _osrmLegs : null;
  var c = _calcHorario(legs);
  _computeAnttAlerts(c);
  if (!_anttStatus) return;

  // Só exibe overlays se houver preocupação ANTT real
  var needsOverlay = _anttStatus.maxStretch > ANTT_WARN_KM || _anttStatus.accumKm > ANTT_WARN_KM;
  if (!needsOverlay) return;

  var clr = { error: '#ef4444', warn: '#f59e0b', ok: '#22c55e' };
  var startIdx    = Math.min(_horStartIdx, _seq.length - 1);
  var stretchStart = startIdx;
  var accumDist   = 0;
  var hasWarnErr  = false;

  function _flushStretch(endIdx) {
    var d = Math.round(accumDist);
    if (d <= 0) return; // sem distância (OSRM não respondeu ainda)
    var type = d > ANTT_MAX_KM ? 'error' : d > ANTT_WARN_KM ? 'warn' : 'ok';
    if (type !== 'ok') hasWarnErr = true;
    var coords = [];
    for (var j = stretchStart; j <= endIdx; j++) {
      var sp = _seq[j];
      if (sp && sp.lat && sp.lng) coords.push([+sp.lat, +sp.lng]);
    }
    if (coords.length < 2) return;
    var fromNome = (_seq[stretchStart] || {}).nomePonto || '?';
    var toNome   = (_seq[endIdx]       || {}).nomePonto || '?';
    var lbl  = type === 'error' ? 'Excede ANTT' : type === 'warn' ? 'Atenção ANTT' : 'Trecho OK';
    var tip  = '<b>' + lbl + '</b><br>' + d + ' km'
             + '<br><span style="font-size:10px;color:#ccc">' + esc(fromNome) + ' → ' + esc(toNome) + '</span>';
    var pl = L.polyline(coords, {
      color: clr[type], weight: 10, opacity: 0.32,
      lineCap: 'round', lineJoin: 'round'
    }).addTo(_map);
    pl.bindTooltip(tip, { sticky: true });
    _stretchPolys.push(pl);
  }

  for (var i = startIdx + 1; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    if (p.preDep) continue;
    accumDist += p.dist || 0;
    var isApoio = _isApoioAntt(i);
    var isLast  = (i === c.pontos.length - 1);
    if (isApoio || isLast) {
      _flushStretch(i);
      if (isApoio) { stretchStart = i; accumDist = 0; }
    }
  }

  // Exibe seção ANTT na legenda do mapa
  _anttMapActive = hasWarnErr;
  var anttLeg = document.getElementById('mapAnttLegend');
  if (anttLeg) anttLeg.style.display = hasWarnErr ? '' : 'none';

  // Marcadores de sugestão de apoio
  var cands = _computeApoioSuggestions(5);
  _anttSuggCands = cands;
  cands.forEach(function(cand) {
    if (!cand.local || !cand.local.lat || !cand.local.lng) return;
    var dVal = cand.realKm || cand.estKm;
    var dPfx = cand.realKm ? '' : '~';
    var icon = L.divIcon({
      className: '',
      html: '<div class="antt-map-sugg-pin">+</div>',
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    var tipStr = '<b>' + esc(cand.local.descricao) + '</b>'
               + '<br><span style="font-size:10px;color:#a5b4fc">' + dPfx + dVal + ' km desde último apoio'
               + (cand.local.tipo ? ' · ' + esc(cand.local.tipo) : '') + '</span>'
               + '<br><span style="font-size:10px;color:#818cf8">Clique para adicionar ao esquema</span>';
    var m = L.marker([+cand.local.lat, +cand.local.lng], { icon: icon, zIndexOffset: 600 });
    m.bindTooltip(tipStr, { direction: 'top', offset: [0, -16] });
    m.on('click', (function(loc) {
      return function() { addPontoNoMapa(loc); };
    })(cand.local));
    m.addTo(_map);
    _suggMapMarkers.push(m);
  });
}

/** Retorna o HTML do badge ANTT para inserir na célula de nome. */
function _anttBadgeHtml(idx) {
  var a = _anttMap[idx];
  if (!a) return '';
  var badgeIco = a.type === 'error' ? ico('alert-triangle', 11) : a.type === 'warn' ? ico('zap', 11) : ico('info', 11);
  var lbl = a.type === 'error'
    ? badgeIco + ' ' + a.dist + 'km s/ apoio'
    : a.type === 'warn'
    ? badgeIco + ' ' + a.dist + 'km (lim. ' + ANTT_MAX_KM + ')'
    : badgeIco + ' ' + a.dist + 'km (apoio próximo)';
  var tip = a.type === 'error'
    ? a.dist + 'km desde ' + a.fromNome + ' — excede o limite ANTT de ' + ANTT_MAX_KM + 'km entre pontos de apoio'
    : a.type === 'warn'
    ? a.dist + 'km desde ' + a.fromNome + ' — próximo ao limite ANTT (' + ANTT_MAX_KM + 'km)'
    : 'Apenas ' + a.dist + 'km desde ' + a.fromNome + ' — pontos de apoio muito próximos';
  return ' <span class="antt-badge antt-' + a.type + '" title="' + esc(tip) + '">' + lbl + '</span>';
}

/** Atualiza indicadores ANTT nos TRs existentes (uso em partial updates). */
function _applyAnttToRows(c) {
  _computeAnttAlerts(c);
  for (var i = 0; i < c.pontos.length; i++) {
    var row = document.getElementById('horRow' + i);
    if (!row || c.pontos[i].preDep) continue;
    row.classList.remove('antt-row-error','antt-row-warn','antt-row-info');
    var tds = row.querySelectorAll('td');
    if (!tds[0]) continue;
    var old = tds[0].querySelector('.antt-badge');
    if (old) old.remove();
    var a = _anttMap[i];

      row.classList.add('antt-row-' + a.type);
      tds[0].insertAdjacentHTML('beforeend', _anttBadgeHtml(i));

  _updateAnttWarnBar();
  _updateApoioSuggestions();
}

    var comCell;
    if (comVal) {
      comCell = '<span class="hor-com-display" onclick="editComercial(' + i + ',this)">'
              + esc(comVal) + '<span class="hor-com-edit-icon">' + ico('pencil',10) + '</span></span>';
    } else {
      comCell = '<input type="text" class="hor-com-input" placeholder="HH:MM" '
              + 'onfocus="highlightRow(' + i + ')" '
              + 'oninput="_autoFormatTime(this)" '
              + 'onblur="_confirmComercial(' + i + ',this,false)" '
              + 'onkeydown="if(event.key===\'Enter\'){event.preventDefault();_confirmComercial(' + i + ',this,true)}'
              + 'else if(event.key===\'Escape\'){this.value=\'\';unhighlightRow(' + i + ')}" />';
    }
    var deltaCell = p.chegadaMin !== null ? _deltaCellHtml(comVal, p.chegadaMin, _seq[i].idPonto) : '—';

    return '<tr id="horRow' + i + '"' + cls + ' onclick="selectHorRow(' + i + ')">'
      + cidadeCell
      + '<td style="text-align:center;font-weight:600;">' + chegStr + '</td>'
      + '<td style="text-align:center;">' + tpCel + '</td>'
      + '<td style="text-align:center;font-weight:600;">' + saidStr + '</td>'
      + '<td class="hor-via-td">' + tvCel + '</td>'
      + '<td style="text-align:center;">' + comCell + '</td>'
      + '<td id="horDelta' + i + '" style="text-align:center;">' + deltaCell + '</td>'
      + '</tr>';
  }).join('');

  var table = '<div class="hor-table-wrap"><table class="hor-table" style="min-width:560px;">'
    + '<thead><tr>'
    + '<th>Cidade</th>'
    + '<th style="text-align:center;">Chegada</th>'
    + '<th style="text-align:center;">Parada</th>'
    + '<th style="text-align:center;">Saída</th>'
    + '<th style="text-align:right;" title="Tempo até o próximo ponto — passe o mouse para configurar o tipo de via do trecho">Temp. Desl. ' + ico('arrow-down',11) + '</th>'
    + '<th style="text-align:center;">Comercial</th>'
    + '<th style="text-align:center;" title="Diferença: Comercial − Calculado (+folga / −estouro)">Dif.</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>';

  var main = '<div class="hor-main">' + stats + table + _buildComAnalysis(c) + '</div>';
  var _prevMain = body.querySelector('.hor-main');
  var _savedScroll = _prevMain ? _prevMain.scrollTop : 0;
  body.innerHTML = sidebar + main;
  requestAnimationFrame(function() {
    var nm = body.querySelector('.hor-main');
    var focusIdx = _pendingSelectIdx !== null ? _pendingSelectIdx : _activeHorRow;
    if (focusIdx !== null) {
      if (_pendingSelectIdx !== null) _pendingSelectIdx = null;
      selectHorRow(focusIdx);
      var targetRow = document.getElementById('horRow' + focusIdx);
      if (nm && targetRow) {
        var nmRect  = nm.getBoundingClientRect();
        var rowRect = targetRow.getBoundingClientRect();
        var offset  = nm.scrollTop + rowRect.top - nmRect.top
                    - Math.floor((nm.clientHeight - rowRect.height) / 2);
        nm.scrollTop = Math.max(0, offset);
      }
    } else if (nm && _savedScroll > 0) {
      nm.scrollTop = _savedScroll;
    }
  });
}

// ============================================================
//  Análise comparativa OSM vs. Horário Comercial por trecho
// ============================================================
function _buildComAnalysis(c) {
  var segs = [];
  for (var i = 1; i < c.pontos.length; i++) {
    var p     = c.pontos[i];
    var pPrev = c.pontos[i - 1];
    if (p.preDep || pPrev.preDep || !p.hasCoords) continue;
    var comVal  = _comercialTimes[_seq[i].idPonto]     || '';
    var comPrev = _comercialTimes[_seq[i - 1].idPonto] || '';
    if (!comVal || !comPrev) continue;

    var comSeg = _p(comVal) - _p(comPrev);
    if (comSeg < 0) comSeg += 1440;
    segs.push({
      from:   pPrev.nomePonto,
      to:     p.nomePonto,
      osrm:   p.tv,
      com:    comSeg,
      diff:   comSeg - p.tv,
      isOsrm: p.distSource === 'osrm'
    });
  }
  if (segs.length === 0) return '';

  var totalOsrm = 0, totalCom = 0;
  segs.forEach(function(s) { totalOsrm += s.osrm; totalCom += s.com; });
  var totalDiff = totalCom - totalOsrm;

  var rows = segs.map(function(s) {
    var abs = Math.abs(s.diff);
    var cls = s.diff > 2 ? 'delta-ok' : s.diff < -2 ? 'delta-late' : 'delta-warn';
    var sgn = s.diff > 2 ? '+' : s.diff < -2 ? '−' : '≈';
    var osrmStr = _hhmm(s.osrm) + (s.isOsrm ? '' : '<span style="color:#ccc;font-size:9px;"> ~</span>');
    return '<tr>'
      + '<td>' + esc(s.from) + '</td>'
      + '<td>' + esc(s.to)   + '</td>'
      + '<td style="text-align:center;">' + osrmStr + '</td>'
      + '<td style="text-align:center;">' + _hhmm(s.com) + '</td>'
      + '<td style="text-align:center;"><span class="' + cls + '">'
        + sgn + (abs > 1 ? _dur(abs) : '') + '</span></td>'
      + '</tr>';
  }).join('');

  var tAbs = Math.abs(totalDiff);
  var tCls = totalDiff > 5 ? 'delta-ok' : totalDiff < -5 ? 'delta-late' : 'delta-warn';
  var tSgn = totalDiff > 0 ? '+' : totalDiff < 0 ? '−' : '≈';

  return '<div class="hor-osm-analysis" id="horOsmWrap"' + (_horOsmHidden ? ' style="display:none;"' : '') + '>'
    + '<div class="hor-osm-title">' + ico('bar-chart',13) + ' OSM vs. Comercial — Comparativo por trecho'
    + '<button class="hor-panel-close" onclick="toggleHorOsm()" title="Ocultar">×</button>'
    + '</div>'
    + '<div class="hor-osm-legend">'
    + '<span class="delta-ok">+ folga</span> = comercial concede mais tempo que o OSM &nbsp;·&nbsp; '
    + '<span class="delta-late">− estouro</span> = comercial exige mais que o OSM permite'
    + '</div>'
    + '<table class="hor-table" style="min-width:480px;">'
    + '<thead><tr><th>De</th><th>Até</th>'
    + '<th style="text-align:center;">OSM</th>'
    + '<th style="text-align:center;">Comercial</th>'
    + '<th style="text-align:center;" title="Comercial − OSM">Dif.</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '<tfoot><tr>'
    + '<td colspan="2" style="font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:#7a8299;">Total</td>'
    + '<td style="text-align:center;font-weight:700;">' + _hhmm(totalOsrm) + '</td>'
    + '<td style="text-align:center;font-weight:700;">' + _hhmm(totalCom)  + '</td>'
    + '<td style="text-align:center;"><span class="' + tCls + '" style="font-size:12px;">'
      + tSgn + (tAbs > 1 ? _dur(tAbs) : '') + '</span></td>'
    + '</tr></tfoot>'
    + '</table></div>';
}

// ============================================================
//  Célula Temp. Desl. com seletor de via por trecho
// ============================================================
var _LEG_LABEL = { BR:'Rodovia federal', Est:'Estadual', Mun:'Municipal', Urb:'Urbana' };

function _buildLegViaCell(i, c) {
  var isLast = (i >= c.pontos.length - 1);
  var next   = isLast ? null : c.pontos[i + 1];

  if (!next || next.preDep || !next.hasCoords) {
    return '<span style="color:#ccc;">—</span>';
  }

  var isApprox = (next.distSource !== 'osrm');
  var distStr  = next.dist > 0
    ? (isApprox ? '~' : '') + next.dist.toFixed(1) + ' km'
    : '';
  var approxMark = isApprox
    ? '<span style="color:#bbb;font-size:9px;" title="Sem dados de rota — tempo mínimo aplicado"> ~</span>'
    : '';

  var tvHtml = '<span class="hor-via-time">' + _hhmm(next.tv) + approxMark + '</span>'
    + (distStr ? '<span class="hor-via-dist">' + distStr + '</span>' : '');

  var viaKey = _legVia[_seq[i].idPonto];
  var badge  = viaKey
    ? '<span class="hor-via-badge" data-via="' + viaKey + '">' + viaKey + '</span>'
    : '';

  var btns = ['BR','Est','Mun','Urb'].map(function(t) {
    return '<button class="hor-via-btn' + (viaKey === t ? ' active' : '') + '" '
      + 'data-via="' + t + '" '
      + 'onclick="setLegVia(' + i + ',\'' + t + '\',event)" '
      + 'title="' + _LEG_LABEL[t] + '">' + t + '</button>';
  }).join('');

  return '<div class="hor-via-wrap">'
    + tvHtml + badge
    + '<div class="hor-via-overlay">' + btns + '</div>'
    + '</div>';
}

function setLegVia(i, type, evt) {
  if (evt) { evt.stopPropagation(); evt.preventDefault(); }
  var key = _seq[i].idPonto;
  if (_legVia[key] === type) delete _legVia[key]; else _legVia[key] = type;
  try { if (_sel) localStorage.setItem('vc_legVia_' + _sel.id_esquema, JSON.stringify(_legVia)); } catch(e) {}
  _markDirty();
  _partialUpdateSchedule();
  // Fecha o overlay após o clique para evitar re-clique acidental (o rebuild via CSS hover
  // manteria o overlay aberto, causando toggle indesejado se o cursor ficasse sobre ele)
  var row = document.getElementById('horRow' + i);
  if (row) {
    var td = row.querySelectorAll('td')[4];
    if (td) {
      td.classList.add('hor-via-done');
      setTimeout(function() { td.classList.remove('hor-via-done'); }, 500);
    }
  }
}

function _deltaCellHtml(comVal, chegadaMin, idPonto) {
  if (!comVal) return '<span style="color:#dde1ee;font-size:14px;">—</span>';
  var diff    = _diffMin(comVal, chegadaMin, idPonto);
  var diffAbs = Math.abs(diff);
  var cls, sign;
  if      (diff >  2) { cls = 'delta-ok';   sign = '+'; }
  else if (diff < -2) { cls = 'delta-late';  sign = '−'; }
  else                { cls = 'delta-warn';  sign = '≈'; }
  return '<div class="' + cls + '">' + sign + (diffAbs > 1 ? _dur(diffAbs) : '') + '</div>';
}

function _autoFormatTime(input) {
  var pos  = input.selectionStart;
  var raw  = input.value.replace(/\D/g, '').slice(0, 4);
  var fmt  = raw.length >= 3 ? raw.slice(0, 2) + ':' + raw.slice(2) : raw;
  input.value = fmt;
  // mantém cursor após o caractere recém digitado
  var newPos = fmt.length >= 3 && pos >= 2 ? pos + 1 : pos;
  try { input.setSelectionRange(newPos, newPos); } catch(e) {}
}

function _validateHHMM(s) {
  var m = String(s || '').trim().match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
  if (!m) return null;
  return ('0' + m[1]).slice(-2) + ':' + m[2];
}

function _confirmComercial(idx, inputEl, moveNext) {
  var raw = inputEl.value.trim();
  if (raw === '') {
    inputEl.classList.remove('hor-com-error');
    onComercialTimeChange(idx, '', inputEl);
    if (moveNext) _focusNextComercial(idx);
    return;
  }
  var val = _validateHHMM(raw);
  if (!val) {
    inputEl.classList.add('hor-com-error');
    inputEl.focus();
    return;
  }
  inputEl.classList.remove('hor-com-error');
  onComercialTimeChange(idx, val, inputEl);
  if (moveNext) _focusNextComercial(idx);
}

function onComercialTimeChange(idx, val, inputEl) {
  var key = _seq[idx].idPonto;
  if (val) { _comercialTimes[key] = val; } else { delete _comercialTimes[key]; }
  _markDirty();

  if (inputEl) {
    // Zera onblur ANTES de manipular o DOM para evitar chamada re-entrante
    // quando o browser dispara blur sincronamente ao remover o elemento via innerHTML
    inputEl.onblur = null;
    var td = inputEl.parentNode;
    if (td && val) {
      td.innerHTML = '<span class="hor-com-display" onclick="editComercial(' + idx + ',this)">'
        + esc(val) + '<span class="hor-com-edit-icon">' + ico('pencil',10) + '</span></span>';
    }
  }

  unhighlightRow(idx);
  _partialUpdateComercial();
}

function _focusNextComercial(fromIdx) {
  var nextRow = document.getElementById('horRow' + (fromIdx + 1));
  if (!nextRow) return;
  var input = nextRow.querySelector('.hor-com-input');
  if (input) { input.focus(); return; }
  var display = nextRow.querySelector('.hor-com-display');
  if (display) { editComercial(fromIdx + 1, display); }
}

function editComercial(idx, el) {
  var key    = _seq[idx].idPonto;
  var curVal = _comercialTimes[key] || '';
  var input  = document.createElement('input');
  input.type = 'text';
  input.className = 'hor-com-input';
  input.placeholder = 'HH:MM';
  input.value = curVal;
  input.oninput = function() { _autoFormatTime(this); };
  input.onkeydown = function(e) {
    if (e.key === 'Enter')  { e.preventDefault(); _confirmComercial(idx, this, true); }
    if (e.key === 'Escape') {
      this.classList.remove('hor-com-error');
      unhighlightRow(idx);
      this.parentNode && this.parentNode.replaceChild(el, this);
    }
  };
  input.onblur = function() { _confirmComercial(idx, this); };
  highlightRow(idx);
  el.parentNode.replaceChild(input, el);
  input.focus();
  input.select();
}

function selectHorRow(idx) {
  _activeHorRow = idx;
  document.querySelectorAll('#horBody tr').forEach(function(r) { r.classList.remove('row-editing'); });
  var row = document.getElementById('horRow' + idx);
  if (row) row.classList.add('row-editing');
}
function highlightRow(idx) {
  var row = document.getElementById('horRow' + idx);
  if (row) row.classList.add('row-editing');
}
function unhighlightRow(idx) {
  var row = document.getElementById('horRow' + idx);
  if (row) row.classList.remove('row-editing');
}

// Atualização parcial: recalcula deltas sem re-renderizar a tabela
function _partialUpdateComercial() {
  if (!_lastCalc) { _renderHorarioWith(Array.isArray(_osrmLegs) ? _osrmLegs : null); return; }
  var c = _lastCalc;
  _recomputeComercialBase(c);
  var partida  = (document.getElementById('horHoraPartida') || {}).value || '00:00';
  var startIdx = Math.min(_horStartIdx, _seq.length - 1);

  for (var i = 0; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    var deltaEl = document.getElementById('horDelta' + i);
    if (!deltaEl) continue;
    var comVal = _comercialTimes[_seq[i].idPonto] || '';
    deltaEl.innerHTML = p.chegadaMin !== null ? _deltaCellHtml(comVal, p.chegadaMin, _seq[i].idPonto) : '—';
  }

  for (var i = 0; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    var sbarEl = document.getElementById('horSbar' + i);
    if (!sbarEl) continue;
    var timeEl = sbarEl.querySelector('.hor-sidebar-time');
    if (!timeEl) continue;
    var comVal   = _comercialTimes[_seq[i].idPonto] || '';
    var chegaStr = p.preDep ? '—' : (p.chegadaMin !== null ? _ms(p.chegadaMin) : partida);
    if (i === startIdx) chegaStr = partida;
    var deltaHtml = '';
    if (!p.preDep && comVal && p.chegadaMin !== null) {
      var diff = _diffMin(comVal, p.chegadaMin, _seq[i].idPonto);
      var cls3 = diff > 2 ? 'delta-ok' : diff < -2 ? 'delta-late' : 'delta-warn';
      var sgn3 = diff > 2 ? '+' : diff < -2 ? '−' : '≈';
      deltaHtml = '<span class="hor-sidebar-delta ' + cls3 + '">'
        + sgn3 + (Math.abs(diff) > 1 ? _dur(Math.abs(diff)) : '') + '</span>';
    }
    timeEl.innerHTML = chegaStr + deltaHtml;
  }

  _applyAnttToRows(c);

  var horMain   = document.querySelector('#horBody .hor-main');
  if (!horMain) return;
  var analysisEl = horMain.querySelector('.hor-osm-analysis');
  var newHtml    = _buildComAnalysis(c);
  if (newHtml) {
    if (analysisEl) { analysisEl.outerHTML = newHtml; }
    else            { horMain.insertAdjacentHTML('beforeend', newHtml); }
  } else if (analysisEl) {
    analysisEl.remove();
  }
}

function _updateStartPtSelect() {
  var sel = document.getElementById('horStartPt');
  if (!sel) return;
  if (_horStartIdx >= _seq.length) _horStartIdx = 0;
  sel.innerHTML = _seq.map(function(p, i) {
    return '<option value="' + i + '">' + (i + 1) + ' — ' + esc(p.nomePonto) + '</option>';
  }).join('') || '<option value="0">—</option>';
  sel.value = String(_horStartIdx);
}

// Atualização parcial do schedule sem reconstruir a tabela
function _partialUpdateSchedule() {
  if (!_lastCalc) { _renderHorarioWith(Array.isArray(_osrmLegs) ? _osrmLegs : null); return; }
  var osrmLegs = Array.isArray(_osrmLegs) ? _osrmLegs : null;
  var c        = _calcHorario(osrmLegs);
  _lastCalc    = c;
  _recomputeComercialBase(c);
  var partida  = (document.getElementById('horHoraPartida') || {}).value || '00:00';
  var startIdx = Math.min(_horStartIdx, _seq.length - 1);

  var statsEl = document.getElementById('horStatsPanel');
  if (statsEl) statsEl.innerHTML = _buildStatsHtml(c, osrmLegs);

  for (var i = 0; i < c.pontos.length; i++) {
    var p   = c.pontos[i];
    var row = document.getElementById('horRow' + i);
    if (!row || p.preDep) continue;
    var isStart = (i === startIdx);
    var tds     = row.querySelectorAll('td');
    if (tds.length < 7) continue;

    var chegStr = (isStart || p.chegadaMin === null) ? partida : _ms(p.chegadaMin);
    tds[1].textContent = chegStr;

    if (p.saidaMin !== null) {
      tds[3].textContent = _ms(p.saidaMin);
    } else if (p.chegadaMin !== null) {
      tds[3].innerHTML = '<strong style="color:#f47920;">' + ico('star',11) + ' ' + _ms(p.chegadaMin) + '</strong>';
    } else {
      tds[3].textContent = '—';
    }

    tds[4].className = 'hor-via-td';
    tds[4].innerHTML = _buildLegViaCell(i, c);

    var comVal = _comercialTimes[_seq[i].idPonto] || '';
    tds[6].innerHTML = p.chegadaMin !== null ? _deltaCellHtml(comVal, p.chegadaMin, _seq[i].idPonto) : '—';
  }

  for (var i = 0; i < c.pontos.length; i++) {
    var p      = c.pontos[i];
    var sbarEl = document.getElementById('horSbar' + i);
    if (!sbarEl) continue;
    var timeEl = sbarEl.querySelector('.hor-sidebar-time');
    if (!timeEl) continue;
    var comVal    = _comercialTimes[_seq[i].idPonto] || '';
    var chegaStr  = p.preDep ? '—' : (p.chegadaMin !== null ? _ms(p.chegadaMin) : partida);
    if (i === startIdx) chegaStr = partida;
    var dHtml = '';
    if (!p.preDep && comVal && p.chegadaMin !== null) {
      var diff = _diffMin(comVal, p.chegadaMin, _seq[i].idPonto);
      var dc   = diff > 2 ? 'delta-ok' : diff < -2 ? 'delta-late' : 'delta-warn';
      var ds   = diff > 2 ? '+' : diff < -2 ? '−' : '≈';
      dHtml = '<span class="hor-sidebar-delta ' + dc + '">'
        + ds + (Math.abs(diff) > 1 ? _dur(Math.abs(diff)) : '') + '</span>';
    }
    timeEl.innerHTML = chegaStr + dHtml;
  }

  _applyAnttToRows(c);

  var horMain    = document.querySelector('#horBody .hor-main');
  if (!horMain) return;
  var analysisEl = horMain.querySelector('.hor-osm-analysis');
  var newHtml    = _buildComAnalysis(c);
  if (newHtml) {
    if (analysisEl) { analysisEl.outerHTML = newHtml; }
    else            { horMain.insertAdjacentHTML('beforeend', newHtml); }
  } else if (analysisEl) {
    analysisEl.remove();
  }
}

function onStopTimeChange(idx, val) {
  _customStopTimes[_seq[idx].idPonto] = Math.max(0, Math.round(+val || 0));
  _markDirty();
  highlightRow(idx);
  _partialUpdateSchedule();
  setTimeout(function() { unhighlightRow(idx); }, 600);
}

// ============================================================
//  Modal de configuração do PDF

  var modal =

function fecharModalPdf() {

function pdfModeSelect(mode) {
  var nLbl = document.getElementById('pdfModeNormalLabel');
  var cLbl = document.getElementById('pdfModeComercialLabel');
  var nRad = document.getElementById('pdfModeNormal');
  var cRad = document.getElementById('pdfModeComercial');
  var isCom = (mode === 'comercial');
  if (nLbl) { nLbl.style.borderColor = isCom ? '#d4d8e8' : '#f47920'; nLbl.style.background = isCom ? '#fff' : '#fff8f0'; }
  if (cLbl) { cLbl.style.borderColor = isCom ? '#f47920' : '#d4d8e8'; cLbl.style.background = isCom ? '#fff8f0' : '#fff'; }
  if (nRad) nRad.checked = !isCom;
  if (cRad) cRad.checked =  isCom;
  ['comercial','dif'].forEach(function(k) {
    var lbl = document.getElementById('pdfColLabel_' + k);
    if (lbl) { lbl.style.opacity = isCom ? '0.4' : ''; lbl.style.pointerEvents = isCom ? 'none' : ''; }
  });
}

function gerarPdfComOpcoes() {
  ['chegada','parada','saida','desl','comercial','dif'].forEach(function(k) {
    var el = document.getElementById('pdfCol_' + k);
    if (el) _pdfCols[k] = el.checked;
  });
  var mEl = document.querySelector('input[name="pdfMode"]:checked');
  _pdfMode = mEl ? mEl.value : 'normal';
  var tEl = document.getElementById('pdfTitleInput');
  var sEl = document.getElementById('pdfSubtitleInput');
  _pdfTitle    = tEl ? tEl.value.trim() : '';
  _pdfSubtitle = sEl ? sEl.value.trim() : '';
  fecharModalPdf();
  imprimirHorario();
}

// ============================================================
//  Gera PDF em nova janela
// ============================================================
function imprimirHorario() {
  if (!_sel || !_seq.length) return;
  var osrmLegs = Array.isArray(_osrmLegs) ? _osrmLegs : null;
  var c        = _calcHorario(osrmLegs);
  _recomputeComercialBase(c);
  var partida  = document.getElementById('horHoraPartida').value || '00:00';
  var vel      = document.getElementById('horVelMedia').value || '85';
  var tipoVia  = '';
  document.querySelectorAll('.hor-preset-btn').forEach(function(b){ if (b.classList.contains('active')) tipoVia = b.textContent; });
  var fonteDist = _osrmStatus === 'ok' ? 'Traçado real (OSM)' : _osrmStatus === 'cache' ? 'Cache de distâncias' : 'Mín. 30 min (sem rota)';
  var startIdx  = Math.min(_horStartIdx, c.pontos.length - 1);
  var cols      = _pdfCols;
  var _sentStr  = _sel.sentido ? ' (' + _sel.sentido + ')' : '';
  var title     = _pdfTitle    || ((_sel.horario || '00:00').replace(':', 'h') + ' - ' + _sel.nome_linha + ' (' + _sel.id_esquema + ')' + _sentStr);
  var subtitle  = _pdfSubtitle || '';

  function pe(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function hhmm(m){ m=Math.round(m||0); var h=Math.floor(m/60),mm=m%60; return ('0'+h).slice(-2)+':'+('0'+mm).slice(-2); }
  function ms(m){ m=Math.round(m); return ('0'+Math.floor(m/60)%24).slice(-2)+':'+('0'+(m%60)).slice(-2); }
  // Arredonda minutos para múltiplo de 5 — somente para exibição no PDF
  function r5(m){ return Math.round(m / 5) * 5; }
  function msR(m){ return ms(r5(m)); }
  function partidaR(s){ var p=(s||'00:00').split(':'); return ms(r5(+p[0]*60+(+p[1]||0))); }
  function comR(s){ if(!s) return s; var p=s.split(':'); return p.length<2 ? s : ms(r5(+p[0]*60+(+p[1]||0))); }

  var pdfMode   = _pdfMode || 'normal';
  var activeCols = [{ key:'cidade', label:'Cidade', align:'left' }];
  if (cols.chegada) activeCols.push({ key:'chegada', label:'Chegada', align:'center' });
  if (cols.parada)  activeCols.push({ key:'parada',  label:'Parada',  align:'center' });
  if (cols.saida)   activeCols.push({ key:'saida',   label:'Saída',   align:'center' });
  if (cols.desl) activeCols.push({ key:'desl', label:'Desl.', align:'left' });
  if (pdfMode !== 'comercial') {
    if (cols.comercial) activeCols.push({ key:'comercial', label:'Comercial', align:'center' });
    if (cols.dif)       activeCols.push({ key:'dif',       label:'Dif.',      align:'center' });
  }

  var thead = activeCols.map(function(col) {
    return '<th style="text-align:' + col.align + ';">' + col.label + '</th>';
  }).join('');

  var tbody = '';
  var accumTv = 0, accumDist = 0, accumAllOsrm = true;
  c.pontos.forEach(function(p, i) {
    var isStart = (i === startIdx);
    var isLast  = (i === c.pontos.length - 1);
    if (p.preDep) {
      tbody += '<tr style="opacity:0.32;">'
        + '<td><strong>' + pe(p.nomePonto) + '</strong></td>'
        + '<td colspan="' + (activeCols.length - 1) + '" style="text-align:center;color:#aaa;font-style:italic;font-size:10px;">pré-partida</td>'
        + '</tr>';
      return;
    }
    var comVal = _comercialTimes[_seq[i].idPonto] || '';
    if (pdfMode === 'comercial' && !isStart) {
      accumTv   += (p.tv   || 0);
      accumDist += (p.dist || 0);
      if (p.distSource !== 'osrm') accumAllOsrm = false;
    }
    if (pdfMode === 'comercial' && !comVal) return;
    var cells  = {};

    cells.cidade = '<strong>' + pe(p.nomePonto) + '</strong>'
      + (isStart ? ' <span style="display:inline-flex;align-items:center;background:#f47920;color:#fff;border-radius:3px;padding:1px 5px;margin-left:3px;">' + ico('send',9) + '</span>' : '');

    if (pdfMode === 'comercial') {
      cells.chegada = isStart
        ? '<span style="color:#bbb;">—</span>'
        : (comVal ? '<strong>' + pe(comR(comVal)) + '</strong>' : '<span style="color:#ccc;">—</span>');
      cells.parada = (!isStart && !isLast && p.tp) ? hhmm(p.tp) : '—';
      if (isStart) {
        cells.saida = comVal ? '<strong>' + pe(comR(comVal)) + '</strong>' : '—';
      } else if (isLast) {
        cells.saida = '<span style="color:#bbb;">—</span>';
      } else if (comVal) {
        cells.saida = '<strong>' + msR(_p(comVal) + (p.tp || 0)) + '</strong>';
      } else {
        cells.saida = '—';
      }
      if (isStart || (accumDist === 0 && accumTv === 0)) {
        cells.desl = '—';
      } else {
        var tvStr2   = hhmm(accumTv) + (!accumAllOsrm ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        var distStr2 = accumDist.toFixed(1) + ' km' + (!accumAllOsrm ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        cells.desl   = tvStr2 + ' <span style="color:#d4d8e8;margin:0 2px;">|</span> ' + distStr2;
      }
      accumTv = 0; accumDist = 0; accumAllOsrm = true;
    } else {
      cells.chegada = isStart
        ? '<span style="color:#bbb;">—</span>'
        : '<strong>' + (p.chegadaMin === null ? '—' : msR(p.chegadaMin)) + '</strong>';
      cells.parada  = (!isStart && !isLast && p.saidaMin !== null) ? hhmm(p.tp) : '—';
      cells.saida   = p.saidaMin !== null
        ? '<strong>' + msR(p.saidaMin) + '</strong>'
        : (p.chegadaMin !== null ? '<strong style="color:#f47920;">' + ico('star',11) + ' ' + msR(p.chegadaMin) + '</strong>' : '—');

      if (isStart || !p.hasCoords) {
        cells.desl = '—';
      } else {
        var tvStr   = hhmm(p.tv)   + (p.distSource !== 'osrm' ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        var distStr = p.dist.toFixed(1) + ' km' + (p.distSource !== 'osrm' ? '<span style="color:#ccc;font-size:9px;"> ~</span>' : '');
        cells.desl  = tvStr + ' <span style="color:#d4d8e8;margin:0 2px;">|</span> ' + distStr;
      }

      cells.comercial = comVal
        ? '<strong style="color:#1565c0;">' + pe(comR(comVal)) + '</strong>'
        : '<span style="color:#ccc;">—</span>';

      cells.dif = '—';
      if (comVal && p.chegadaMin !== null) {
        var d2 = _diffMin(comVal, p.chegadaMin, _seq[i].idPonto), a2 = Math.abs(d2);
        var c2 = d2 > 2 ? '#22c97a' : d2 < -2 ? '#e53935' : '#f47920';
        var s2 = d2 > 2 ? '+' : d2 < -2 ? '−' : '≈';
        cells.dif = '<strong style="color:' + c2 + ';">' + s2 + (a2 > 1 ? hhmm(a2) : '') + '</strong>';
      }
    }

    var rowBg = isStart ? 'background:#f0fff8;' : isLast ? 'background:#fff8f0;' : (!comVal ? 'background:#fff8f2;' : '');
    tbody += '<tr style="' + rowBg + '">';
    activeCols.forEach(function(col) {
      tbody += '<td style="text-align:' + col.align + ';">' + (cells[col.key] || '—') + '</td>';
    });
    tbody += '</tr>';
  });

  var html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    + '<title>' + pe(title) + '</title><style>'
    + '@page{margin:10mm 12mm 28mm 12mm;}'
    + '*{box-sizing:border-box;margin:0;padding:0;}'
    + 'body{font-family:Arial,sans-serif;font-size:12px;color:#1a1d23;}'
    + '.hdr{background:#1a1d23;color:#fff;padding:22px 28px 18px;}'
    + '.hdr-title{font-size:22px;font-weight:900;letter-spacing:.01em;line-height:1.1;}'
    + '.hdr-sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#f47920;margin-top:5px;}'
    + '.hdr-meta{font-size:10px;color:#9aa0ad;margin-top:7px;}'
    + '.body{padding:18px 28px 24mm 28px;}'
    + '.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}'
    + '.stat{border:1px solid #dde1ee;border-radius:6px;padding:10px 12px;text-align:center;}'
    + '.sv{font-size:16px;font-weight:800;color:#1a1d23;}'
    + '.sl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-top:2px;}'
    + '.stat.hi{background:#fff8f0;border-color:#fddcb3;}.stat.hi .sv{color:#f47920;}'
    + 'table{width:100%;border-collapse:collapse;font-size:11px;border:1px solid #cdd2e5;}'
    + 'th{background:#f0f2f8;padding:6px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#5a6070;border:1px solid #cdd2e5;white-space:nowrap;}'
    + 'td{padding:7px 10px;border:1px solid #dde1ee;vertical-align:middle;}'
    + '.pfooter{position:fixed;bottom:0;left:0;right:0;height:18mm;background:#fff;border-top:2px solid #f47920;padding:5px 28px 3px;font-size:9px;color:#555;display:flex;justify-content:space-between;align-items:center;line-height:1.5;}'
    + '.pfooter-left{display:flex;flex-direction:column;}'
    + '.pfooter-company{font-weight:700;color:#1a1d23;font-size:9.5px;}'
    + '.pfooter-cnpj{color:#888;}'
    + '.pfooter-right{text-align:right;color:#888;font-size:9px;}'
    + '@media print{'
    +   '*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}'
    +   'tr{page-break-inside:avoid;}'
    +   '.pfooter{display:flex !important;}'
    + '}'
    + '</style></head><body>';

  html += '<div class="hdr"><div class="hdr-title">' + pe(title) + '</div>';
  if (subtitle) html += '<div class="hdr-sub">' + pe(subtitle) + '</div>';
  html += '<div class="hdr-meta">'
    + [_sel.sentido, 'Partida ' + partidaR(partida), (tipoVia || 'BR'), vel + ' km/h', fonteDist]
      .filter(Boolean).map(pe).join(' &nbsp;·&nbsp; ')
    + '</div></div>';

  html += '<div class="body">'
    + '<div class="stats">'
    + '<div class="stat"><div class="sv">' + c.distTotal + ' km</div><div class="sl">Distância</div></div>'
    + '<div class="stat"><div class="sv">' + hhmm(c.tvTotal) + '</div><div class="sl">Deslocamento</div></div>'
    + '<div class="stat"><div class="sv">' + hhmm(c.tpTotal) + '</div><div class="sl">Paradas</div></div>'
    + '<div class="stat hi"><div class="sv">' + hhmm(c.totalMin) + '</div><div class="sl">Tempo total</div></div>'
    + '</div>'
    + '<table><thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table>'
    + '</div>';

  var genDate = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  html += '<div class="pfooter">'
    + '<div class="pfooter-left">'
    +   '<span class="pfooter-company">KANDANGO TRANSPORTE E TURISMO LTDA</span>'
    +   '<span class="pfooter-cnpj">CNPJ: 03.233.439/0001-52</span>'
    + '</div>'
    + '<div class="pfooter-right" id="pfPageInfo">Gerado em ' + pe(genDate) + '</div>'
    + '</div>';
  html += '<script>'
    + 'window.onload = function() {'
    +   'try {'
    +     'var PX    = 96 / 25.4;'                                        // px por mm a 96 DPI (CSS pixels)
    +     'var pageH = Math.round((297 - 10 - 28) * PX);'                // A4 − margens top+bottom = 259mm
    +     'var safe  = Math.round(22 * PX);'                             // zona segura ≥ footer (18mm) + buffer
    +     'var a4W   = Math.round(186 * PX);'                            // largura do conteúdo A4 (210-12-12 mm)
    +     'var body  = document.querySelector(".body");'
    +     'var tbody = document.querySelector("tbody");'
    +     'if (tbody && body) {'
    +       'body.style.width = a4W + "px";'                             // força largura de impressão para medir
    +       'void body.offsetHeight;'                                     // reflow síncrono — alturas reais de A4
    +       'var curY = tbody.getBoundingClientRect().top % pageH;'
    +       'Array.from(tbody.querySelectorAll("tr")).forEach(function(row) {'
    +         'var rh = row.getBoundingClientRect().height;'
    +         'if (curY + rh > pageH - safe) {'
    +           'row.style.breakBefore = "page";'
    +           'row.style.pageBreakBefore = "always";'
    +           'curY = rh;'
    +         '} else {'
    +           'curY += rh;'
    +         '}'
    +       '});'
    +       'body.style.width = "";'                                      // restaura antes de imprimir
    +     '}'
    +     'var bodyH = document.querySelector(".body").scrollHeight;'
    +     'var pages = Math.max(1, Math.ceil(bodyH / pageH));'
    +     'var el = document.getElementById("pfPageInfo");'
    +     'if (el) el.innerHTML = "Pág. <span id=\\"pn\\">1</span> / " + pages;'
    +   '} catch(e) {}'
    +   'window.print();'
    + '};'
    + '<\/script>';
  html += '</body></html>';

  var w = window.open('', '_blank', 'width=1000,height=760');
  if (!w) { toast('Popup bloqueado. Permita popups para este site.', 'error'); return; }
  w.document.write(html);
  w.document.close();
}

function _updateImportBtn() {

  if (!row || !_sel) { if (row) row.style.display = 'none'; return; }
  var outros = _esqs.filter(function(e) {
    return e.id_esquema !== _sel.id_esquema && e.nome_linha === _sel.nome_linha;
  });
  row.style.display = outros.length ? '' : 'none';
}

function abrirImportarPontos() {
  if (!_sel) return;
  var outros = _esqs.filter(function(e) {
    return e.id_esquema !== _sel.id_esquema && e.nome_linha === _sel.nome_linha;
  });
  if (!outros.length) {
    toast('Nenhum outro horário encontrado para esta linha.', 'info');
    return;
  }
  var list = document.getElementById('importEsqList');
  list.innerHTML = '<div style="text-align:center;padding:16px;color:#aaa;font-size:12px;">Carregando horários…</div>';
  document.getElementById('importModalOverlay').style.display = 'flex';

  function _renderImportList(contagem) {
    list.innerHTML = outros.map(function(e) {
      var cnt = contagem ? (contagem[String(e.id_esquema)] || 0) : null;
      var vazio = cnt !== null && cnt === 0;
      var cntHtml = cnt !== null
        ? '<span style="margin-left:6px;font-size:10px;color:' + (vazio ? '#f87171' : '#6ee7b7') + ';">'
          + (vazio ? '(sem pontos)' : cnt + ' pto' + (cnt !== 1 ? 's' : '')) + '</span>'
        : '';
      return '<div class="sdi" data-id="' + esc(e.id_esquema) + '"'
        + (vazio ? ' style="opacity:.45;pointer-events:none;cursor:default;"' : ' style="cursor:pointer;"')
        + '>'
        + '<div class="sdi-main">' + esc(e.id_esquema) + ' — ' + esc(e.nome_linha) + cntHtml + '</div>'
        + '<div class="sdi-meta">'
        + (e.horario ? '<span style="background:#fff8e1;color:#f47920;border:1px solid #ffe082;border-radius:3px;padding:0 5px;margin-right:4px;font-size:10px;">' + esc(e.horario) + '</span>' : '')
        + esc(e.sentido || '')
        + '</div></div>';
    }).join('');
    list.querySelectorAll('.sdi:not([style*="pointer-events:none"])').forEach(function(el) {
      el.addEventListener('click', function() {
        importarDeEsquema(el.getAttribute('data-id'));
      });
    });
  }

  if (typeof google !== 'undefined' && google.script) {
    var ids = outros.map(function(e){ return e.id_esquema; });
    google.script.run
      .withSuccessHandler(function(contagem) { _renderImportList(contagem); })
      .withFailureHandler(function()         { _renderImportList(null);     })
      .getContagemPontosEsquemas(ids);
  } else {
    _renderImportList(null);
  }
}

function fecharImportModal() {
  document.getElementById('importModalOverlay').style.display = 'none';
}

function importarDeEsquema(idEsq) {
  if (_seq.length > 0) {
    if (!confirm('A sequência atual será substituída pelos pontos importados. Continuar?')) return;
  }
  fecharImportModal();
  loading('Importando pontos…');
  google.script.run
    .withSuccessHandler(function(pontos) {
      doneLoading();
      if (!pontos || !pontos.length) {
        toast('O horário de origem não possui pontos cadastrados.', 'error');
        return;
      }
      // Monta sequência com dados de local do _lMap
      _seq = pontos.map(function(p) {
        var l = _lMap[String(p.idPonto)] || {};
        return { idPonto: p.idPonto, nomePonto: p.nomePonto, tipo: p.tipo || '',
                 lat: l.lat || null, lng: l.lng || null, isNew: true };
      });
      // Importa dados específicos da ROTA (não do horário)
      _legVia = {};
      pontos.forEach(function(p) { if (p.tipoTrecho) _legVia[p.idPonto] = p.tipoTrecho; });
      // tempo_local salvo é ignorado: a parada vem da aba TEMPO_PERMANENCIA
      // (fonte viva) e, na ausência de cadastro, do padrão por tipo.
      // _customStopTimes guarda apenas edições feitas na própria sessão.
      _customStopTimes = {};
      // Horários comerciais são específicos de cada horário — não importar
      _comercialTimes  = {};
      _osrmLegs        = undefined;
      _osrmSeqKey      = '';
      _osrmGeometry    = null;
      _horStartIdx     = 0;
      _osrmStatus      = 'pending';
      renderSeq();
      updateInsAfter();
      updateMap();
      dirtySeq();
      var srcEsq = _esqs.find(function(e) { return e.id_esquema === idEsq; });
      var srcLabel = srcEsq ? (srcEsq.horario ? srcEsq.horario + ' (' + srcEsq.sentido + ')' : srcEsq.id_esquema) : idEsq;
      toast(pontos.length + ' pontos importados de ' + srcLabel + '. Salve para confirmar.', 'success', 5000);
    })
    .withFailureHandler(function(e) {
      doneLoading();
      toast('Erro ao importar: ' + (e.message || e), 'error');
    })
    .getPontosEsquemaParaFormulario(idEsq);
}
