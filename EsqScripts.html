<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
// ============================================================
//  Estado
// ============================================================
var _esqs    = [];
var _locais  = [];
var _lMap    = {};
var _sel     = null;
var _seq     = [];
var _isNovo        = false;
var _seqDirt       = false;
var _voltaMode     = false;  // true quando criando viagem de volta
var _voltaSnapshot = null;   // { seq, legVia, customStopTimes } da viagem original

var _map     = null;
var _markers = [];
var _poly    = null;

// ============================================================
//  Horário — estado persistente
// ============================================================
var _view            = 'mapa';
var _comercialBase   = null;
var _comercialAbsMap = {};
var _lastCalc        = null;
var _pendingSelectIdx = null;
var _activeHorRow    = null;
var _pdfCols     = { chegada:true, parada:true, saida:true, desl:true, comercial:true, dif:true };
var _pdfMode     = 'normal';
var _pdfTitle    = '';
var _pdfSubtitle = '';
var _osrmLegs        = undefined;
var _osrmSeqKey      = '';
var _osrmGeometry    = null;
var _comercialTimes  = {};
var _horStartIdx     = 0;
var _customStopTimes = {};
var _temposPermanencia = {};   // { codigoLocal: minutos } — vindo da aba TEMPO_PERMANENCIA
var _rotasAjust      = {};     // { "codA|codB": {km,min,motivo} } — ajustes de rota (2 sentidos)
var _rotasAjustList  = [];     // lista crua de ajustes (para a aba de gestão)
var _legVia          = {};
var _tipoViaVel      = { BR: 85, Est: 75, Mun: 60, Urb: 45 };
var _VIA_LABEL_TO_KEY = { 'BR': 'BR', 'Estadual': 'Est', 'Municipal': 'Mun', 'Urbana': 'Urb' };
var _osrmStatus      = 'pending';
var _horSidebarHidden = (function(){ try { return localStorage.getItem('vc_hor_sidebar') === 'hidden'; } catch(e){ return false; } })();
var _horOsmHidden     = (function(){ try { return localStorage.getItem('vc_hor_osm')     === 'hidden'; } catch(e){ return false; } })();

// ── ANTT ──────────────────────────────────────────────────────
var ANTT_MAX_KM  = 495; // km — máximo entre pontos de apoio consecutivos (ANTT)
var ANTT_WARN_KM = 395; // km — aviso de proximidade ao limite
var ANTT_MIN_KM  = 30;  // km — pontos de apoio desnecessariamente próximos
var _anttMap          = {};   // { rowIdx → { type, dist, fromNome } }
var _anttStatus       = null; // estado do fim da rota
var _anttWarnIdx      = -1;   // índice da linha com badge warn atual (para substituição por error)
var _anttSuggCands    = [];   // candidatos de sugestão calculados
var _anttSuggCacheKey = '';   // chave do último batch de cache consultado
var _stretchPolys     = [];   // Leaflet polylines para coloração de trechos ANTT (map view)
var _suggMapMarkers   = [];   // Leaflet markers para sugestões de apoio (map view)
var _anttMapActive    = false; // true quando overlays ANTT estão desenhados no mapa

// Tempo de parada (minutos) por tipo de ponto
var STOP_TIMES = {
  RODOVIARIA: 15, TERMINAL: 15, RODOVIARIO: 15,
  GARAGEM: 20,
  POSTO: 20, POSTO_COMBUSTIVEL: 20, ABASTECIMENTO: 20,
  PEDAGIO: 2, PEDAGIO_PARADA: 2,
  PONTO: 5, PARADA: 5
};
var STOP_DEFAULT = 5;
var MIN_LEG_TV   = 30;

function _stopTime(tipo) {
  if (!tipo) return STOP_DEFAULT;
  var t = tipo.trim().toUpperCase().replace(/\s+/g, '_').replace(/[^A-Z_]/g, '');
  for (var k in STOP_TIMES) {
    if (t.indexOf(k) !== -1) return STOP_TIMES[k];
  }
  return STOP_DEFAULT;
}

var STOP_PADRAO_MIN = 30;  // padrão para pontos fora da aba TEMPO_PERMANENCIA

function _getStopTime(idx, tipo) {
  var key = _seq[idx] ? _seq[idx].idPonto : idx;
  // Hierarquia: 1º edição manual feita na sessão
  //             2º TEMPO_PERMANENCIA (aba)
  //             3º 30 min fixo (tudo que não está na aba)
  if (_customStopTimes[key] !== undefined)   return _customStopTimes[key];
  if (_temposPermanencia[key] !== undefined) return _temposPermanencia[key];
  return STOP_PADRAO_MIN;
}

// Haversine client-side (km) — mantido para uso eventual no mapa
function _hvs(lat1, lng1, lat2, lng2) {
  var R = 6371, tr = function(d){ return d * Math.PI / 180; };
  var dLat = tr(lat2 - lat1), dLng = tr(lng2 - lng1);
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(tr(lat1))*Math.cos(tr(lat2))*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)) * 10) / 10;
}

// Normaliza qualquer valor de horário para "HH:MM"
function _normalizeHHMM(val) {
  if (!val) return '';
  var s = String(val).trim();
  var m = s.match(/^(\d{1,2}):(\d{2})/);
  if (m) return ('0' + m[1]).slice(-2) + ':' + m[2];
  var dm = s.match(/\b(\d{1,2}):(\d{2}):\d{2}\b/);
  if (dm) return ('0' + dm[1]).slice(-2) + ':' + dm[2];
  return '';
}

// "HH:MM" → total minutos
function _p(s) {
  if (!s) return 0;
  var p = s.split(':'); return (+p[0] || 0) * 60 + (+p[1] || 0);
}
// total minutos → "HH:MM"
function _ms(m) {
  m = Math.round(m);
  var h = Math.floor(m / 60) % 24, mm = m % 60;
  return ('0' + h).slice(-2) + ':' + ('0' + mm).slice(-2);
}

// Diferença entre horário comercial e chegada calculada.
// Usa _comercialAbsMap quando disponível para rotas multi-dia.
function _diffMin(comVal, chegadaMin, idPonto) {
  if (idPonto !== undefined && _comercialAbsMap[idPonto] !== undefined) {
    return _comercialAbsMap[idPonto] - chegadaMin;
  }
  if (_comercialBase !== null) {
    var comElapsed = _p(comVal) - _comercialBase.comMin;
    while (comElapsed < 0) comElapsed += 1440;
    var calcElapsed = chegadaMin - _comercialBase.calcMin;
    return comElapsed - calcElapsed;
  }
  var base = chegadaMin % 1440;
  var diff = _p(comVal) - base;
  if (diff < -720) diff += 1440;
  if (diff >  720) diff -= 1440;
  return diff;
}

// Reconstrói _comercialBase e _comercialAbsMap incrementalmente.
function _recomputeComercialBase(c) {
  _comercialBase   = null;
  _comercialAbsMap = {};
  if (!c) return;
  var absMin    = null;
  var prevClock = null;
  for (var i = 0; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    if (p.preDep || p.chegadaMin === null) continue;
    var idPonto = _seq[i].idPonto;
    var comVal  = _comercialTimes[idPonto] || '';
    if (!comVal) continue;
    var clock = _p(comVal);
    if (absMin === null) {
      absMin = clock;
      _comercialBase = { comMin: clock, calcMin: p.chegadaMin };
    } else {
      var delta = clock - prevClock;
      if (delta < 0) delta += 1440;
      absMin = absMin + delta;
    }
    prevClock = clock;
    _comercialAbsMap[idPonto] = absMin;
  }
}

// minutos → "Xh YYmin"
function _dur(m) {
  m = Math.round(m);
  if (!m || m < 1) return '—';
  var h = Math.floor(m / 60), mm = m % 60;
  if (h && mm) return h + 'h ' + ('0' + mm).slice(-2) + 'min';
  if (h)        return h + 'h';
  return mm + 'min';
}
// minutos → "HH:MM" (duração)
function _hhmm(m) {
  m = Math.round(m || 0);
  var h = Math.floor(m / 60), mm = m % 60;
  return ('0' + h).slice(-2) + ':' + ('0' + mm).slice(-2);
}

// ============================================================
//  OSRM — distâncias reais de rota
// ============================================================
function _seqCoordsKey() {
  return _seq
    .filter(function(p){ return p.lat && p.lng; })
    .map(function(p){ return (+p.lat).toFixed(5) + ',' + (+p.lng).toFixed(5); })
    .join('|');
}

function _fetchOsrmDistances(callback) {
  var pts = _seq.filter(function(p){ return p.lat && p.lng; });
  if (pts.length < 2) { callback(null, null); return; }

  function normKey(a, b) { return a <= b ? (a+':'+b) : (b+':'+a); }

  var pairs = pts.slice(0, -1).map(function(pt, i) {
    return { a: pt.idPonto, b: pts[i+1].idPonto };
  });

  function legsFromCache(cached) {
    return pts.slice(0, -1).map(function(pt, i) {
      var entry = cached[normKey(pt.idPonto, pts[i+1].idPonto)];
      var km = entry && entry.km > 0 ? entry.km : 0;
      if (km > 0 && entry.tipoVia && !_legVia[pt.idPonto]) {
        _legVia[pt.idPonto] = entry.tipoVia;
      }
      return km > 0 ? { distKm: km, durationMin: 0 } : null;
    });
  }

  function callOsrm(cached) {
    var coords = pts.map(function(p){
      return (+p.lng).toFixed(6) + ',' + (+p.lat).toFixed(6);
    }).join(';');
    var url = 'https://router.project-osrm.org/route/v1/driving/' + coords
            + '?overview=full&geometries=geojson&annotations=false&continue_straight=false';

    fetch(url)
      .then(function(r){ return r.ok ? r.json() : Promise.reject('http'); })
      .then(function(data) {
        if (!data || data.code !== 'Ok' || !data.routes || !data.routes[0])
          return Promise.reject('no-route');

        var route = data.routes[0];
        var legs  = route.legs.map(function(l) {
          return {
            distKm:      Math.round(l.distance / 100) / 10,
            durationMin: Math.round(l.duration  / 6)  / 10
          };
        });

        var toSave = [];
        legs.forEach(function(leg, i) {
          if (!pts[i] || !pts[i+1]) return;
          var key    = normKey(pts[i].idPonto, pts[i+1].idPonto);
          var isNew  = leg.distKm > 0 && !((cached[key] || {}).km > 0);
          var via    = _legVia[pts[i].idPonto] || 'BR';
          // Envia TODOS os pares: km > 0 apenas nos novos; existentes recebem km=0
          // para que o backend só atualize tipo_via sem criar linha duplicada
          toSave.push({ a: pts[i].idPonto, b: pts[i+1].idPonto, km: isNew ? leg.distKm : 0, tipoVia: via });
        });
        if (toSave.length && typeof google !== 'undefined' && google.script)
          google.script.run.saveDistanciasCached(toSave);

        _osrmStatus = 'ok';
        var geom = route.geometry && route.geometry.coordinates
          ? route.geometry.coordinates.map(function(c){ return [c[1], c[0]]; })
          : null;
        callback(legs, geom);
      })
      .catch(function() {
        var fallback = legsFromCache(cached || {});
        var hasAny   = fallback.some(function(l){ return l !== null; });
        _osrmStatus  = hasAny ? 'cache' : 'unavailable';
        callback(hasAny ? fallback : null, null);
      });
  }

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(function(cached) {
        var allHit = pairs.every(function(p){ return (cached[normKey(p.a, p.b)] || {}).km > 0; });
        if (allHit) {
          _osrmStatus = 'cache';
          callback(legsFromCache(cached), null);
        } else {
          callOsrm(cached);
        }
      })
      .withFailureHandler(function(){ callOsrm({}); })
      .getDistanciasCached(pairs);
  } else {
    callOsrm({});
  }
}

// ============================================================
//  Preset de velocidade
// ============================================================
function setPreset(btn, defaultVel) {
  document.querySelectorAll('.hor-preset-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var tipo = btn.textContent.trim();
  var key  = _VIA_LABEL_TO_KEY[tipo] || tipo;
  document.getElementById('horVelMedia').value = (_tipoViaVel[key] || defaultVel);
  saveHorConfig();
  renderHorario();
}

function saveHorConfig() {
  if (!_sel) return;
  var partida = document.getElementById('horHoraPartida').value || '';
  var via = '', vel = parseFloat(document.getElementById('horVelMedia').value);
  document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
    if (b.classList.contains('active')) via = b.textContent.trim();
  });
  if (via && !isNaN(vel) && vel > 0) {
    _tipoViaVel[_VIA_LABEL_TO_KEY[via] || via] = vel;
  }
  try { localStorage.setItem('vc_horcfg_' + _sel.id_esquema, JSON.stringify({ partida: partida, via: via, viaVel: _tipoViaVel })); } catch(e) {}
}

function _restoreHorConfig(esq) {
  var cfg = null;
  try { cfg = JSON.parse(localStorage.getItem('vc_horcfg_' + esq.id_esquema) || 'null'); } catch(e) {}
  // Prioriza o horário real do esquema; o partida salvo no navegador é só fallback
  // (evita abrir a linha com uma hora antiga e divergente guardada no localStorage).
  var partida = (esq.horario && String(esq.horario).trim()) ? esq.horario : ((cfg && cfg.partida) || '00:00');
  var via     = (cfg && cfg.via)     ? cfg.via     : 'BR';
  if (cfg && cfg.viaVel) {
    Object.keys(cfg.viaVel).forEach(function(k) { _tipoViaVel[k] = cfg.viaVel[k]; });
  }
  document.getElementById('horHoraPartida').value = partida;
  var viaKey = _VIA_LABEL_TO_KEY[via] || via;
  document.getElementById('horVelMedia').value = _tipoViaVel[viaKey] || 85;
  document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim() === via);
  });
}

function _salvarVelAtiva() {
  if (!_sel) return;
  var vel = parseFloat(document.getElementById('horVelMedia').value);
  if (isNaN(vel) || vel <= 0) return;
  var tipo = '';
  document.querySelectorAll('.hor-preset-btn').forEach(function(b) {
    if (b.classList.contains('active')) tipo = b.textContent.trim();
  });
  if (!tipo) return;
  var tipoKey = _VIA_LABEL_TO_KEY[tipo] || tipo;
  _tipoViaVel[tipoKey] = vel;
  google.script.run
    .withSuccessHandler(function() { toast(tipo + ' → ' + vel + ' km/h salvo', 'success'); })
    .withFailureHandler(function(e) { toast('Erro: ' + (e.message || e), 'error'); })
    .salvarTipoViaVelocidade(_sel.id_esquema, tipoKey, vel);
}

// ============================================================
//  Toggle painéis do horário

function toggleHorSidebar() {

  var el = document.getElementById('horSidebarWrap');

function toggleHorOsm() {
  _horOsmHidden = !_horOsmHidden;
  try { localStorage.setItem('vc_hor_osm', _horOsmHidden ? 'hidden' : 'visible'); } catch(e) {}
  var el = document.getElementById('horOsmWrap');
  if (el) el.style.display = _horOsmHidden ? 'none' : '';
}

// ============================================================
//  Toggle Mapa / Horário
// ============================================================
function toggleView(v) {
  _view = v;
  try { localStorage.setItem('vc_view', v); } catch(e) {}
  var mapEl  = document.getElementById('map');
  var mapPh  = document.getElementById('mapPh');
  var mapLeg = document.getElementById('mapLegend');
  var horPan = document.getElementById('horPanel');
  var btnM   = document.getElementById('btnViewMapa');
  var btnH   = document.getElementById('btnViewHorario');

  if (v === 'horario') {
    mapEl.style.display  = 'none';
    mapPh.style.display  = 'none';
    mapLeg.classList.remove('show');
    horPan.style.display = 'flex';
    btnM.classList.remove('active'); btnH.classList.add('active');
    renderHorario();
  } else {
    horPan.style.display = 'none';
    btnM.classList.add('active'); btnH.classList.remove('active');
    updateMap();
  }
}

// ============================================================
//  Cálculo de horário
// ============================================================
// ── Ajustes de rota (sobreposição de km/tempo por trecho) ────
function _setRotasAjust(list) {
  _rotasAjustList = list || [];
  _rotasAjust = {};
  _rotasAjustList.forEach(function(a) {
    var rec = { km: a.km || 0, min: a.min || 0, motivo: a.motivo || '' };
    // Vale nos dois sentidos (ida e volta) com o mesmo km/tempo.
    _rotasAjust[a.codA + '|' + a.codB] = rec;
    _rotasAjust[a.codB + '|' + a.codA] = rec;
  });
}
// Retorna o ajuste do trecho codA→codB (ou null).
function _rotaAjustada(codA, codB) {
  return _rotasAjust[String(codA) + '|' + String(codB)] || null;
}

function _calcHorario(osrmLegs) {
  var vel      = parseFloat(document.getElementById('horVelMedia').value) || 80;
  var partida  = document.getElementById('horHoraPartida').value || '00:00';
  var startIdx = Math.min(_horStartIdx, _seq.length - 1);
  var cur      = _p(partida);
  var res = [], distTotal = 0, tvTotal = 0, tpTotal = 0;
  var osrmOk   = Array.isArray(osrmLegs) && osrmLegs.length > 0;

  var coordRank = {};
  if (osrmOk) {
    var r = 0;
    _seq.forEach(function(p, i){ if (p.lat && p.lng) coordRank[i] = r++; });
  }

  _seq.forEach(function(p, i) {
    var preDep  = (i < startIdx);
    var isStart = (i === startIdx);
    var isLast  = (i === _seq.length - 1);

    var dist = 0, tv = 0, distSource = 'none', timeSource = 'none';
    if (!preDep && !isStart) {
      var prev = _seq[i - 1];
      var legViaType = _legVia[prev.idPonto];
      var legVel = legViaType ? (_tipoViaVel[legViaType] || vel) : vel;
      // Ajuste de rota tem prioridade: sobrepõe km/tempo do trecho (ex.: desvio).
      var adj = _rotaAjustada(prev.idPonto, p.idPonto);
      if (adj) {
        dist = adj.km > 0 ? adj.km : 0;
        distSource = 'ajuste';
        tv = adj.min > 0 ? Math.round(adj.min)
                         : Math.max(Math.round((dist / legVel) * 60), MIN_LEG_TV);
        timeSource = 'ajuste';
      } else {
        var pRank = osrmOk ? coordRank[i - 1] : undefined;
        var cRank = osrmOk ? coordRank[i]     : undefined;
        var leg   = (osrmOk && pRank !== undefined && cRank !== undefined
                     && cRank === pRank + 1) ? osrmLegs[pRank] : null;
        if (leg) {
          dist = leg.distKm; distSource = 'osrm';
          tv   = Math.max(Math.round((leg.distKm / legVel) * 60), MIN_LEG_TV);
          timeSource = 'vel';
        } else {
          dist = 0; distSource = 'none';
          tv   = MIN_LEG_TV; timeSource = 'min';
        }
      }
    }

    var tp = (preDep || isStart) ? 0 : _getStopTime(i, p.tipo);

    var chegada, saida;
    if (preDep) {
      chegada = null; saida = null;
    } else if (isStart) {
      chegada = cur; saida = cur;
    } else {
      chegada = cur + tv; saida = chegada + tp;
    }

    if (!preDep) {
      distTotal += dist; tvTotal += tv; tpTotal += tp;
      if (saida !== null) cur = isLast ? chegada : saida;
    }

    res.push({
      idx: i, nomePonto: p.nomePonto, tipo: p.tipo || '',
      preDep: preDep,
      dist: Math.round(dist * 10) / 10,
      tv: tv, tp: tp,
      chegadaMin: chegada !== null ? Math.round(chegada) : null,
      saidaMin:   (!preDep && !isLast && saida !== null) ? Math.round(saida) : null,
      hasCoords:  !!(p.lat && p.lng),
      distSource: distSource,
      timeSource: timeSource
    });
  });

  var anyOsrm  = res.some(function(p){ return p.distSource === 'osrm'; });
  var lastCalc = res.slice().reverse().find(function(p){ return p.chegadaMin !== null; });
  return {
    pontos:       res,
    distTotal:    Math.round(distTotal * 10) / 10,
    tvTotal:      Math.round(tvTotal),
    tpTotal:      Math.round(tpTotal),
    totalMin:     Math.round(tvTotal + tpTotal),
    chegadaFinal: lastCalc ? lastCalc.chegadaMin : _p(partida),
    usedOsrm:     anyOsrm,
    vel:          vel
  };
}

// ============================================================
//  Renderiza painel de horário
// ============================================================
function renderHorario() {
  var body = document.getElementById('horBody');
  if (!body) return;

  if (!_sel || !_seq.length) {
    body.innerHTML = '<div style="text-align:center;color:#9aa0ad;padding:40px 20px;">'
      + (!_sel ? 'Selecione um esquema para calcular o horário.'
               : 'Adicione pontos ao esquema para calcular o horário.')
      + '</div>';
    return;
  }

  var key = _seqCoordsKey();

  if (_osrmSeqKey === key && _osrmLegs !== undefined) {
    _renderHorarioWith(_osrmLegs);
    return;
  }

  _osrmSeqKey  = key;
  _osrmLegs    = undefined;
  _osrmStatus  = 'pending';
  _renderHorarioWith(null);

  _fetchOsrmDistances(function(legs, geom) {
    if (_osrmSeqKey !== key) return;
    _osrmLegs     = legs;
    _osrmGeometry = geom;
    if (_view === 'horario') {
      _renderHorarioWith(legs);
    } else if (geom && _poly) {
      _poly.setLatLngs(geom);
    }
  });
}

// ============================================================
//  ANTT — Verificação de Pontos de Apoio
// ============================================================

/**
 * Ponto de apoio ANTT = qualquer ponto da sequência SEM horário comercial definido.
 * Independe de tipo ou nome — o critério único é a ausência de saída comercial.
 */
function _isApoioAntt(idx) {
  var p = _seq[idx];
  if (!p) return false;
  return !_comercialTimes[p.idPonto];
}

/**
 * Percorre a sequência acumulando km entre pontos de apoio consecutivos.
 * - Pontos de apoio: qualquer ponto sem horário comercial → zera o contador.
 * - Pontos comerciais: alerta no PRIMEIRO que cruzar 395 km (warn) ou 495 km (error).
 * - Último ponto: sempre verifica o trecho final.
 * Preenche _anttMap[rowIdx] = { type, dist, fromNome }.
 */
function _computeAnttAlerts(c) {
  _anttMap     = {};
  _anttWarnIdx = -1;
  if (!c || _seq.length < 2) return;

  var startIdx     = Math.min(_horStartIdx, _seq.length - 1);
  var vel          = parseFloat(document.getElementById('horVelMedia').value) || 80;
  var lastNome     = _seq[startIdx] ? _seq[startIdx].nomePonto : '';
  var lastApoioIdx = startIdx;
  var accumDist    = 0;
  var maxStretch   = 0;   // maior trecho já fechado (entre dois apoios)
  var warnFired    = false;
  var errorFired   = false;

  for (var i = startIdx + 1; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    if (p.preDep) continue;

    var seg = p.dist || 0;
    if (seg === 0 && p.tv > 0) seg = Math.round((p.tv / 60) * vel * 10) / 10;
    accumDist += seg;

    var isLast  = (i === _seq.length - 1);
    var isApoio = _isApoioAntt(i);
    var d       = Math.round(accumDist);

    if (isApoio) {
      if (d > maxStretch) maxStretch = d;
      if      (d > ANTT_MAX_KM)            _anttMap[i] = { type: 'error', dist: d, fromNome: lastNome };
      else if (d > ANTT_WARN_KM)           _anttMap[i] = { type: 'warn',  dist: d, fromNome: lastNome };
      else if (d > 0 && d < ANTT_MIN_KM)  _anttMap[i] = { type: 'info',  dist: d, fromNome: lastNome };
      lastNome     = _seq[i].nomePonto;
      lastApoioIdx = i;
      accumDist    = 0;
      warnFired    = false;
      errorFired   = false;
    } else {
      if (!errorFired && d > ANTT_MAX_KM) {
        if (warnFired) { delete _anttMap[_anttWarnIdx]; }
        _anttMap[i] = { type: 'error', dist: d, fromNome: lastNome };
        errorFired = true;
      } else if (!warnFired && d > ANTT_WARN_KM) {
        _anttMap[i] = { type: 'warn', dist: d, fromNome: lastNome };
        _anttWarnIdx = i;
        warnFired = true;
      }
      if (isLast) {
        if (d > maxStretch) maxStretch = d;
        if (!_anttMap[i] && !errorFired) {
          if      (d > ANTT_MAX_KM)  _anttMap[i] = { type: 'error', dist: d, fromNome: lastNome };
          else if (d > ANTT_WARN_KM) _anttMap[i] = { type: 'warn',  dist: d, fromNome: lastNome };
        }
      }
    }
  }

  var apoioPt = _seq[lastApoioIdx];
  _anttStatus = {
    accumKm:       Math.round(accumDist),
    remaining:     Math.round(ANTT_MAX_KM - accumDist),
    maxStretch:    maxStretch,
    lastApoioNome: lastNome,
    lastApoioLat:  apoioPt ? (apoioPt.lat || null) : null,
    lastApoioLng:  apoioPt ? (apoioPt.lng || null) : null
  };
}

/**
 * Retorna true se o ponto pode ser candidato a apoio nas sugestões.
 * Usa o NOME (mais confiável que tipo) para excluir rodoviárias/terminais.
 */
function _isApoioCandidate(nome) {
  var n = (nome || '').trim().toUpperCase();
  return !['RODOVIARIA','RODOVIARIO','TERMINAL','ESTACAO'].some(function(k){
    return n.indexOf(k) !== -1;
  });
}

/** Distância em km entre dois pares de coordenadas (fórmula de Haversine). */
function _haversinKm(lat1, lng1, lat2, lng2) {
  var R = 6371, r = Math.PI / 180;
  var dLat = (lat2 - lat1) * r, dLng = (lng2 - lng1) * r;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)
        + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/** Atualiza a barra de status ANTT (ok / warn / error) no card de pontos. */
function _updateAnttWarnBar() {
  var bar = document.getElementById('anttWarn');
  if (!bar) return;
  if (!_anttStatus) { bar.style.display = 'none'; return; }

  // Determina o pior estado em toda a rota
  var hasError = false, hasWarn = false, worstDist = 0;
  Object.keys(_anttMap).forEach(function(k) {
    var a = _anttMap[k];
    if (!a) return;
    if (a.type === 'error') { hasError = true; if (a.dist > worstDist) worstDist = a.dist; }
    if (a.type === 'warn'  && !hasError) { hasWarn = true; if (a.dist > worstDist) worstDist = a.dist; }
  });

  var icoHtml, cls, txt;
  if (hasError) {
    icoHtml = ico('alert-triangle', 14); cls = 'error';
    txt = worstDist + 'km sem apoio — excede o limite ANTT de ' + ANTT_MAX_KM + 'km';
  } else if (hasWarn) {
    icoHtml = ico('zap', 14); cls = 'warn';
    txt = worstDist + 'km no trecho mais longo — faltam ' + (ANTT_MAX_KM - worstDist) + 'km para o limite';
  } else {
    var ms = _anttStatus.maxStretch || _anttStatus.accumKm || 0;
    icoHtml = ico('check', 14); cls = 'ok';
    txt = 'Conforme ANTT — maior trecho: ' + ms + 'km / ' + ANTT_MAX_KM + 'km';
  }

  bar.className = 'antt-warn-bar ' + cls;
  bar.style.display = '';
  bar.innerHTML = '<span class="antt-warn-ico">' + icoHtml + '</span>'
    + '<span class="antt-warn-txt">' + txt + '</span>';
}

// ─── Sugestões de próximo apoio ──────────────────────────────

/**
 * Calcula até `max` candidatos de apoio mais próximos na direção do trajeto.
 * Retorna array de { local, estKm, realKm, isForward }.
 */
function _computeApoioSuggestions(max) {
  if (!_anttStatus || !_anttStatus.lastApoioLat || !_anttStatus.lastApoioLng) return [];

  // Referência = último apoio (onde o trecho problemático começa)
  var refLat = +_anttStatus.lastApoioLat, refLng = +_anttStatus.lastApoioLng;
  // Busca pontos até o limite máximo a partir do último apoio
  var searchRadius = ANTT_MAX_KM;

  // Vetor direcional: do último apoio para o último ponto da rota
  var tail = _seq[_seq.length - 1];
  var hasDirVec = tail && tail.lat && tail.lng
    && (+tail.lat !== refLat || +tail.lng !== refLng);
  var dirLat = hasDirVec ? (+tail.lat - refLat) : 0;
  var dirLng = hasDirVec ? (+tail.lng - refLng) : 0;

  // IDs já na sequência → não sugerir
  var inSeq = {};
  _seq.forEach(function(p) { inSeq[p.idPonto] = true; });

  var cands = [];
  _locais.forEach(function(l) {
    if (!_isApoioCandidate(l.descricao) || !l.lat || !l.lng || inSeq[l.codigo]) return;
    var linKm = _haversinKm(refLat, refLng, +l.lat, +l.lng);
    var estKm = Math.round(linKm * 1.3);
    if (estKm < 10 || estKm > searchRadius) return;

    var isForward = true;
    if (hasDirVec) {
      var vLat = +l.lat - refLat, vLng = +l.lng - refLng;
      isForward = (vLat * dirLat + vLng * dirLng) >= 0;
    }
    cands.push({ local: l, estKm: estKm, realKm: null, isForward: isForward });
  });

  cands.sort(function(a, b) {
    if (a.isForward !== b.isForward) return a.isForward ? -1 : 1;
    return a.estKm - b.estKm;
  });

  return cands.slice(0, max || 5);
}

/** Renderiza o painel de sugestões no sidebar. */
function _renderApoioSuggestions(cands) {
  var el = document.getElementById('anttSuggest');
  if (!el) return;
  if (!cands || !cands.length) { el.style.display = 'none'; return; }

  var isErr = _anttStatus && _anttStatus.accumKm > ANTT_MAX_KM;
  el.className = 'antt-sugg-panel' + (isErr ? ' error' : '');
  el.style.display = '';

  var html = '<div class="antt-sugg-head">' + ico('lightbulb', 13) + ' Sugestões de apoio</div>';
  html += cands.map(function(c) {
    var dClass = c.realKm ? 'real' : 'est';
    var dVal   = c.realKm ? c.realKm : c.estKm;
    var dPfx   = c.realKm ? '' : '~';
    return '<div class="antt-sugg-item" data-cod="' + esc(c.local.codigo) + '">'
      + '<div class="antt-sugg-info">'
        + '<div class="antt-sugg-nome">' + esc(c.local.descricao) + '</div>'
        + '<div class="antt-sugg-meta">'
          + '<span class="antt-sugg-dist ' + dClass + '">' + dPfx + dVal + 'km</span>'
          + (c.local.tipo ? ' · ' + esc(c.local.tipo) : '')
          + (!c.isForward ? ' <span class="antt-sugg-behind">' + ico('arrow-left', 11) + ' atrás</span>' : '')
        + '</div>'
      + '</div>'
      + '<button class="antt-sugg-add btn-add-sugg" data-cod="' + esc(c.local.codigo) + '">+</button>'
      + '</div>';
  }).join('');
  el.innerHTML = html;

  el.querySelectorAll('.antt-sugg-add').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var found = _locais.find(function(l){ return l.codigo === btn.getAttribute('data-cod'); });
      if (found) addPontoNoFim(found);
    });
  });
}

/**
 * Consulta o cache de distâncias (Sheets) para os pares
 * último-ponto → candidato e atualiza os km reais onde houver hit.
 */
function _refreshSuggestionsWithCache(cands) {
  if (!cands.length || typeof google === 'undefined' || !google.script) return;
  var lastPt = _seq.length ? _seq[_seq.length - 1] : null;
  if (!lastPt) return;

  // Evita re-consultar o mesmo conjunto
  var key = lastPt.idPonto + '|' + cands.map(function(c){ return c.local.codigo; }).join(',');
  if (key === _anttSuggCacheKey) return;
  _anttSuggCacheKey = key;

  var pairs = cands.map(function(c){ return { a: lastPt.idPonto, b: c.local.codigo }; });

  google.script.run
    .withSuccessHandler(function(cached) {
      var updated = false;
      cands.forEach(function(c) {
        var a = lastPt.idPonto, b = c.local.codigo;
        var k = (a <= b) ? (a + ':' + b) : (b + ':' + a);
        var ck = (cached[k] || {}).km || 0;
        if (ck > 0 && ck !== c.realKm) {
          c.realKm = ck;
          updated = true;
        }
      });
      if (!updated) return;
      // Re-ordena com distâncias reais
      cands.sort(function(a, b) {
        if (a.isForward !== b.isForward) return a.isForward ? -1 : 1;
        return (a.realKm || a.estKm) - (b.realKm || b.estKm);
      });
      _renderApoioSuggestions(cands);
    })
    .withFailureHandler(function(){})
    .getDistanciasCached(pairs);
}

/** Ponto de entrada: calcula, renderiza e dispara consulta ao cache. */
function _updateApoioSuggestions() {
  if (!_anttStatus || _anttStatus.accumKm <= ANTT_WARN_KM) {
    var el = document.getElementById('anttSuggest');
    if (el) el.style.display = 'none';
    _anttSuggCands = [];
    return;
  }
  _anttSuggCands = _computeApoioSuggestions(5);
  _renderApoioSuggestions(_anttSuggCands);
  _refreshSuggestionsWithCache(_anttSuggCands);
}

// ── ANTT map overlays ────────────────────────────────────────

/** Remove todas as camadas ANTT do mapa (stretch polys + suggestion markers). */
function _clearAnttMapLayers() {
  _stretchPolys.forEach(function(p){ p.remove(); });
  _stretchPolys = [];
  _suggMapMarkers.forEach(function(m){ m.remove(); });
  _suggMapMarkers = [];
  _anttMapActive = false;
  var anttLeg = document.getElementById('mapAnttLegend');
  if (anttLeg) anttLeg.style.display = 'none';
}

/**
 * Desenha no mapa:
 *  1. Polylines coloridas por trecho entre pontos de apoio (verde/âmbar/vermelho)
 *  2. Marcadores de sugestão de apoio (pins roxos clicáveis)
 * Chamada de updateMap() — ANTES de adicionar _poly para que a rota fique por cima.
 */
function _drawAnttOnMap() {
  _clearAnttMapLayers();
  if (!_map || _seq.length < 2) return;

  // Calcula horário + ANTT com as legs disponíveis
  var legs = Array.isArray(_osrmLegs) ? _osrmLegs : null;
  var c = _calcHorario(legs);
  _computeAnttAlerts(c);
  if (!_anttStatus) return;

  // Só exibe overlays se houver preocupação ANTT real
  var needsOverlay = _anttStatus.maxStretch > ANTT_WARN_KM || _anttStatus.accumKm > ANTT_WARN_KM;
  if (!needsOverlay) return;

  var clr = { error: '#ef4444', warn: '#f59e0b', ok: '#22c55e' };
  var startIdx    = Math.min(_horStartIdx, _seq.length - 1);
  var stretchStart = startIdx;
  var accumDist   = 0;
  var hasWarnErr  = false;

  function _flushStretch(endIdx) {
    var d = Math.round(accumDist);
    if (d <= 0) return; // sem distância (OSRM não respondeu ainda)
    var type = d > ANTT_MAX_KM ? 'error' : d > ANTT_WARN_KM ? 'warn' : 'ok';
    if (type !== 'ok') hasWarnErr = true;
    var coords = [];
    for (var j = stretchStart; j <= endIdx; j++) {
      var sp = _seq[j];
      if (sp && sp.lat && sp.lng) coords.push([+sp.lat, +sp.lng]);
    }
    if (coords.length < 2) return;
    var fromNome = (_seq[stretchStart] || {}).nomePonto || '?';
    var toNome   = (_seq[endIdx]       || {}).nomePonto || '?';
    var lbl  = type === 'error' ? 'Excede ANTT' : type === 'warn' ? 'Atenção ANTT' : 'Trecho OK';
    var tip  = '<b>' + lbl + '</b><br>' + d + ' km'
             + '<br><span style="font-size:10px;color:#ccc">' + esc(fromNome) + ' → ' + esc(toNome) + '</span>';
    var pl = L.polyline(coords, {
      color: clr[type], weight: 10, opacity: 0.32,
      lineCap: 'round', lineJoin: 'round'
    }).addTo(_map);
    pl.bindTooltip(tip, { sticky: true });
    _stretchPolys.push(pl);
  }

  for (var i = startIdx + 1; i < c.pontos.length; i++) {
    var p = c.pontos[i];
    if (p.preDep) continue;
    accumDist += p.dist || 0;
    var isApoio = _isApoioAntt(i);
    var isLast  = (i === c.pontos.length - 1);
    if (isApoio || isLast) {
      _flushStretch(i);
      if (isApoio) { stretchStart = i; accumDist = 0; }
    }
  }

  // Exibe seção ANTT na legenda do mapa
  _anttMapActive = hasWarnErr;
  var anttLeg = document.getElementById('mapAnttLegend');
  if (anttLeg) anttLeg.style.display = hasWarnErr ? '' : 'none';

  // Marcadores de sugestão de apoio
  var cands = _computeApoioSuggestions(5);
  _anttSuggCands = cands;
  cands.forEach(function(cand) {
    if (!cand.local || !cand.local.lat || !cand.local.lng) return;
    var dVal = cand.realKm || cand.estKm;
    var dPfx = cand.realKm ? '' : '~';
    var icon = L.divIcon({
      className: '',
      html: '<div class="antt-map-sugg-pin">+</div>',
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    var tipStr = '<b>' + esc(cand.local.descricao) + '</b>'
               + '<br><span style="font-size:10px;color:#a5b4fc">' + dPfx + dVal + ' km desde último apoio'
               + (cand.local.tipo ? ' · ' + esc(cand.local.tipo) : '') + '</span>'
               + '<br><span style="font-size:10px;color:#818cf8">Clique para adicionar ao esquema</span>';
    var m = L.marker([+cand.local.lat, +cand.local.lng], { icon: icon, zIndexOffset: 600 });
    m.bindTooltip(tipStr, { direction: 'top', offset: [0, -16] });
    m.on('click', (function(loc) {
      return function() { addPontoNoMapa(loc); };
    })(cand.local));
    m.addTo(_map);
    _suggMapMarkers.push(m);
  });
}

/** Retorna o HTML do badge ANTT para inserir na célula de nome. */
function _anttBadgeHtml(idx) {
  var a = _anttMap[idx];
  if (!a) return '';
  var badgeIco = a.type === 'error' ? ico('alert-triangle', 11) : a.type === 'warn' ? ico('zap', 11) : ico('info', 11);
  var lbl = a.type === 'error'
    ? badgeIco + ' ' + a.dist + 'km s/ apoio'
    : a.type === 'warn'
    ? badgeIco + ' ' + a.dist + 'km (lim. ' + ANTT_MAX_KM + ')'
    : badgeIco + ' ' + a.dist + 'km (apoio próximo)';
  var tip = a.type === 'error'
    ? a.dist + 'km desde ' + a.fromNome + ' — excede o limite ANTT de ' + ANTT_MAX_KM + 'km entre pontos de apoio'
    : a.type === 'warn'
    ? a.dist + 'km desde ' + a.fromNome + ' — próximo ao limite ANTT (' + ANTT_MAX_KM + 'km)'
    : 'Apenas ' + a.dist + 'km desde ' + a.fromNome + ' — pontos de apoio muito próximos';
  return ' <span class="antt-badge antt-' + a.type + '" title="' + esc(tip) + '">' + lbl + '</span>';
}

/** Atualiza indicadores ANTT nos TRs existentes (uso em partial updates). */
function _applyAnttToRows(c) {
  _computeAnttAlerts(c);
  for (var i = 0; i < c.pontos.length; i++) {
    var row = document.getElementById('horRow' + i);
    if (!row || c.pontos[i].preDep) continue;
    row.classList.remove('antt-row-error','antt-row-warn','antt-row-info');
    var tds = row.querySelectorAll('td');
    if (!tds[0]) continue;
    var old = tds[0].querySelector('.antt-badge');
    if (old) old.remove();
    var a = _anttMap[i];
    if (a) {
      row.classList.add('antt-row-' + a.type);
      tds[0].insertAdjacentHTML('beforeend', _anttBadgeHtml(i));
    }
  }
  _updateAnttWarnBar();
  _updateApoioSuggestions();
}

function _buildStatsHtml(c, osrmLegs) {
