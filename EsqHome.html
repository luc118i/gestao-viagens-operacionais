<!-- Home: seleção de esquema com cards agrupados por região -->
<div id="homeScreen" class="home-screen">
  <div class="home-inner">
    <div class="home-head">
      <div>
        <div class="home-title">Esquemas Operacionais</div>
        <div class="home-sub">Selecione um esquema por região ou busque direto</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="home-view-toggle">
          <button class="home-view-btn active" id="homeBtnViewGrid"  onclick="setHomeView('grid')"  title="Visualização em grade">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="home-view-btn" id="homeBtnViewList" onclick="setHomeView('list')" title="Visualização em lista">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <button class="home-view-btn" id="homeBtnHideEmpty" onclick="toggleHideEmpty()" title="Ocultar esquemas sem pontos">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="btn btn-ghost" id="homeBtnSelect" onclick="toggleHomeSelectMode()">Selecionar</button>
        <button class="btn btn-ghost" id="homeBtnPdfs" onclick="abrirModalPdfLote()">Baixar PDFs</button>
        <button class="btn btn-dark" id="homeBtnNovo" onclick="novoEsquemaHome()">+ Novo Esquema</button>
      </div>
    </div>

    <div class="home-search-wrap" onclick="abrirModalEsquema()" title="Buscar esquema">
      <svg class="home-s-ico" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input type="text" class="home-search" placeholder="Buscar por código, linha, horário…" readonly />
    </div>

    <div class="home-selbar" id="homeSelBar" style="display:none;">
      <span class="home-selbar-count" id="homeSelCount">0 selecionados</span>
      <div class="home-selbar-actions">
        <button class="home-gbtn" onclick="homeSelectAll()">Selecionar todos</button>
        <button class="home-gbtn" onclick="homeSelectClear()">Limpar</button>
        <button class="btn btn-dark btn-sm" id="homeSelDownload" onclick="baixarPdfsSelecionados()">Baixar PDFs (0)</button>
      </div>
    </div>

    <div class="home-groupbar" id="homeGroupBar">
      <span class="home-groupbar-label">Agrupar por</span>
      <button class="home-gbtn active" data-g="regiao"  onclick="setHomeGroup('regiao')">Região</button>
      <button class="home-gbtn"        data-g="horario" onclick="setHomeGroup('horario')">Horário</button>
      <button class="home-gbtn"        data-g="partida" onclick="setHomeGroup('partida')">Partida</button>
      <button class="home-gbtn"        data-g="fim"     onclick="setHomeGroup('fim')">Encerramento</button>
      <button class="home-gbtn"        data-g="linha"   onclick="setHomeGroup('linha')">Linha</button>
      <button class="home-gbtn"        data-g="sentido" onclick="setHomeGroup('sentido')">Sentido</button>
    </div>

    <div id="homeBody" class="home-body"></div>
  </div>
</div>
