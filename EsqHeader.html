<header class="hdr">
  <div class="hdr-logo">VC</div>
  <div>
    <div class="hdr-title">Gestão de Esquemas</div>
    <div class="hdr-sub">Viação Catedral · BI Operacional</div>
  </div>

  <button class="hdr-esq-btn" id="hdrEsqBtn" onclick="abrirModalEsquema()">
    <span id="hdrEsqLabel" style="display:inline-flex;align-items:center;gap:6px;">
      <span class="ico"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></span>
      Selecionar Esquema
    </span>
    <span class="hdr-esq-arrow">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="13" height="13"><polyline points="6 9 12 15 18 9"/></svg>
    </span>
  </button>

  <div class="hdr-view-toggle" id="hdrViewToggle" style="display:none;">
    <button class="hdr-toggle-btn active" id="btnViewMapa"    onclick="toggleView('mapa')"
      style="display:inline-flex;align-items:center;gap:5px;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      Mapa
    </button>
    <button class="hdr-toggle-btn" id="btnViewHorario" onclick="toggleView('horario')"
      style="display:inline-flex;align-items:center;gap:5px;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Horário
    </button>
  </div>

  <div class="hdr-space"></div>

  <button class="hdr-volta" id="btnVolta" style="display:none;" onclick="iniciarViagemVolta()" title="Cria novo esquema com a sequência invertida"
    style="display:inline-flex;align-items:center;gap:5px;">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
    Viagem de Volta
  </button>
  <button class="hdr-save" id="btnSalvar" style="display:none;" onclick="salvarTudo()"
    style="display:inline-flex;align-items:center;gap:5px;">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Salvar Alterações
  </button>

  <a id="btnVoltar" href="#" class="hdr-btn" style="display:inline-flex;align-items:center;gap:5px;">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Análise de Viagem
  </a>
</header>
