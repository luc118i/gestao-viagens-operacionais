<!-- Modal: selecionar / criar esquema -->
<div class="esq-modal-overlay" id="esqModalOverlay">
  <div class="esq-modal">
    <div class="esq-modal-head">
      <div class="esq-modal-title">Selecionar Esquema</div>
      <button class="esq-modal-close" id="btnFecharModalEsq" style="display:none;" onclick="fecharModalEsquema()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="esq-modal-body">
      <div class="sw esq-search-wrap">
        <svg class="esq-search-ico" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input type="text" id="esqSearch" class="fi esq-search-fi" placeholder="Buscar por código, linha ou horário…" autocomplete="off" />
        <div class="sd" id="esqDrop"></div>
      </div>
      <div id="esqBadge" style="display:none; margin-top:10px;"></div>
    </div>
    <div class="esq-modal-divider"></div>
    <div class="esq-modal-form" id="esqForm" style="display:none;">
      <div class="field" style="margin-top:10px;">
        <label class="fl">Nome da linha</label>
        <input type="text" id="fNome" class="fi" placeholder="Ex: NATAL (RN) - SAO PAULO (SP)" />
      </div>
      <div class="row-fields">
        <div class="field">
          <label class="fl">Horário</label>
          <div class="fi-time-wrap">
            <svg class="fi-time-ico" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10 6.5V10.5L12.5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="fHor" class="fi fi-time" placeholder="08:00" maxlength="5"
                   oninput="_autoFormatTime(this)"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('btnSalvEsq').click()}" />
          </div>
        </div>
        <div class="field">
          <label class="fl">Sentido</label>
          <select id="fSent" class="fs">
            <option value="Ida">Ida</option>
            <option value="Volta">Volta</option>
            <option value="Circular">Circular</option>
          </select>
        </div>
      </div>
      <button class="btn btn-dark btn-full" id="btnSalvEsq">Criar Esquema</button>
    </div>
    <div class="esq-modal-footer">
      <button class="btn btn-ghost btn-sm" id="btnNovo" onclick="novoEsquema()">+ Novo Esquema</button>
      <span style="font-size:10px;color:#bbb;">Selecione ou crie um esquema para continuar</span>
    </div>
  </div>
</div>

<!-- Modal: importar pontos de outro horário da mesma linha -->
<div class="esq-modal-overlay" id="importModalOverlay" style="display:none;" onclick="if(event.target===this)fecharImportModal()">
  <div class="esq-modal" style="max-width:440px;">
    <div class="esq-modal-head">
      <div class="esq-modal-title">Importar Pontos</div>
      <button class="esq-modal-close" onclick="fecharImportModal()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="esq-modal-body">
      <p style="font-size:12px;color:#888;margin:0 0 12px;">Selecione o horário de origem da mesma linha. Os pontos (rota, tipos de trecho e paradas) serão copiados. Horários comerciais não são importados.</p>
      <div id="importEsqList" style="max-height:320px;overflow-y:auto;"></div>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="ovl" id="ovl">
  <div class="ovl-box">
    <div class="spin"></div>
    <div id="ovlMsg">Carregando…</div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-wrap" id="toastWrap"></div>
