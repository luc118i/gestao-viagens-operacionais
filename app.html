<script>
  // ============================================================
  //  app.js  —  Orquestrador principal da aplicação
  //  Tema: claro (redesign)
  // ============================================================

  const AppModule = (() => {
    // ---- Estado global da sessão ----
    let _enrichedTrip = [];
    let _analysis = null;
    let _locaisCache = [];
    let _mapsReady = false;
    let _tripReady = false;

    let _esquemas = [];
    let _esquemaPontos = [];
    let _comparacao = null;
    let _vinculos = [];
    let _motoristas = [];
    let _autoVinculoDataList = []; // [{ nomeCsv, motorista, score, pontoInicio, pontoFim }]
    let _mapPending = null; // { trip, comp, locais } — aguardando clique do usuário

    // Modo de visualização ativo na tela (afeta mapa, tabela e alertas)
    let _modoAtivo = 'COMPLETO';
    let _motoristaAtivo = null; // vinculo ativo quando modo=MOTORISTA

    function _isMapUsable() {
      return (
        typeof MapModule !== "undefined" &&
        MapModule &&
        typeof MapModule.isReady === "function" &&
        MapModule.isReady()
      );
    }

    // ============================================================
    //  INICIALIZAÇÃO
    // ============================================================

    function init() {
      // Mapa inicializado sob demanda (clique em "Visualizar Mapa")
      _mapsReady = false;

      // Módulos de UI
      UIModule.initUpload(_onFileLoaded);
      UIModule.initManualPointModal(_onManualPointAdded);
      UIModule.initLimpar(_onLimpar);
      UIModule.initPrint();
      UIModule.initTabs();

      // Botão Processar
      var btnProcessar = document.getElementById("btnProcessar");
      if (btnProcessar) {
        btnProcessar.addEventListener("click", _processarViagem);
      }

      // Form inline de motorista
      _initSidebarMotorista();

      // Botão "+" — atalho para o modal de motoristas
      var btnAddMot = document.getElementById('btnAddMotorista');
      if (btnAddMot) {
        btnAddMot.addEventListener('click', function() {
          var overlay = document.getElementById('modalMotorista');
          if (overlay) { overlay.classList.add('open'); _renderModalMotorista(); }
        });
      }

      // Modal de motorista e relatório
      _initModalMotorista();
      _initModalRelatorio();

      // Botão "Gerar Relatório" inline (Coluna 3)
      var btnGerarInline = document.getElementById('btnGerarRelatorioInline');
      if (btnGerarInline) {
        btnGerarInline.addEventListener('click', _onGerarRelatorioInline);
      }

      // Combobox pesquisável de esquema (navbar + upload)
      _initEsquemaSearch();
      _initUploadEsquemaSearch();

      // Listener de radio tipoRelatorio (na seção de config, inline)
      document
        .querySelectorAll('input[name="tipoRelatorio"]')
        .forEach(function (radio) {
          radio.addEventListener("change", function () {
            var val = radio.value;
            _modoAtivo = val;
            var motF = document.getElementById("relMotoristaFieldsInline");
            var trcF = document.getElementById("relTrechoFieldsInline");
            if (motF) motF.style.display = val === "MOTORISTA" ? "block" : "none";
            if (trcF) trcF.style.display = val === "TRECHO"    ? "block" : "none";
            _atualizarPreviewRelatorio();
            _aplicarFiltroModo();
          });
        });

      // Atualiza view quando motorista selecionado muda
      var selMot = document.getElementById("relSelectMotorista");
      if (selMot) selMot.addEventListener("change", function() {
        var idx = parseInt(selMot.value, 10);
        _motoristaAtivo = (!isNaN(idx) && _vinculos[idx]) ? _vinculos[idx] : null;
        _atualizarPreviewRelatorio();
        _aplicarFiltroModo();
      });

      // Atualiza view quando pontos A/B mudam (selects ocultos do modal)
      ["relPontoA", "relPontoB"].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener("change", function() {
          _atualizarPreviewRelatorio();
          _aplicarFiltroModo();
        });
      });

      // Barra de modo — select de motorista
      var modoSelMot = document.getElementById('modoSelectMotorista');
      if (modoSelMot) modoSelMot.addEventListener('change', function() {
        var idx = parseInt(modoSelMot.value, 10);
        _motoristaAtivo = (!isNaN(idx) && _vinculos[idx]) ? _vinculos[idx] : null;
        _aplicarFiltroModo();
      });

      // Barra de modo — pontos de início/fim do trecho
      ['modoPontoA', 'modoPontoB'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('change', function() { _aplicarFiltroModo(); });
      });

      // Carrega dados iniciais
      _loadDadosIniciais();

      // Progressive disclosure: começa com tela de upload limpa
      var wrapper = document.querySelector('.app-wrapper');
      if (wrapper) wrapper.classList.add('app--upload-only');
    }

    // ============================================================
    //  CARREGAMENTO DE DADOS INICIAIS
    // ============================================================

    function _loadDadosIniciais() {
      google.script.run
        .withSuccessHandler(function (dados) {
          _esquemas = dados.esquemas || [];
          _motoristas = dados.motoristas || [];

          // Popula o combobox pesquisável com os esquemas carregados
          _renderEsquemaOpts('');

          console.log(
            "[App] Dados iniciais: " +
              _esquemas.length +
              " esquemas, " +
              _motoristas.length +
              " motoristas",
          );
        })
        .withFailureHandler(function (err) {
          console.warn("[App] Aviso: não foi possível carregar dados iniciais.", err);
          UIModule.showToast('Erro ao carregar esquemas: ' + (err && err.message ? err.message : String(err)), 'error', 8000);
        })
        .getDadosIniciais();

      _loadLocais();
    }

    function _loadLocais() {
      google.script.run
        .withSuccessHandler(function (locais) {
          _locaisCache = locais || [];
          console.log(
            "[App] Base de locais: " + _locaisCache.length + " registros",
          );
        })
        .withFailureHandler(function (err) {
          console.warn(
            "[App] Aviso: não foi possível pré-carregar locais.",
            err,
          );
        })
        .getLocais();
    }

    // ============================================================
    //  SELEÇÃO DE ESQUEMA
    // ============================================================

    function _onEsquemaChanged() {
      var sel = document.getElementById("selectEsquema");
      var idEsquema = sel ? sel.value : "";
      var infoEl = document.getElementById("esquemaInfo");

      // Atualiza widget de upload: aviso/confirmação de esquema
      var uploadAviso = document.getElementById('uploadEsquemaAviso');
      var uploadInfo  = document.getElementById('uploadEsquemaInfo');

      if (!idEsquema) {
        _esquemaPontos = [];
        _comparacao = null;
        if (infoEl) infoEl.style.display = "none";
        if (uploadAviso) uploadAviso.style.display = 'block';
        if (uploadInfo)  uploadInfo.style.display  = 'none';
        // Desabilita btnProcessar se não há esquema
        var btnP = document.getElementById('btnProcessar');
        if (btnP && !UIModule.getCsvText()) btnP.disabled = true;
        return;
      }

      if (uploadAviso) uploadAviso.style.display = 'none';

      var esqObj = _esquemas.find(function (e) {
        return e.id_esquema === idEsquema;
      });

      google.script.run
        .withSuccessHandler(function (pontos) {
          _esquemaPontos = pontos || [];

          var esqLabel = (esqObj ? esqObj.nome_linha + (esqObj.sentido ? " · " + esqObj.sentido : "") + " · " : "") + _esquemaPontos.length + " pontos";
          if (infoEl) {
            infoEl.textContent = esqLabel;
            infoEl.style.display = _esquemaPontos.length > 0 ? "block" : "none";
          }
          if (uploadInfo) {
            uploadInfo.textContent = "✓ " + esqLabel;
            uploadInfo.style.display = 'block';
          }
          // Habilita btnProcessar se CSV também já carregado
          var btnP = document.getElementById('btnProcessar');
          if (btnP && UIModule.getCsvText()) btnP.disabled = false;

          _popularDropdownsPontos(_esquemaPontos);

          // Mostra seção de trecho no form inline se aberto
          var sidebarTrecho = document.getElementById("sidebarTrechoSection");
          var sidebarForm = document.getElementById("motoristaFormInline");
          if (
            sidebarTrecho &&
            sidebarForm &&
            sidebarForm.style.display !== "none"
          ) {
            sidebarTrecho.style.display =
              _esquemaPontos.length > 0 ? "block" : "none";
          }

          if (_enrichedTrip.length > 0) {
            _calcularComparacao();
          }

          console.log(
            "[App] Esquema " +
              idEsquema +
              ": " +
              _esquemaPontos.length +
              " pontos",
          );
        })
        .withFailureHandler(function (err) {
          console.warn("[App] Erro ao carregar pontos do esquema:", err);
          UIModule.showToast("Erro ao carregar esquema.", "error");
        })
        .getEsquemaPontos(idEsquema);
    }

    // ============================================================
    //  COMBOBOX PESQUISÁVEL DE ESQUEMA
    // ============================================================

    function _initEsquemaSearch() {
      var wrap    = document.getElementById('esquemaCombobox');
      var input   = document.getElementById('esquemaSearch');
      var dropdown = document.getElementById('esquemaDropdown');
      if (!wrap || !input || !dropdown) return;

      // Abre ao clicar no input
      input.addEventListener('focus', function() {
        wrap.classList.add('open');
        input.classList.add('open');
        _renderEsquemaOpts(input.value);
      });

      // Filtra enquanto digita
      input.addEventListener('input', function() {
        wrap.classList.add('open');
        _renderEsquemaOpts(input.value);
      });

      // Fecha ao clicar fora
      document.addEventListener('click', function(e) {
        var btn = document.getElementById('btnRefreshEsquemas');
        if (!wrap.contains(e.target) && e.target !== btn) {
          _fecharEsquemaDropdown();
        }
      });

      // Botão de refresh: invalida cache no servidor e recarrega
      var btnRefresh = document.getElementById('btnRefreshEsquemas');
      if (btnRefresh) {
        btnRefresh.addEventListener('click', function() {
          btnRefresh.textContent = '…';
          btnRefresh.disabled = true;
          google.script.run
            .withSuccessHandler(function(novosEsquemas) {
              _esquemas = novosEsquemas || [];
              _renderEsquemaOpts(
                document.getElementById('esquemaSearch')
                  ? document.getElementById('esquemaSearch').value : ''
              );
              btnRefresh.textContent = '↻';
              btnRefresh.disabled = false;
              UIModule.showToast(_esquemas.length + ' esquemas carregados.', 'success', 2500);
            })
            .withFailureHandler(function(err) {
              btnRefresh.textContent = '↻';
              btnRefresh.disabled = false;
              UIModule.showToast('Erro ao atualizar esquemas.', 'error');
            })
            .refreshEsquemas();
        });
      }

      // Teclado: ESC fecha, Enter seleciona o primeiro resultado
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { _fecharEsquemaDropdown(); return; }
        if (e.key === 'Enter') {
          var first = dropdown.querySelector('.esquema-opt');
          if (first) first.click();
        }
      });
    }

    function _renderEsquemaOpts(query) {
      var dropdown = document.getElementById('esquemaDropdown');
      if (!dropdown) return;

      var q = (query || '').trim().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      var filtrados = _esquemas.filter(function(esq) {
        if (!q) return true;
        var id   = String(esq.id_esquema || '').toLowerCase();
        var nome = (esq.nome_linha || '').toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        var hor  = (esq.horario || '').toLowerCase();
        var sent = (esq.sentido || '').toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return id.includes(q) || nome.includes(q) || hor.includes(q) || sent.includes(q);
      });

      var selectedId = document.getElementById('selectEsquema')
        ? document.getElementById('selectEsquema').value : '';

      if (filtrados.length === 0) {
        dropdown.innerHTML = '<div class="esquema-opt-noresult">Nenhum resultado encontrado.</div>';
        return;
      }

      dropdown.innerHTML = filtrados.map(function(esq) {
        var id   = _escHtml(String(esq.id_esquema));
        var nome = _escHtml(esq.nome_linha || esq.id_esquema);
        var hor  = esq.horario ? _escHtml(esq.horario) : '';
        var sent = esq.sentido ? _escHtml(esq.sentido) : '';
        var isSel = String(esq.id_esquema) === selectedId ? ' selected' : '';

        // Destaca o trecho que casou com a busca
        if (q) {
          nome = _highlightMatch(nome, query);
          hor  = hor  ? _highlightMatch(hor,  query) : hor;
          id   = _highlightMatch(id, query);
        }

        var meta = '';
        if (hor)  meta += '<span class="tag-horario">' + hor + '</span>';
        if (sent) meta += '<span class="tag-sentido">' + sent + '</span>';

        return '<div class="esquema-opt' + isSel + '" data-id="' + _escHtml(String(esq.id_esquema)) + '">' +
          '<div class="esquema-opt-main">' + id + ' &mdash; ' + nome + '</div>' +
          (meta ? '<div class="esquema-opt-meta">' + meta + '</div>' : '') +
          '</div>';
      }).join('');

      // Wires de clique
      dropdown.querySelectorAll('.esquema-opt').forEach(function(el) {
        el.addEventListener('click', function() {
          var id = el.getAttribute('data-id');
          _selecionarEsquema(id);
        });
      });
    }

    function _selecionarEsquema(idEsquema) {
      var hidden = document.getElementById('selectEsquema');
      var input  = document.getElementById('esquemaSearch');
      if (hidden) hidden.value = idEsquema || '';

      var esqObj = _esquemas.find(function(e) { return String(e.id_esquema) === String(idEsquema); });
      if (input) {
        if (esqObj) {
          var label = esqObj.id_esquema + ' — ' + (esqObj.nome_linha || esqObj.id_esquema);
          if (esqObj.horario) label += '  ·  ' + esqObj.horario;
          if (esqObj.sentido) label += '  ·  ' + esqObj.sentido;
          input.value = label;
        } else {
          input.value = '';
        }
      }

      // Sincroniza o mini combobox do upload
      var uploadInput = document.getElementById('uploadEsquemaSearch');
      if (uploadInput && esqObj) {
        uploadInput.value = esqObj.id_esquema + ' — ' + (esqObj.nome_linha || esqObj.id_esquema);
      }

      _fecharEsquemaDropdown();
      _onEsquemaChanged();
    }

    function _fecharEsquemaDropdown() {
      var wrap  = document.getElementById('esquemaCombobox');
      var input = document.getElementById('esquemaSearch');
      if (wrap)  wrap.classList.remove('open');
      if (input) input.classList.remove('open');
    }

    // Mini combobox de esquema dentro do card de upload
    function _initUploadEsquemaSearch() {
      var wrap     = document.getElementById('uploadEsquemaCombobox');
      var input    = document.getElementById('uploadEsquemaSearch');
      var dropdown = document.getElementById('uploadEsquemaDropdown');
      if (!wrap || !input || !dropdown) return;

      function show() {
        renderOpts(input.value);
        dropdown.style.display = 'block';
      }
      function hide() {
        dropdown.style.display = 'none';
      }

      function renderOpts(query) {
        var q = (query || '').trim().toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        var list = _esquemas.filter(function(esq) {
          if (!q) return true;
          var id   = String(esq.id_esquema || '').toLowerCase();
          var nome = (esq.nome_linha || '').toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
          var hor  = (esq.horario || '').toLowerCase();
          return id.includes(q) || nome.includes(q) || hor.includes(q);
        });

        if (list.length === 0) {
          dropdown.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--text3);">Nenhum resultado.</div>';
          return;
        }

        dropdown.innerHTML = list.slice(0, 30).map(function(esq) {
          var label = _escHtml(esq.id_esquema + ' — ' + (esq.nome_linha || esq.id_esquema));
          if (esq.horario) label += ' <span style="color:var(--text3);font-size:10px;">· ' + _escHtml(esq.horario) + '</span>';
          return '<div data-id="' + _escHtml(String(esq.id_esquema)) + '" style="padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border-light,#eee);" onmouseover="this.style.background=\'var(--bg2)\';" onmouseout="this.style.background=\'\';">' + label + '</div>';
        }).join('');

        dropdown.querySelectorAll('[data-id]').forEach(function(el) {
          el.addEventListener('click', function() {
            var id = el.getAttribute('data-id');
            _selecionarEsquema(id);
            var esqObj = _esquemas.find(function(e) { return String(e.id_esquema) === String(id); });
            if (esqObj) {
              input.value = esqObj.id_esquema + ' — ' + (esqObj.nome_linha || esqObj.id_esquema);
            }
            hide();
          });
        });
      }

      input.addEventListener('focus', show);
      input.addEventListener('input', show);
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { hide(); input.blur(); }
        if (e.key === 'Enter') {
          var first = dropdown.querySelector('[data-id]');
          if (first) first.click();
        }
      });

      // Fecha ao clicar fora — mesmo padrão do header (mais confiável que blur em iframe)
      document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) hide();
      });
    }

    /** Envolve o trecho que casou com `query` em <mark> */
    function _highlightMatch(html, query) {
      if (!query) return html;
      var q = query.trim();
      var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return html.replace(re, '<mark>$1</mark>');
    }

    /**
     * Dado um array ordenado de { valor, label }, calcula o conjunto de
     * valores que estão dentro de algum intervalo já ocupado em _vinculos.
     * O intervalo é inclusivo: todos os pontos entre ponto_inicio e ponto_fim
     * (na ordem da lista) são considerados ocupados.
     * @param {Array<{valor:string, label:string}>} pontos
     * @returns {Set<string>}
     */
    function _calcularPontosOcupados(pontos) {
      var ocupados = new Set();
      _vinculos.forEach(function(v) {
        var idxInicio = -1, idxFim = -1;
        for (var i = 0; i < pontos.length; i++) {
          if (pontos[i].valor === v.ponto_inicio) idxInicio = i;
          if (pontos[i].valor === v.ponto_fim)    idxFim    = i;
        }
        if (idxInicio >= 0 && idxFim >= 0) {
          var lo = Math.min(idxInicio, idxFim);
          var hi = Math.max(idxInicio, idxFim);
          for (var j = lo; j <= hi; j++) {
            ocupados.add(pontos[j].valor);
          }
        }
      });
      return ocupados;
    }

    function _getPontosLista() {
      var pontos = [];
      if (_enrichedTrip && _enrichedTrip.length > 0) {
        var vistos = {};
        _enrichedTrip.forEach(function(p) {
          var nome = (p.ponto || '').trim();
          if (nome && !vistos[nome]) {
            vistos[nome] = true;
            pontos.push({ valor: (p.codigo || nome), label: nome });
          }
        });
      } else if (_esquemaPontos && _esquemaPontos.length > 0) {
        _esquemaPontos.forEach(function(p) {
          pontos.push({ valor: p.id_ponto, label: p.nome_ponto || p.id_ponto });
        });
      }
      return pontos;
    }

    function _popularDropdownsPontos(pontos) {
      var ids = [
        "motoristaInicio",
        "motoristaFim",
        "relPontoA",
        "relPontoB",
        "relPontoAModal",
        "relPontoBModal",
        "sidebarPontoInicio",
        "sidebarPontoFim",
        "modoPontoA",
        "modoPontoB",
      ];
      ids.forEach(function (id) {
        var sel = document.getElementById(id);
        if (!sel) return;
        sel.innerHTML = '<option value="">— Selecione —</option>';
        pontos.forEach(function (p) {
          var opt = document.createElement("option");
          opt.value = p.id_ponto;
          opt.textContent = p.nome_ponto || p.id_ponto;
          sel.appendChild(opt);
        });
      });
    }

    // ============================================================
    //  CÁLCULO DE COMPARAÇÃO
    // ============================================================

    function _calcularComparacao() {
      if (!_esquemaPontos.length || !_enrichedTrip.length) {
        _comparacao = null;
        return;
      }

      var realizadosSet = new Set(
        _enrichedTrip
          .filter(function (p) {
            return p.matched && p.codigo;
          })
          .map(function (p) {
            return String(p.codigo);
          }),
      );

      _comparacao = _esquemaPontos.map(function (ep) {
        var chave = String(ep.id_ponto);
        var visitado = realizadosSet.has(chave);
        var pontoReal = visitado
          ? _enrichedTrip.find(function (p) {
              return p.matched && String(p.codigo) === chave;
            }) || null
          : null;
        return Object.assign({}, ep, {
          visitado: visitado,
          ponto_realizado: pontoReal,
          status: visitado ? "Realizado" : "Não visitado",
        });
      });

      // Re-renderiza tabela e mapa
      if (_analysis) {
        AnalysisModule.renderPontosTable(_enrichedTrip, _comparacao);
      }

      _agendarMapa(_enrichedTrip, _comparacao, _locaisCache);

      // Atualiza contadores na seção resumo
      AnalysisModule.atualizarContadoresComparacao(_comparacao);

      // Habilita botões de ação no header
      var btnVincular = document.getElementById("btnVincularMotorista");
      var btnRel = document.getElementById("btnRelatorio");
      if (btnVincular) btnVincular.disabled = false;
      if (btnRel) btnRel.disabled = false;

      // Gera alertas de pontos não visitados + paradas não autorizadas (fora do esquema)
      if (_analysis && _analysis.alerts) {
        var alertsFiltrados = _analysis.alerts.filter(function (a) {
          return a.tipo !== "PONTO_NAO_VISITADO" && a.tipo !== "PARADA_PROIBIDA";
        });

        // Pontos não visitados
        _comparacao.forEach(function (c) {
          if (!c.visitado) {
            alertsFiltrados.push({
              tipo: "PONTO_NAO_VISITADO",
              descricao: 'Ponto "' + c.nome_ponto + '" (ID: ' + c.id_ponto + ") não foi visitado nesta viagem",
              nivel: "nao-visitado",
              trecho: c.nome_ponto,
            });
          }
        });

        // Paradas não autorizadas: ponto com parada, identificado na base,
        // mas FORA do esquema da linha
        var codigosEsquema = new Set(
          _esquemaPontos.map(function(ep) { return String(ep.id_ponto); })
        );
        var TOLERANCIA_NAO_AUT_S = 5 * 60;
        _enrichedTrip.forEach(function(pt) {
          if (!pt.matched || !pt.parada_s || pt.parada_s <= TOLERANCIA_NAO_AUT_S) return;
          if (pt.codigo && codigosEsquema.has(String(pt.codigo))) return; // está no esquema
          alertsFiltrados.push({
            tipo: "PARADA_PROIBIDA",
            descricao: 'Parada de ' + Math.round(pt.parada_s / 60) + ' min em local não autorizado: "' + pt.ponto + '"',
            nivel: "critico",
            seq: pt.seq,
            trecho: pt.ponto
          });
        });

        _analysis.alerts = alertsFiltrados;
        AnalysisModule.renderAlertas(_analysis.alerts);
      }

      var naoVisitados = _comparacao.filter(function (c) {
        return !c.visitado;
      }).length;
      UIModule.showToast(
        "Comparação: " +
          (_comparacao.length - naoVisitados) +
          " visitados, " +
          naoVisitados +
          " não visitados.",
        naoVisitados > 0 ? "warning" : "success",
        5000,
      );
    }

    // ============================================================
    //  DETECÇÃO DE PARADAS EM LOCAIS PROIBIDOS (TIPO 42)
    // ============================================================

    function _haversineM(lat1, lng1, lat2, lng2) {
      var R = 6371000;
      var toRad = function(d) { return d * Math.PI / 180; };
      var dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
      var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
              Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    /**
     * Detecta paradas em locais proibidos (tipo 42) por proximidade de coordenadas.
     * Marca pt.proibido42 = true e injeta alertas PARADA_PROIBIDA em _analysis.alerts.
     */
    function _detectarParadasProibidas() {
      if (!_locaisCache.length || !_enrichedTrip.length || !_analysis) return;

      var locais42 = _locaisCache.filter(function(l) {
        return String(l.tipo || '').trim() === '42';
      });
      if (!locais42.length) return;

      var MIN_PARADA_S   = 60;  // 1 min mínimo para considerar parada real
      var RAIO_PADRAO_M  = 100; // 100m se raio não definido no cadastro

      _enrichedTrip.forEach(function(pt) {
        if (pt.proibido42) return;                      // já detectado
        if (!pt.parada_s || pt.parada_s < MIN_PARADA_S) return;
        if (!pt.lat || !pt.lng) return;                 // sem coordenadas

        for (var i = 0; i < locais42.length; i++) {
          var l = locais42[i];
          if (!l.lat || !l.lng) continue;
          var raioM = l.raio > 0 ? l.raio : RAIO_PADRAO_M;
          var distM = _haversineM(pt.lat, pt.lng, l.lat, l.lng);
          if (distM <= raioM) {
            pt.proibido42    = true;
            pt.nomeProibido42 = l.descricao || l.descResumida || l.codigo || pt.ponto;
            break;
          }
        }
      });

      // Injeta / atualiza alertas PARADA_PROIBIDA (remove os antigos primeiro)
      var outros = (_analysis.alerts || []).filter(function(a) { return a.tipo !== 'PARADA_PROIBIDA'; });
      _enrichedTrip.forEach(function(pt) {
        if (!pt.proibido42) return;
        var paradaMin = Math.round(pt.parada_s / 60);
        outros.push({
          tipo:      'PARADA_PROIBIDA',
          descricao: 'Parada de ' + paradaMin + ' min em local proibido: "' + (pt.nomeProibido42 || pt.ponto) + '"',
          nivel:     'critico',
          seq:       pt.seq,
          trecho:    pt.nomeProibido42 || pt.ponto
        });
      });
      _analysis.alerts = outros;
    }

    //  FLUXO: UPLOAD → PROCESSAR → ANALISAR → RENDERIZAR
    // ============================================================

    function _onFileLoaded(csvText) {
      UIModule.showToast(
        'Arquivo carregado. Clique em "Processar Viagem".',
        "info",
      );
    }

    function _processarViagem() {
      var csvText = UIModule.getCsvText();
      if (!csvText) {
        UIModule.showToast("Nenhum arquivo selecionado.", "error");
        return;
      }

      var selEsquema = document.getElementById("selectEsquema");
      if (!selEsquema || !selEsquema.value) {
        UIModule.showToast("Selecione o esquema da viagem antes de processar.", "error");
        return;
      }

      UIModule.showLoading("Processando relatório de viagem...");

      google.script.run
        .withSuccessHandler(_onReportProcessed)
        .withFailureHandler(_onError)
        .processReport(csvText);
    }

    function _onReportProcessed(enrichedTrip) {
      if (!enrichedTrip || enrichedTrip.length === 0) {
        UIModule.hideLoading();
        UIModule.showToast(
          "Nenhum ponto válido encontrado no relatório.",
          "error",
        );
        return;
      }

      _enrichedTrip = enrichedTrip;
      UIModule.showLoading("Calculando velocidades e alertas...");

      google.script.run
        .withSuccessHandler(_onTripAnalyzed)
        .withFailureHandler(_onError)
        .analyzeTrip(enrichedTrip);
    }

    function _onTripAnalyzed(analysisResult) {
      UIModule.hideLoading();

      if (!analysisResult) {
        UIModule.showToast("Erro ao analisar a viagem.", "error");
        return;
      }

      // Revela a UI completa (remove modo upload-only — mostra header-center, etc.)
      var wrapper = document.querySelector('.app-wrapper');
      if (wrapper) wrapper.classList.remove('app--upload-only');

      // Oculta o card de upload após processar
      var secConfig = document.getElementById('sectionConfig');
      if (secConfig) {
        secConfig.style.transition = 'opacity 0.3s';
        secConfig.style.opacity = '0';
        setTimeout(function() {
          secConfig.style.display = 'none';
          secConfig.style.opacity = '';
          secConfig.style.transition = '';
        }, 300);
      }

      _analysis = analysisResult;
      _tripReady = true;

      var segments = analysisResult.segments;
      var alerts = analysisResult.alerts;
      var summary = analysisResult.summary;

      // Renderiza resumo (mostra sectionResumo e sectionAnalise)
      AnalysisModule.renderSummary(summary);

      // Detecção de locais proibidos (tipo 42) — marca pt.proibido42 antes de renderizar
      _detectarParadasProibidas();

      // Tabela de pontos
      if (_esquemaPontos.length > 0) {
        _calcularComparacao();
      } else {
        AnalysisModule.renderPontosTable(_enrichedTrip);

        // Contadores de realizados/não visitados quando sem esquema
        var matchados = _enrichedTrip.filter(function (p) {
          return p.matched;
        }).length;
        var naoMatch = _enrichedTrip.length - matchados;
        var elRealizados = document.getElementById("sumRealizados");
        if (elRealizados) {
          elRealizados.textContent = matchados;
          elRealizados.className = "sum-value verde";
        }
        var elNao = document.getElementById("sumNaoVisitados");
        if (elNao) {
          elNao.textContent = naoMatch;
          elNao.className = "sum-value" + (naoMatch > 0 ? " amarelo" : "");
        }
        var elPlan = document.getElementById("sumPlanejados");
        if (elPlan) elPlan.textContent = _enrichedTrip.length;
      }

      // Tabela de velocidade (legado — mantida)
      AnalysisModule.renderVelocidadeTable(segments);

      // Alertas
      AnalysisModule.renderAlertas(alerts);

      // Exibe e habilita botões no header (Relatório e Motorista)
      var btnVincular = document.getElementById("btnVincularMotorista");
      var btnRel = document.getElementById("btnRelatorio");
      if (btnVincular) { btnVincular.style.display = ''; btnVincular.disabled = false; }
      if (btnRel) { btnRel.style.display = ''; btnRel.disabled = false; }

      // Exibe barra de modo de visualização
      var secModo = document.getElementById('sectionModoVisualizacao');
      if (secModo) secModo.style.display = '';

      _agendarMapa(_enrichedTrip, _comparacao, _locaisCache);

      var totalPontos = _enrichedTrip.length;
      var pontosNaoId = _enrichedTrip.filter(function (p) {
        return !p.matched;
      }).length;
      var naoIdMsg =
        pontosNaoId > 0
          ? " (" +
            pontosNaoId +
            " não identificado" +
            (pontosNaoId > 1 ? "s" : "") +
            ")"
          : "";

      UIModule.showToast(
        totalPontos +
          " pontos processados" +
          naoIdMsg +
          ". " +
          alerts.length +
          " alerta" +
          (alerts.length !== 1 ? "s" : "") +
          ".",
        alerts.length > 0 ? "warning" : "success",
        5000,
      );

      // Atualiza preview de relatório com dados recém-processados
      _atualizarPreviewRelatorio();

      // Tenta auto-vínculo de motorista pelo nome do CSV
      _tentarAutoVinculo();

      // Rola para o mapa após a transição de ocultar o upload
      setTimeout(function () {
        var secMapa = document.getElementById("sectionMapa");
        if (secMapa)
          secMapa.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 450);
    }

    function _initSidebarMotorista() {
      var btnEdit = document.getElementById("btnEditDriver");
      var displayEl = document.getElementById("motoristaDisplay");
      var formInline = document.getElementById("motoristaFormInline");
      var inputMat = document.getElementById("sidebarMatricula");
      var inputNome = document.getElementById("sidebarNomeMotorista");
      var nomeResult = document.getElementById("sidebarNomeResult");
      var btnBuscar = document.getElementById("btnSidebarBuscar");
      var btnConfirmar = document.getElementById("btnSidebarConfirmar");
      var btnCancelar = document.getElementById("btnSidebarCancelar");

      if (!btnEdit) return;

      btnEdit.addEventListener("click", function () {
        var currentName =
          (document.getElementById("driverName") || {}).textContent || "";
        if (inputNome)
          inputNome.value = currentName === "Não Informado" ? "" : currentName;
        if (inputMat) inputMat.value = "";
        if (nomeResult) {
          nomeResult.textContent = "";
          nomeResult.style.color = "";
        }

        if (_vinculos.length > 0) {
          var ultimo = _vinculos[_vinculos.length - 1];
          var selIni = document.getElementById("sidebarPontoInicio");
          var selFim = document.getElementById("sidebarPontoFim");
          if (selIni && ultimo.ponto_inicio) selIni.value = ultimo.ponto_inicio;
          if (selFim && ultimo.ponto_fim) selFim.value = ultimo.ponto_fim;
        }

        var trechoSection = document.getElementById("sidebarTrechoSection");
        if (trechoSection) {
          var temPontos = _esquemaPontos.length > 0 || _enrichedTrip.length > 0;
          trechoSection.style.display = temPontos ? "block" : "none";
          // Popula selects do trecho com pontos do enrichedTrip quando não há esquema
          if (_esquemaPontos.length === 0 && _enrichedTrip.length > 0) {
            _popularSidebarTrechoDeEnrichedTrip();
          }
        }

        if (displayEl) displayEl.style.display = "none";
        if (formInline) formInline.style.display = "block";
        if (inputMat)
          setTimeout(function () {
            inputMat.focus();
          }, 50);
      });

      if (btnCancelar) {
        btnCancelar.addEventListener("click", function () {
          if (displayEl) displayEl.style.display = "block";
          if (formInline) formInline.style.display = "none";
        });
      }

      function _buscar() {
        var mat = inputMat ? inputMat.value.trim() : "";
        if (!mat) {
          UIModule.showToast("Informe a matrícula.", "error");
          return;
        }
        var found = _motoristas.find(function (m) {
          return String(m.matricula).trim() === mat;
        });
        if (found) {
          if (inputNome) inputNome.value = found.nome;
          if (nomeResult) {
            nomeResult.textContent =
              found.nome + (found.base ? " · " + found.base : "");
            nomeResult.style.color = "var(--verde)";
          }
        } else {
          if (nomeResult) {
            nomeResult.textContent = "Matrícula não encontrada.";
            nomeResult.style.color = "var(--vermelho)";
          }
        }
      }

      if (btnBuscar) btnBuscar.addEventListener("click", _buscar);
      if (inputMat) {
        inputMat.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            _buscar();
          }
        });
      }

      if (btnConfirmar) {
        btnConfirmar.addEventListener("click", function () {
          var nome = inputNome ? inputNome.value.trim() : "";
          var mat = inputMat ? inputMat.value.trim() : "";

          if (!nome) {
            UIModule.showToast("Informe o nome do motorista.", "error");
            return;
          }

          if (_analysis && _analysis.summary) {
            _analysis.summary.motorista = nome;
          }

          var driverNameEl = document.getElementById("driverName");
          if (driverNameEl) {
            driverNameEl.textContent = nome;
            driverNameEl.className = "driver-name";
          }

          var trechoSection = document.getElementById("sidebarTrechoSection");
          var trechoAtivo =
            trechoSection && trechoSection.style.display !== "none";
          var selIni = document.getElementById("sidebarPontoInicio");
          var selFim = document.getElementById("sidebarPontoFim");
          var inicio = selIni ? selIni.value : "";
          var fim = selFim ? selFim.value : "";
          var trechoSumEl = document.getElementById("trechoSummary");

          if (trechoAtivo && inicio && fim) {
            var existIdx = mat
              ? _vinculos.findIndex(function (v) {
                  return v.matricula === mat;
                })
              : -1;
            var vinculo = {
              matricula: mat || "—",
              nome: nome,
              ponto_inicio: inicio,
              ponto_fim: fim,
            };
            if (existIdx >= 0) {
              _vinculos[existIdx] = vinculo;
            } else {
              _vinculos.push(vinculo);
            }

            _populaSelectMotoristaRelatorio();
            _renderVinculadosList();

            var inicioNome = _nomePontoPorId(inicio);
            var fimNome = _nomePontoPorId(fim);
            if (trechoSumEl) {
              trechoSumEl.innerHTML =
                '<span style="color:var(--laranja);">▸</span> ' +
                _escHtml(inicioNome) +
                ' <span style="color:var(--text3); margin:0 3px;">→</span> ' +
                _escHtml(fimNome);
              trechoSumEl.style.display = "block";
            }

            UIModule.showToast(
              '"' + nome + '" · ' + inicioNome + " → " + fimNome,
              "success",
              4000,
            );
          } else {
            if (trechoSumEl) trechoSumEl.style.display = "none";
            UIModule.showToast("Motorista definido: " + nome, "success", 3000);
          }

          if (displayEl) displayEl.style.display = "block";
          if (formInline) formInline.style.display = "none";
        });
      }

      if (inputNome) {
        inputNome.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            if (btnConfirmar) btnConfirmar.click();
          }
        });
      }
    }

        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#22a96a;margin-bottom:10px;">Cadastrar motorista · iButton: <em style="font-style:normal;color:var(--text2);">"' + _escHtml(d.nomeCsv) + '"</em></div>' +
        '<div style="display:flex;gap:6px;margin-bottom:8px;">' +
          '<div style="flex:1;">' +
            '<div style="font-size:10px;color:var(--text3);margin-bottom:3px;">Matrícula (opcional)</div>' +
            '<input id="mCard_mat_' + idx + '" type="text" value="" placeholder="Ex: 12345" style="' + inputStyle + '" />' +
          '</div>' +
          '<div style="flex:2;">' +
            '<div style="font-size:10px;color:var(--text3);margin-bottom:3px;">Nome *</div>' +
            '<input id="mCard_nomeInput_' + idx + '" type="text" value="' + _escHtml(d.nomeCsv) + '" placeholder="Nome do motorista" style="' + inputStyle + '" />' +
          '</div>' +
        '</div>' +
        '<div style="font-size:10px;color:var(--text3);margin-bottom:4px;">Trecho</div>' +
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">' +
          '<div style="flex:1;min-width:0;"><select id="mCard_ini_' + idx + '" style="' + selStyle + '"></select></div>' +
          '<span style="flex-shrink:0;color:var(--text3);font-weight:600;">→</span>' +
          '<div style="flex:1;min-width:0;"><select id="mCard_fim_' + idx + '" style="' + selStyle + '"></select></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;">' +
          '<button onclick="AppModule._cadastrarConfirmarCard(' + idx + ')" style="padding:5px 14px;border-radius:6px;background:#22a96a;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">💾 Cadastrar e Confirmar</button>' +
          '<button onclick="AppModule._toggleCadastroCard(' + idx + ')" style="padding:5px 12px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text3);font-size:12px;cursor:pointer;">Cancelar</button>' +
        '</div>' +
      '</div>';

    function _toggleCadastroCard(idx) {
      var d = _autoVinculoDataList[idx];
      if (!d) return;
      d.cadastrando = !d.cadastrando;
      d.editando    = false;
      _renderDetectadosList();
    }

    function _cadastrarConfirmarCard(idx) {
      var d = _autoVinculoDataList[idx];
      if (!d) return;

      var matInput  = document.getElementById('mCard_mat_' + idx);
      var nomeInput = document.getElementById('mCard_nomeInput_' + idx);
      var selIni    = document.getElementById('mCard_ini_' + idx);
      var selFim    = document.getElementById('mCard_fim_' + idx);

      var mat    = matInput  ? matInput.value.trim()  : '';
      var nome   = nomeInput ? nomeInput.value.trim() : '';
      var inicio = selIni    ? selIni.value           : '';
      var fim    = selFim    ? selFim.value            : '';

      if (!nome) { UIModule.showToast('Informe o nome do motorista.', 'error'); return; }
      if (!inicio || !fim) { UIModule.showToast('Selecione o ponto inicial e final.', 'error'); return; }

      if (mat) {
        var dup = _vinculos.find(function(v) { return v.matricula && v.matricula === mat; });
        if (dup) { UIModule.showToast('Este motorista já está vinculado.', 'warning'); return; }
      }

      // Confirma vínculo imediatamente (otimista)
      _vinculos.push({ matricula: mat, nome: nome, nomeCsv: d.nomeCsv, ponto_inicio: inicio, ponto_fim: fim, seqMin: d.seqMin != null ? d.seqMin : null, seqMax: d.seqMax != null ? d.seqMax : null });
      _autoVinculoDataList.splice(idx, 1);
      _populaSelectMotoristaRelatorio();
      _atualizarPreviewRelatorio();
      _renderModalMotorista();
      UIModule.showToast('Motorista "' + nome + '" vinculado.', 'success', 3000);

      // Salva na planilha em background (falha não bloqueia)
      google.script.run
        .withSuccessHandler(function(saved) {
          _motoristas.push({ matricula: saved.matricula || mat, nome: saved.nome || nome, base: saved.base || '' });
          UIModule.showToast('"' + (saved.nome || nome) + '" cadastrado na base de motoristas.', 'info', 3000);
        })
        .withFailureHandler(function(err) {
          console.warn('[App] Erro ao salvar motorista na planilha:', err);
          UIModule.showToast('Vinculado localmente, mas falha ao salvar na planilha.', 'warning');
        })
        .salvarMotorista({ matricula: mat, nome: nome, base: '', ibutton: d.nomeCsv || '' });
    }

    function _popularSelectsCard(idx) {
      var d = _autoVinculoDataList[idx];
      if (!d) return;
      var pontos = _getPontosLista();
      var optsBase = '<option value="">— Selecione —</option>' +
        pontos.map(function(p) {
          return '<option value="' + _escHtml(p.valor) + '">' + _escHtml(p.label) + '</option>';
        }).join('');

      var selIni = document.getElementById('mCard_ini_' + idx);
      var selFim = document.getElementById('mCard_fim_' + idx);
      if (selIni) { selIni.innerHTML = optsBase; _preencherSelectTrecho(selIni, d.pontoInicio); }
      if (selFim) { selFim.innerHTML = optsBase; _preencherSelectTrecho(selFim, d.pontoFim || d.pontoInicio); }
    }

    function _toggleEditCard(idx) {
      var d = _autoVinculoDataList[idx];
      if (!d) return;
      if (!d.editando) {
        d.editMat  = d.motorista ? String(d.motorista.matricula || '') : '';
        d.editNome = d.motorista ? d.motorista.nome : '';
      }
      d.editando = !d.editando;
      _renderDetectadosList();
    }

    function _buscarMotoristaCard(idx) {
      var matInput = document.getElementById('mCard_mat_' + idx);
      var nomeDisp = document.getElementById('mCard_nome_' + idx);
      var d = _autoVinculoDataList[idx];
      if (!matInput || !d) return;

      var mat = matInput.value.trim();
      var encontrado = mat ? _motoristas.find(function(m) { return String(m.matricula).trim() === mat; }) : null;

      d.editMat  = mat;
      d.editNome = encontrado ? encontrado.nome : '';

      if (nomeDisp) {
        if (encontrado) {
          nomeDisp.textContent = encontrado.nome + (encontrado.base ? ' · ' + encontrado.base : '');
          nomeDisp.style.color = 'var(--verde)';
        } else {
          nomeDisp.textContent = mat ? 'Matrícula não encontrada' : '—';
          nomeDisp.style.color = mat ? 'var(--vermelho)' : 'var(--text3)';
        }
      }
    }

    function _confirmarCard(idx) {
      var d = _autoVinculoDataList[idx];
      if (!d) return;

      var mat, nome, inicio, fim;

      if (d.editando) {
        var matInput = document.getElementById('mCard_mat_' + idx);
        var nomeDisp = document.getElementById('mCard_nome_' + idx);
        var selIni   = document.getElementById('mCard_ini_' + idx);
        var selFim   = document.getElementById('mCard_fim_' + idx);
        mat    = matInput ? matInput.value.trim() : '';
        nome   = (nomeDisp && nomeDisp.style.color !== 'var(--vermelho)') ? nomeDisp.textContent.trim() : '';
        inicio = selIni ? selIni.value : '';
        fim    = selFim ? selFim.value : '';
        if (!inicio || !fim) { UIModule.showToast('Selecione o ponto inicial e final.', 'error'); return; }
        if (!nome && mat) {
          var m = _motoristas.find(function(x) { return String(x.matricula).trim() === mat; });
          nome = m ? m.nome : '(não cadastrado)';
        }
        if (!nome || nome === '—') nome = d.nomeCsv;
      } else {
        if (!d.pontoInicio) { UIModule.showToast('Trecho não detectado. Clique em Editar.', 'warning'); return; }
        mat    = d.motorista ? String(d.motorista.matricula || '') : '';
        nome   = d.motorista ? d.motorista.nome : d.nomeCsv;
        inicio = d.pontoInicio;
        fim    = d.pontoFim || d.pontoInicio;
      }

      if (mat) {
        var dup = _vinculos.find(function(v) { return v.matricula && v.matricula === mat; });
        if (dup) { UIModule.showToast('Este motorista já está vinculado.', 'warning'); return; }
      }

      _vinculos.push({ matricula: mat, nome: nome || d.nomeCsv, nomeCsv: d.nomeCsv, ponto_inicio: inicio, ponto_fim: fim, seqMin: d.seqMin != null ? d.seqMin : null, seqMax: d.seqMax != null ? d.seqMax : null });
      _autoVinculoDataList.splice(idx, 1);
      _populaSelectMotoristaRelatorio();
      _atualizarPreviewRelatorio();
      UIModule.showToast('Motorista "' + (nome || d.nomeCsv) + '" vinculado.', 'success', 3000);
      _renderModalMotorista();

      // Salva o iButton na planilha para reconhecimento automático nas próximas sessões
      if (d.nomeCsv && d.motorista && !d.motorista.ibutton) {
        google.script.run
          .atualizarIbuttonMotorista(mat, nome || d.nomeCsv, d.nomeCsv);
        d.motorista.ibutton = d.nomeCsv;
      }
    }

    function _descartarCard(idx) {
      _autoVinculoDataList.splice(idx, 1);
      _renderDetectadosList();
      _renderIbuttonAviso();
    }

    function _renderVinculadosList() {
      var container   = document.getElementById('motoristaVinculadosList');
      var listaInline = document.getElementById('listaVinculosInline');

      html += _vinculos.map(function(v, i) {
        var inicioNome = _nomePontoPorId(v.ponto_inicio);
        var fimNome    = _nomePontoPorId(v.ponto_fim);
        var csvLabel   = (v.nomeCsv && v.nomeCsv !== v.nome)
          ? '<div style="font-size:10px;color:var(--text3);margin-top:1px;">iButton: "' + _escHtml(v.nomeCsv) + '"</div>'
          : '';
        return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg);">' +
          '<div style="flex:1;">' +
            '<div style="font-size:13px;font-weight:700;color:var(--text);">' + _escHtml(v.nome) +
              (v.matricula ? '<span style="font-weight:400;color:var(--text3);font-size:11px;"> · mat. ' + _escHtml(v.matricula) + '</span>' : '') +
            '</div>' +
            csvLabel +
            '<div style="font-size:11px;color:var(--laranja);margin-top:4px;">' + _escHtml(inicioNome) + ' → ' + _escHtml(fimNome) + '</div>' +
          '</div>' +
          '<button onclick="AppModule._removerVinculo(' + i + ')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0;line-height:1;" title="Remover">✕</button>' +
        '</div>';
      }).join('');

      if (container) container.innerHTML = html;

      if (listaInline) {
        listaInline.innerHTML = _vinculos.map(function(v) {
          var ini = _nomePontoPorId(v.ponto_inicio);
          var fim = _nomePontoPorId(v.ponto_fim);
          return '<div style="font-size:11px;color:var(--text2);padding:3px 0;display:flex;align-items:center;gap:4px;">' +
            '<span style="width:6px;height:6px;border-radius:50%;background:var(--laranja);flex-shrink:0;"></span>' +
            '<span style="font-weight:600;">' + _escHtml(v.nome) + '</span>' +
            '<span style="color:var(--text3);font-size:10px;">' + _escHtml(ini) + ' → ' + _escHtml(fim) + '</span>' +
            '</div>';
        }).join('');
        listaInline.style.display = 'block';
      }
    }

    function _removerVinculo(idx) {
      _vinculos.splice(idx, 1);
      _populaSelectMotoristaRelatorio();
      _atualizarPreviewRelatorio();
      var modal = document.getElementById('modalMotorista');
      if (modal && modal.classList.contains('open')) {
        _renderModalMotorista();
      } else {
        _renderVinculadosList();
      }
    }

      var html =

        '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;">' +
        '<div style="display:flex;gap:6px;margin-bottom:8px;">' +

      var nomeInput = document.getElementById('mManual_nome');

    function _confirmarManual() {
      var matInput  = document.getElementById('mManual_mat');
      var nomeInput = document.getElementById('mManual_nome');
      var selIni    = document.getElementById('mManual_ini');
      var selFim    = document.getElementById('mManual_fim');
      var mat    = matInput  ? matInput.value.trim()  : '';
      var nome   = nomeInput ? nomeInput.value.trim() : '';
      var inicio = selIni    ? selIni.value           : '';
      var fim    = selFim    ? selFim.value           : '';
      if (!nome)           { UIModule.showToast('Informe o nome do motorista.', 'error'); return; }
      if (!inicio || !fim) { UIModule.showToast('Selecione o ponto inicial e final.', 'error'); return; }
      var dup = mat ? _vinculos.find(function(v) { return v.matricula === mat; }) : null;
      if (dup) { UIModule.showToast('Este motorista já está vinculado.', 'warning'); return; }

      _atualizarPreviewRelatorio();

      _renderModalMotorista();

    function _nomePontoPorId(idPonto) {
      var p = _esquemaPontos.find(function (ep) {
        return ep.id_ponto === idPonto;
      });
      return p ? p.nome_ponto : idPonto;
    }

    // ============================================================
    //  MODAL DE RELATÓRIO
    // ============================================================

    function _initModalRelatorio() {
      var overlay = document.getElementById("modalRelatorio");
      var btnOpen = document.getElementById("btnRelatorio");
      var btnClose = document.getElementById("btnCloseRelatorioModal");
      var btnCancel = document.getElementById("btnCancelRelatorioModal");
      var btnConfirm = document.getElementById("btnConfirmRelatorioModal");

      if (!overlay) return;

      var open = function () {
        overlay.classList.add("open");
      };
      var close = function () {
        overlay.classList.remove("open");
      };

      if (btnOpen) btnOpen.addEventListener("click", open);
      if (btnClose) btnClose.addEventListener("click", close);
      if (btnCancel) btnCancel.addEventListener("click", close);
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) close();
      });

      // Toggle tipo de relatório no modal
      document
        .querySelectorAll('input[name="tipoRelatorioModal"]')
        .forEach(function (radio) {
          radio.addEventListener("change", function () {
            var val = radio.value;
            var motFields = document.getElementById("relMotoristaFields");
            var trcFields = document.getElementById("relTrechoFields");
            var cmpFields = document.getElementById("relCompletoFields");
            if (motFields) motFields.style.display = val === "MOTORISTA" ? "block" : "none";
            if (trcFields) trcFields.style.display = val === "TRECHO"    ? "block" : "none";
            if (cmpFields) cmpFields.style.display = val === "COMPLETO"  ? "block" : "none";
          });
        });

      if (btnConfirm) {
        btnConfirm.addEventListener("click", _onConfirmRelatorio);
      }
    }

    function _populaSelectMotoristaRelatorio() {
      // Modal de relatório
      var selModal = document.getElementById("relSelectMotoristaModal");
      if (selModal) {
        selModal.innerHTML = '<option value="">— Selecione —</option>';
        _vinculos.forEach(function (v, i) {
          var opt = document.createElement("option");
          opt.value = i;
          opt.textContent = v.nome + " (" + v.matricula + ")";
          selModal.appendChild(opt);
        });
      }

      // Select inline na seção de config (oculto)
      var selInline = document.getElementById("relSelectMotorista");
      if (selInline) {
        selInline.innerHTML = '<option value="">— Selecione —</option>';
        _vinculos.forEach(function (v, i) {
          var opt = document.createElement("option");
          opt.value = i;
          opt.textContent = v.nome + " (" + v.matricula + ")";
          selInline.appendChild(opt);
        });
      }

      // Select da barra de modo de visualização
      var selModo = document.getElementById("modoSelectMotorista");
      if (selModo) {
        var prevVal = selModo.value;
        selModo.innerHTML = '<option value="">— Selecione motorista —</option>';
        _vinculos.forEach(function (v, i) {
          var opt = document.createElement("option");
          opt.value = i;
          opt.textContent = v.nome + (v.matricula ? " (" + v.matricula + ")" : "");
          selModo.appendChild(opt);
        });
        // Restaura seleção anterior se ainda válida
        if (prevVal !== '' && _vinculos[parseInt(prevVal, 10)]) selModo.value = prevVal;
      }

      // Auto-seleciona o único motorista em todos os selects de relatório
      if (_vinculos.length === 1) {
        if (selModal) selModal.value = '0';
        if (selInline) selInline.value = '0';
      }
    }

    function _onConfirmRelatorio() {
      var tipoEl = document.querySelector('input[name="tipoRelatorioModal"]:checked');
      var tipo = tipoEl ? tipoEl.value : "COMPLETO";
      var gerarParadas = !!(document.getElementById('chkParadasIrregulares') &&
                            document.getElementById('chkParadasIrregulares').checked);

      var selEsquema = document.getElementById("selectEsquema");
      var idEsquema = selEsquema ? selEsquema.value : "";
      var esqObj = _esquemas.find(function (e) { return e.id_esquema === idEsquema; });
      var nomeLinha = esqObj ? esqObj.nome_linha : "";

      var params = {
        tipo: tipo,
        enviarAPI: true,
        idEsquema: idEsquema,
        nomeLinha: nomeLinha,
        horario: esqObj ? (esqObj.horario || '') : '',
        enrichedTrip: _enrichedTrip,
        esquemaPontos: _esquemaPontos,
        segments: _analysis ? _analysis.segments : [],
        summary:  _analysis ? _analysis.summary  : {},
      };

      if (tipo === "MOTORISTA") {
        var selMot = document.getElementById("relSelectMotoristaModal");
        var idx = selMot ? parseInt(selMot.value, 10) : -1;
        if (isNaN(idx) || idx < 0 || !_vinculos[idx]) {
          UIModule.showToast("Selecione um motorista vinculado.", "error");
          return;
        }
        params.motorista = _vinculos[idx];
      } else if (tipo === "TRECHO") {
        var pontoA = document.getElementById("relPontoAModal") ? document.getElementById("relPontoAModal").value : "";
        var pontoB = document.getElementById("relPontoBModal") ? document.getElementById("relPontoBModal").value : "";
        if (!pontoA || !pontoB) {
          UIModule.showToast("Selecione os pontos A e B do trecho.", "error");
          return;
        }
        params.idPontoA = pontoA;
        params.idPontoB = pontoB;
      }

      // ── Estado de carregamento no botão ───────────────────────
      var btnConfirm = document.getElementById('btnConfirmRelatorioModal');
      var btnCancel  = document.getElementById('btnCancelRelatorioModal');
      var _setBusy = function(busy) {
        if (btnConfirm) {
          btnConfirm.disabled = busy;
          btnConfirm.innerHTML = busy
            ? '<span class="btn-spin"></span> Gerando...'
            : '📋 Gerar';
        }
        if (btnCancel) btnCancel.disabled = busy;
      };

      _setBusy(true);
      UIModule.showLoading("Capturando mapa e gerando relatório...");

      _gerarComCaptura(params,
        function (result) {
          UIModule.hideLoading();
          _setBusy(false);

    /**
     * Lança enviarParadasFora em background e gerencia o card de progresso.
     */
    function _launchParadasFora(params) {
      // Conta previamente quantas paradas fora existem para exibir no card
      var esquemaIdSet = {};
      (params.esquemaPontos || []).forEach(function(ep) {
        if (ep.id_ponto) esquemaIdSet[String(ep.id_ponto).trim()] = true;
      });
      var enriched = params.enrichedTrip || [];
      var lastIdx  = enriched.length - 1;
      var count = 0;
      enriched.forEach(function(pt, idx) {
        if (idx === 0 || idx === lastIdx) return;
        if (!pt.matched || !pt.parada_s || pt.parada_s <= 0) return;
        if (pt.codigo && esquemaIdSet[String(pt.codigo).trim()]) return;
        if (!pt.proibido42) return;
        count++;
      });

      if (count === 0) {
        UIModule.showToast("Nenhuma parada irregular detectada.", "info", 3000);
        return;
      }

      _showBgProgress('Criando ' + count + ' ocorrência' + (count > 1 ? 's' : '') + ' de parada irregular…');

      var semEsquema = !(params.esquemaPontos && params.esquemaPontos.length > 0);

      google.script.run
        .withSuccessHandler(function(results) {
          var ok  = (results || []).filter(function(r) { return r.status === 'ok'; }).length;
          var err = (results || []).length - ok;
          var esquemaPdfErro = !semEsquema && (results || []).some(function(r) {
            return r.status === 'ok' && r.esquemaPdfStatus === 'error';
          });
          var esquemaInfo = semEsquema
            ? ' · ⚠ Sem esquema'
            : esquemaPdfErro
              ? ' · Esquema: erro'
              : ' · Esquema anexado';
          if (err === 0) {
            _updateBgProgress('success', '✓ ' + ok + ' ocorrência' + (ok !== 1 ? 's' : '') + ' criada' + (ok !== 1 ? 's' : '') + esquemaInfo);
          } else {
            _updateBgProgress('warning', ok + ' criada' + (ok !== 1 ? 's' : '') + ', ' + err + ' com erro' + esquemaInfo);
          }
        })
        .withFailureHandler(function(e) {
          var msg = e && e.message ? e.message : String(e);
          _updateBgProgress('error', 'Erro: ' + msg.slice(0, 80));
          console.error('[App] enviarParadasFora falhou:', e);
        })
        .enviarParadasFora(params);
    }

    /** Helper: retorna seq do primeiro ponto do _enrichedTrip com código ou nome == idPonto */
    function _seqPorPonto(idPonto) {
      if (!idPonto || !_enrichedTrip.length) return null;
      var key = String(idPonto).trim();
      var found = _enrichedTrip.find(function(p) {
        return String(p.codigo || '').trim() === key ||
               String(p.ponto  || '').trim() === key;
      });
      return found ? found.seq : null;
    }

    /** Filtra esquema ao intervalo entre dois pontos (por id_ponto ou nome_ponto). */
    function _filtrarEsquemaPorTrechoLocal(esquemaPontos, pontoA, pontoB) {
      if (!pontoA || !pontoB || !esquemaPontos.length) return esquemaPontos;
      var kA = String(pontoA).trim(), kB = String(pontoB).trim();
      var oA = null, oB = null;
      esquemaPontos.forEach(function(ep) {
        var id   = String(ep.id_ponto   || '').trim();
        var nome = String(ep.nome_ponto || '').trim();
        if (id === kA || nome === kA) oA = ep.ordem;
        if (id === kB || nome === kB) oB = ep.ordem;
      });
      if (oA === null || oB === null) return null;
      var lo = Math.min(oA, oB), hi = Math.max(oA, oB);
      return esquemaPontos.filter(function(ep) { return ep.ordem >= lo && ep.ordem <= hi; });
    }

    /**
     * Altera o modo de visualização ativo e re-aplica os filtros.

      _modoAtivo = modo;

      if (trcF) trcF.style.display = modo === 'TRECHO'    ? 'flex' : 'none';

      if (modo === 'MOTORISTA') {

        }
        var sel = document.getElementById('modoSelectMotorista');
        var idx = sel ? parseInt(sel.value, 10) : NaN;
        _motoristaAtivo = (!isNaN(idx) && _vinculos[idx]) ? _vinculos[idx] : null;

        _motoristaAtivo = null;
      }
