    /**
     * Aplica o filtro do modo ativo (COMPLETO/MOTORISTA/TRECHO) à visualização
     * na tela: mapa, tabela de pontos e alertas.
     */
    function _aplicarFiltroModo() {
      if (!_enrichedTrip.length || !_analysis) return;

      var tripView = _enrichedTrip;
      var esquemaView = _esquemaPontos;
      var seqA = null, seqB = null;
      var pontoInicioKey = null, pontoFimKey = null;

      if (_modoAtivo === 'MOTORISTA' && _motoristaAtivo) {
        pontoInicioKey = _motoristaAtivo.ponto_inicio;
        pontoFimKey    = _motoristaAtivo.ponto_fim;
        seqA = _seqPorPonto(pontoInicioKey);
        seqB = _seqPorPonto(pontoFimKey);
        // Fallback: se o lookup por nome retornou o mesmo ponto (ou nenhum),
        // usa o intervalo de seq armazenado no momento do vínculo
        if ((seqA === null || seqB === null || seqA === seqB) &&
            _motoristaAtivo.seqMin != null && _motoristaAtivo.seqMax != null &&
            _motoristaAtivo.seqMin !== _motoristaAtivo.seqMax) {
          seqA = _motoristaAtivo.seqMin;
          seqB = _motoristaAtivo.seqMax;
        }
      } else if (_modoAtivo === 'TRECHO') {
        var pA = document.getElementById('modoPontoA');
        var pB = document.getElementById('modoPontoB');
        pontoInicioKey = pA ? pA.value : '';
        pontoFimKey    = pB ? pB.value : '';
        seqA = _seqPorPonto(pontoInicioKey);
        seqB = _seqPorPonto(pontoFimKey);
      }

      if (seqA !== null && seqB !== null) {
        var minS = Math.min(seqA, seqB), maxS = Math.max(seqA, seqB);
        var filtered = _enrichedTrip.filter(function(p) { return p.seq >= minS && p.seq <= maxS; });
        if (filtered.length >= 2) {
          tripView = filtered;

          // Codigos visitados no trecho (via seq range)
          var codigosNoTrecho = new Set(
            filtered.filter(function(p) { return p.matched && p.codigo; })
                    .map(function(p) { return String(p.codigo); })
          );

          // Tenta filtro por nome/id (inclui não-visitados do trecho)
          var schemaFiltered = _filtrarEsquemaPorTrechoLocal(_esquemaPontos, pontoInicioKey, pontoFimKey);

          if (schemaFiltered !== null) {
            esquemaView = schemaFiltered;
          } else {
            // Fallback: infere intervalo de ordem pelos pontos visitados no trecho
            var ordens = _esquemaPontos
              .filter(function(ep) { return codigosNoTrecho.has(String(ep.id_ponto)); })
              .map(function(ep) { return ep.ordem; });

            if (ordens.length >= 2) {
              var loOrdem = Math.min.apply(null, ordens);
              var hiOrdem = Math.max.apply(null, ordens);
              // Inclui TODOS os pontos do esquema no range — visitados e não-visitados
              esquemaView = _esquemaPontos.filter(function(ep) {
                return ep.ordem >= loOrdem && ep.ordem <= hiOrdem;
              });
            } else {
              // Último recurso: só visitados
              esquemaView = _esquemaPontos.filter(function(ep) {
                return codigosNoTrecho.has(String(ep.id_ponto));
              });
            }
          }
        }
      }

      _agendarMapa(tripView, null, _locaisCache);

      // Comparação filtrada ao modo
      var comparacaoView = null;
      if (esquemaView.length > 0) {
        var realizadosSet = new Set(
          tripView.filter(function(p) { return p.matched && p.codigo; })
                  .map(function(p) { return String(p.codigo); })
        );
        comparacaoView = esquemaView.map(function(ep) {
          var chave = String(ep.id_ponto);
          var visitado = realizadosSet.has(chave);
          return Object.assign({}, ep, {
            visitado:        visitado,
            ponto_realizado: visitado ? (tripView.find(function(p) { return p.matched && String(p.codigo) === chave; }) || null) : null,
            status:          visitado ? 'Realizado' : 'Não visitado'
          });
        });
      }

      AnalysisModule.renderPontosTable(tripView, comparacaoView);
      if (comparacaoView) AnalysisModule.atualizarContadoresComparacao(comparacaoView);

      // Alertas filtrados ao modo
      if (_analysis.alerts) {
        var alertsBase = _analysis.alerts.filter(function(a) {
          return a.tipo !== 'PONTO_NAO_VISITADO';
        });
        // Filtra alertas de velocidade ao seq range
        if (tripView !== _enrichedTrip) {
          var minSeq = tripView[0].seq, maxSeq = tripView[tripView.length - 1].seq;
          alertsBase = alertsBase.filter(function(a) {
            return a.seq == null || (a.seq >= minSeq && a.seq <= maxSeq);
          });
        }
        // Reinsere pontos não visitados filtrados
        if (comparacaoView) {
          comparacaoView.forEach(function(c) {
            if (!c.visitado) {
              alertsBase.push({
                tipo: 'PONTO_NAO_VISITADO',
                descricao: 'Ponto "' + c.nome_ponto + '" não foi visitado nesta viagem',
                nivel: 'nao-visitado',
                trecho: c.nome_ponto
              });
            }
          });
        }
        AnalysisModule.renderAlertas(alertsBase);
      }
    }

    // ============================================================
    //  FUZZY MATCHING DE MOTORISTAS (Levenshtein)
    // ============================================================

    /**
     * Distância de edição entre duas strings (Levenshtein).
     * Usado para sugerir motoristas com base no nome do CSV.
     */
    function _levenshtein(a, b) {
      a = (a || '').toUpperCase();
      b = (b || '').toUpperCase();
      var m = a.length, n = b.length;
      if (!m) return n;
      if (!n) return m;
      var dp = [];
      for (var i = 0; i <= m; i++) {
        dp[i] = [i];
        for (var j = 1; j <= n; j++) {
          dp[i][j] = i === 0 ? j
            : a[i-1] === b[j-1] ? dp[i-1][j-1]
            : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
        }
      }
      return dp[m][n];
    }

    function _similaridade(a, b) {
      if (!a || !b) return 0;
      var dist = _levenshtein(a, b);
      return 1 - dist / Math.max(a.length, b.length, 1);
    }

    /**
     * Similaridade orientada a nomes próprios.
     * Primeiro tenta match palavra-a-palavra (ignora artigos/preposições curtas).
     * Se todas as palavras significativas do nome menor aparecem no maior → 90%.
     * Se ≥ 67% das palavras batem → 75%.
     * Caso contrário cai no Levenshtein.
     */
    function _similaridadeNome(a, b) {
      if (!a || !b) return 0;
      var norm = function(s) {
        return s.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
      };
      var wordsA = norm(a).split(/\s+/).filter(function(w) { return w.length > 2; });
      var wordsB = norm(b).split(/\s+/).filter(function(w) { return w.length > 2; });
      if (!wordsA.length || !wordsB.length) return _similaridade(a, b);

      var shorter = wordsA.length <= wordsB.length ? wordsA : wordsB;
      var longer  = wordsA.length <= wordsB.length ? wordsB : wordsA;
      var matches = shorter.filter(function(w) { return longer.indexOf(w) !== -1; });

      if (matches.length === shorter.length) return 0.90;
      if (matches.length >= Math.ceil(shorter.length * 0.67)) return 0.75;
      return _similaridade(a, b);
    }

    // ============================================================
    //  AUTO-VÍNCULO DE MOTORISTA
    // ============================================================

    /**
     * Executa logo após processar o CSV.
     * Ordena enrichedTrip cronologicamente, extrai trecho e detecta motorista.
     */
    function _tentarAutoVinculo() {
      if (_vinculos.length > 0) return;

      var freq = {};
      _enrichedTrip.forEach(function(p) {
        var f = (p.funcionario || '').trim();
        if (f && f.toLowerCase() !== 'não informado' && f.toLowerCase() !== 'nao informado') {
          freq[f] = (freq[f] || 0) + 1;
        }
      });

      var nomes = Object.keys(freq).sort(function(a, b) { return freq[b] - freq[a]; });

      _autoVinculoDataList = nomes.map(function(nomeCsv) {
        var pontos = _enrichedTrip
          .filter(function(p) { return (p.funcionario || '').trim() === nomeCsv; })
          .sort(function(a, b) {
            var ta = a.entrada ? new Date(String(a.entrada).replace(' ', 'T')) : 0;
            var tb = b.entrada ? new Date(String(b.entrada).replace(' ', 'T')) : 0;
            return ta - tb;
          });

        // Intervalo real de seq do motorista (base para filtro de fallback)
        var seqs = pontos.map(function(p) { return p.seq; });
        var seqMin = seqs.length ? Math.min.apply(null, seqs) : null;
        var seqMax = seqs.length ? Math.max.apply(null, seqs) : null;

        // Usa TODOS os pontos do enrichedTrip no intervalo de seq para
        // determinar início e fim — os registros do próprio motorista podem
        // ter repetição de nome (garagem, pátio, etc.)
        var noTrecho = (seqMin !== null)
          ? _enrichedTrip.filter(function(p) {
              return p.seq >= seqMin && p.seq <= seqMax && (p.ponto || '').trim();
            })
          : pontos.filter(function(p) { return (p.ponto || '').trim(); });

        var nomesTrecho = noTrecho.map(function(p) { return (p.ponto || '').trim(); }).filter(Boolean);
        var pontoInicio = nomesTrecho[0] || '';
        var pontoFim    = nomesTrecho[nomesTrecho.length - 1] || '';

        var sugestao = _sugerirMotorista(nomeCsv);
        return {
          nomeCsv:     nomeCsv,
          motorista:   sugestao ? sugestao.motorista : null,
          score:       sugestao ? sugestao.score : 0,
          pontoInicio: pontoInicio,
          pontoFim:    pontoFim,
          seqMin:      seqMin,
          seqMax:      seqMax,
          editando:    false
        };
      });
    }

    /**
     * Seleciona a opção de um <select> cujo value corresponda ao alvo
     * (exato primeiro, depois trim+lowercase como fallback).
     */
    function _preencherSelectTrecho(sel, alvo) {
      if (!sel || !alvo) return;
      var alvoNorm = alvo.trim().toLowerCase();
      // 1. Match exato por value
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === alvo) { sel.selectedIndex = i; return; }
      }
      // 2. Match tolerante por value (trim + lowercase)
      for (var j = 0; j < sel.options.length; j++) {
        if (sel.options[j].value.trim().toLowerCase() === alvoNorm) {
          sel.selectedIndex = j; return;
        }
      }
      // 3. Match pelo texto/label da opção (quando o value é código mas o alvo é nome)
      for (var k = 0; k < sel.options.length; k++) {
        if (sel.options[k].text.trim().toLowerCase() === alvoNorm) {
          sel.selectedIndex = k; return;
        }
      }
    }

    /**
     * Busca o motorista mais similar ao nome/matrícula fornecido.
     * Retorna { motorista, score } se score >= 55%, ou null.
     */
    function _sugerirMotorista(termo) {
      if (!termo || !_motoristas || !_motoristas.length) return null;
      var t = String(termo).trim().toUpperCase();

      // 1. Match exato por iButton (código do CSV = ibutton cadastrado)
      for (var i = 0; i < _motoristas.length; i++) {
        var m = _motoristas[i];
        if (m.ibutton && m.ibutton.trim().toUpperCase() === t) {
          return { motorista: m, score: 100 };
        }
      }

      // 2. Match por nome (palavra-a-palavra) ou matrícula (Levenshtein)
      var melhor = null;
      var melhorScore = 0.55;
      _motoristas.forEach(function(m) {
        var scoreNome = _similaridadeNome(t, (m.nome || '').toUpperCase());
        var scoreMat  = _similaridade(t, String(m.matricula || '').toUpperCase());
        var score = Math.max(scoreNome, scoreMat);
        if (score > melhorScore) {
          melhorScore = score;
          melhor = m;
        }
      });
      return melhor ? { motorista: melhor, score: Math.round(melhorScore * 100) } : null;
    }

    // ============================================================
    //  HELPERS
    // ============================================================

    /**
     * Popula os selects de trecho do sidebar (sidebarPontoInicio/Fim)
     * com os pontos únicos do _enrichedTrip, excluindo os que estão em
     * intervalos já ocupados por outros vínculos.
     */
    function _popularSidebarTrechoDeEnrichedTrip() {
      var pontos = [];
      var vistos = {};
      _enrichedTrip.forEach(function(p) {
        var nome = (p.ponto || '').trim();
        if (nome && !vistos[nome]) {
          vistos[nome] = true;
          pontos.push({ valor: nome, label: nome });
        }
      });

      var ocupados = _calcularPontosOcupados(pontos);
      var disponiveis = pontos.filter(function(p) { return !ocupados.has(p.valor); });

      ['sidebarPontoInicio', 'sidebarPontoFim'].forEach(function(id) {
        var sel = document.getElementById(id);
        if (!sel) return;
        sel.innerHTML = '<option value="">— Selecione —</option>';
        disponiveis.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p.valor;
          opt.textContent = p.label;
          sel.appendChild(opt);
        });
      });
    }

    /**
     * Gera relatório diretamente a partir das seleções inline da Coluna 3.
     * Não abre o modal; usa enviarAPI=false.
     */
    function _onGerarRelatorioInline() {
      if (!_enrichedTrip || !_enrichedTrip.length) {
        UIModule.showToast('Processe uma viagem primeiro.', 'error');
        return;
      }

      var tipoEl = document.querySelector('input[name="tipoRelatorio"]:checked');
      var tipo = tipoEl ? tipoEl.value : 'MOTORISTA';

      var selEsquema = document.getElementById('selectEsquema');
      var idEsquema = selEsquema ? selEsquema.value : '';
      var esqObj = _esquemas.find(function(e) { return e.id_esquema === idEsquema; });
      var nomeLinha = esqObj ? esqObj.nome_linha : '';

      var gerarParadas = !!(document.getElementById('chkParadasIrregularesInline') &&
                            document.getElementById('chkParadasIrregularesInline').checked);

      var params = {
        tipo: tipo,
        enviarAPI: true,
        idEsquema: idEsquema,
        nomeLinha: nomeLinha,
        horario: esqObj ? (esqObj.horario || '') : '',
        enrichedTrip: _enrichedTrip,
        esquemaPontos: _esquemaPontos,
        segments: _analysis ? _analysis.segments : [],
        summary:  _analysis ? _analysis.summary  : {},
      };

      if (tipo === 'MOTORISTA') {
        var selMot = document.getElementById('relSelectMotorista');
        var idx = selMot ? parseInt(selMot.value, 10) : NaN;
        if (isNaN(idx) || idx < 0 || !_vinculos[idx]) {
          UIModule.showToast('Selecione um motorista vinculado.', 'error');
          return;
        }
        params.motorista = _vinculos[idx];
      } else if (tipo === 'TRECHO') {
        var pontoA = document.getElementById('relPontoA') ? document.getElementById('relPontoA').value : '';
        var pontoB = document.getElementById('relPontoB') ? document.getElementById('relPontoB').value : '';
        if (!pontoA || !pontoB) {
          UIModule.showToast('Selecione os pontos A e B do trecho.', 'error');
          return;
        }
        params.idPontoA = pontoA;
        params.idPontoB = pontoB;
      }

      var btn = document.getElementById('btnGerarRelatorioInline');
      var _setBusy = function(busy) {
        if (btn) {
          btn.disabled = busy;
          btn.innerHTML = busy ? '<span class="btn-spin"></span> Gerando...' : '📋 Gerar Relatório';
        }
      };

      _setBusy(true);
      UIModule.showLoading('Capturando mapa e gerando relatório...');

      _gerarComCaptura(params,
        function (result) {
          UIModule.hideLoading();
          _setBusy(false);
          console.log('[App] Payload do relatório:', result.payload);
          UIModule.showToast('Relatório gerado com sucesso!', 'success', 5000);
          if (result.apiResponse) {
            console.log('[App] Resposta da API:', result.apiResponse);
            if (result.apiResponse.body && result.apiResponse.body.url) {
              var fname2 = _buildPdfFilename(tipo, params.motorista);
              _downloadPdf(result.apiResponse.body.url, fname2);
              UIModule.showToast('PDF pronto para download.', 'success', 4000);
            }
          }
          if (gerarParadas) {
            _launchParadasFora(params);
          }
        },
        function (err) {
          UIModule.hideLoading();
          _setBusy(false);
          var msg = err && err.message ? err.message : String(err);
          UIModule.showToast('Erro ao gerar relatório: ' + msg, 'error', 6000);
          console.error('[App] Erro ao gerar relatório:', err);
        }
      );
    }

    /**
     * Captura o mapa (se disponível), adiciona a base64 em params,
     * e então chama google.script.run.gerarRelatorio.
     */
    function _gerarComCaptura(params, successFn, failureFn) {
      // Calcula o intervalo de seq para que o servidor filtre o enrichedTrip corretamente.
      // O mapa do PDF é gerado server-side via Google Maps Static API (mais confiável que html2canvas).
      var tipo = params.tipo;
      var seqA = null, seqB = null;

      if (tipo === 'MOTORISTA' && params.motorista) {
        seqA = _seqPorPonto(params.motorista.ponto_inicio);
        seqB = _seqPorPonto(params.motorista.ponto_fim);
      } else if (tipo === 'TRECHO' && params.idPontoA && params.idPontoB) {
        seqA = _seqPorPonto(params.idPontoA);
        seqB = _seqPorPonto(params.idPontoB);
      }

      if (seqA !== null && seqB !== null) {
        params.seqInicio = Math.min(seqA, seqB);
        params.seqFim    = Math.max(seqA, seqB);
      }

      google.script.run
        .withSuccessHandler(successFn)
        .withFailureHandler(failureFn)
        .gerarRelatorio(params);
    }

    function _buildPdfFilename(tipo, motorista) {
      var veiculo = (_analysis && _analysis.summary && _analysis.summary.veiculo)
        ? String(_analysis.summary.veiculo).trim() : '';
      var data = (_analysis && _analysis.summary && _analysis.summary.dataViagem)
        ? _analysis.summary.dataViagem.replace(/\//g, '-') : '';
      function slug(s) { return String(s).replace(/[^\w\u00C0-\u024F\-]/g, ' ').replace(/\s+/g, ' ').trim(); }
      if (tipo === 'MOTORISTA' && motorista) {
        var mat = motorista.matricula ? String(motorista.matricula).trim() : '';
        var nome = motorista.nome ? slug(motorista.nome) : '';
        return [mat, nome, veiculo, data].filter(Boolean).join(' - ') + '.pdf';
      }
      return [veiculo, 'ANALISE DE VIAGEM', data].filter(Boolean).join(' - ') + '.pdf';
    }

    /**
     * Baixa um PDF a partir de uma URL remota (ex: signed URL do Supabase).
     * Faz fetch → Blob → objectURL para contornar a limitação cross-origin
     * do atributo `download`, abrindo o diálogo de "Salvar arquivo".
     * Em caso de falha no fetch, abre em nova aba como fallback.
     */
    function _downloadPdf(url, filename) {
      UIModule.showToast('Preparando download…', 'info', 2500);
      fetch(url)
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.blob();
        })
        .then(function(blob) {
          var blobUrl = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = blobUrl;
          a.download = filename || 'relatorio.pdf';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 10000);
        })
        .catch(function() {
          // Fallback: abre em nova aba se o fetch falhar (ex: CORS restritivo)
          window.open(url, '_blank');
        });
    }

    function _escHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // ============================================================
    //  API PÚBLICA
    // ============================================================

    function getTrip() {
      return _enrichedTrip;
    }
    function getAnalysis() {
      return _analysis;
    }
    function getLocais() {
      return _locaisCache;
    }
    function getComparacao() {
      return _comparacao;
    }
    function getVinculos() {
      return _vinculos;
    }

    // Armazena dados para renderização do mapa e exibe o botão "Visualizar Mapa"
    function _agendarMapa(trip, comp, locais) {
      _mapPending = { trip: trip, comp: comp, locais: locais };
      var btn = document.getElementById('btnVerMapa');
      var txt = document.getElementById('mapPlaceholderText');
      if (btn) btn.style.display = 'inline-flex';
      if (txt) txt.textContent = 'Rota processada — clique para visualizar o mapa';
    }

    // Chamado pelo botão "Visualizar Mapa" no placeholder
    function abrirMapa() {
      if (!_mapPending) return;
      if (typeof MapModule === "undefined" || !MapModule) return;

      // Inicializa o mapa Leaflet se ainda não foi feito
      if (typeof MapModule.init === "function") {
        try {
          MapModule.init();
          _mapsReady = _isMapUsable();
        } catch (err) {
          _mapsReady = false;
          console.error("[App] Falha ao inicializar o mapa:", err);
          return;
        }
      }

      if (typeof MapModule.renderRoute === "function") {
        MapModule.renderRoute(_mapPending.trip, _mapPending.comp, _mapPending.locais);
      }
    }

    return {
      init,
      getTrip,
      getAnalysis,
      getLocais,
      getComparacao,
      getVinculos,
      _removerVinculo,
      _confirmarCard,
      _toggleEditCard,
      _toggleCadastroCard,
      _buscarMotoristaCard,
      _descartarCard,
      _cadastrarConfirmarCard,
      _buscarMotoristaManual,
      _confirmarManual,
      _onGerarRelatorioInline,
      _novaAnalise: _onLimpar,
      _setModo,
      abrirMapa,
    };
  })();

  // ---- Inicialização quando o DOM estiver pronto ----
  document.addEventListener("DOMContentLoaded", function () {
    AppModule.init();
  });
</script>
