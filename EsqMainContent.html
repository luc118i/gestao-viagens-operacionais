<!-- ── Map / Horário wrap ── -->
<div class="map-wrap">

  <!-- Horário panel -->
  <div class="hor-panel" id="horPanel">

    <!-- Static config (never re-rendered) -->
    <div class="hor-config">
      <div class="hor-config-group">
        <div class="hor-config-label">Hora de partida</div>
        <input type="time" id="horHoraPartida" class="fi" style="width:120px;" value="00:00"
               oninput="_lastCalc?_partialUpdateSchedule():renderHorario(); saveHorConfig();" />
      </div>
      <div class="hor-config-group">
        <div class="hor-config-label">Tipo de via</div>
        <div class="hor-presets" id="horPresets">
          <button class="hor-preset-btn active" onclick="setPreset(this,85)">BR</button>
          <button class="hor-preset-btn"        onclick="setPreset(this,75)">Estadual</button>
          <button class="hor-preset-btn"        onclick="setPreset(this,60)">Municipal</button>
          <button class="hor-preset-btn"        onclick="setPreset(this,45)">Urbana</button>
        </div>
      </div>
      <div class="hor-config-group">
        <div class="hor-config-label">Vel. média (km/h)</div>
        <input type="number" id="horVelMedia" class="fi" style="width:82px;" value="85" min="10" max="150"
               oninput="_lastCalc?_partialUpdateSchedule():renderHorario(); saveHorConfig();"
               onkeydown="if(event.key==='Enter'){_salvarVelAtiva();event.preventDefault();}"
               title="Edite e pressione Enter para salvar na planilha" />
      </div>
      <div class="hor-config-group">
        <div class="hor-config-label">Ponto de partida</div>
        <select id="horStartPt" class="fs" style="width:190px;font-size:12px;padding:6px 8px;"
                onchange="_horStartIdx=+this.value; renderHorario();">
          <option value="0">—</option>
        </select>
      </div>
    </div>

    <!-- Dynamic body (re-rendered by renderHorario) -->
    <div class="hor-body" id="horBody">
      <div style="text-align:center;color:#9aa0ad;padding:40px;">Selecione um esquema e adicione pontos para calcular o horário.</div>
    </div>

    <!-- Footer -->
    <div class="hor-footer">
      <button class="btn btn-dark btn-sm" onclick="abrirModalPdf()" style="display:inline-flex;align-items:center;gap:5px;"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg> Baixar PDF</button>
    </div>
  </div><!-- /hor-panel -->

  <div class="map-ph" id="mapPh">
    <div class="ph-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="48" height="48" style="opacity:.35;"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></div>
    <p>Selecione ou crie um esquema para visualizar o traçado</p>
  </div>
  <div id="map"></div>
  <div class="map-legend" id="mapLegend">
    <div class="leg-item"><div class="leg-dot" style="background:#22c97a;"></div> Início</div>
    <div class="leg-item"><div class="leg-dot" style="background:#e05050;"></div> Fim</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f47920;"></div> Ponto</div>
    <div class="leg-item" style="gap:6px;"><div style="width:22px;height:3px;background:#f47920;border-radius:2px;opacity:0.8;"></div> Rota</div>
    <!-- ANTT items — shown dynamically by _drawAnttOnMap() -->
    <div class="leg-antt" id="mapAnttLegend" style="display:none;">
      <div class="leg-item"><div style="width:18px;height:4px;border-radius:2px;background:#22c55e;opacity:0.85;flex-shrink:0;"></div> OK</div>
      <div class="leg-item"><div style="width:18px;height:4px;border-radius:2px;background:#f59e0b;opacity:0.85;flex-shrink:0;"></div> Atenção</div>
      <div class="leg-item"><div style="width:18px;height:4px;border-radius:2px;background:#ef4444;opacity:0.85;flex-shrink:0;"></div> Excede</div>
      <div class="leg-item"><div class="leg-dot" style="background:#6366f1;flex-shrink:0;"></div> Sugestão</div>
    </div>
  </div>

</div><!-- /map-wrap -->
